<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification - Ever Good Partners</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --text-dark: #222222;
            --bg-light: #fcfdfc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        
        body { 
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            /* พื้นหลังเป็นหยดน้ำเบาๆ ตามรูปตัวอย่าง */
            background-image: url('images/fssc-22022.png'); 
            background-size: cover; 
            background-attachment: fixed;
            background-position: center;
        }

        /* --- HEADER --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #eeeeee;
        }

        .brand-header { color: var(--gold); font-size: 1.6rem; font-weight: 700; line-height: 1.1; }
        .partners-text { color: var(--gold); font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 10px; font-weight: 600; }
        .cert-icons { display: flex; gap: 12px; align-items: center; }
        .cert-icons img { height: 32px; mix-blend-mode: multiply; opacity: 0.9; }
        
        .nav-menu { display: flex; list-style: none; gap: 40px; }
        .nav-menu li a {
            text-decoration: none; color: var(--text-dark); font-size: 0.85rem;
            font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s;
        }
        .nav-menu li a:hover, .nav-menu li a.nav-active { color: var(--accent-green); }
        .nav-menu li a.nav-active { border-bottom: 2px solid var(--accent-green); padding-bottom: 5px; }

        /* --- Main Content --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .section-header { text-align: center; margin-bottom: 70px; }
        .section-title {
            font-size: 3.5rem; 
            color: var(--primary-green); 
            font-weight: 900;
            text-transform: uppercase; 
            letter-spacing: -1px; 
            margin-bottom: 15px;
        }

        /* --- Certification Grid --- */
        .cert-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center; /* จัดกึ่งกลางการ์ด */
        }

        .cert-card {
            background: #ffffff;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 25px;
            text-align: center;
            width: calc(25% - 30px); /* 4 ใบใน 1 แถว */
            min-width: 240px;
        }

        .cert-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px rgba(31, 63, 35, 0.12);
            border-color: var(--accent-green);
        }

        .cert-img-wrapper {
            height: 140px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .cert-img-wrapper img {
            max-height: 100%;
            max-width: 85%;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        .cert-info h3 {
            font-size: 1.2rem;
            color: var(--primary-green);
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .cert-info p {
            font-size: 0.9rem;
            color: #777;
            font-weight: 500;
        }

        /* สำหรับรูปภาพที่พื้นหลังไม่ขาวสนิท */
        .img-bg-fix { filter: contrast(1.05) brightness(1.02); }

        /* Responsive */
        @media (max-width: 1024px) {
            .cert-card { width: calc(50% - 30px); } /* 2 ใบต่อแถวบน Tablet */
        }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; padding: 20px; text-align: center; }
            .nav-menu { gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
            .section-title { font-size: 2.5rem; }
            .cert-card { width: 100%; } /* 1 ใบต่อแถวบนมือถือ */
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC 22000">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA Organic">
                <img src="images/fssc-22003.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="Superior Taste Award">
            </div>
        </div>

        <nav class="nav-section">
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="overview.html">OVERVIEW</a></li>
                <li><a href="production.html">PRODUCTION</a></li>
                <li><a href="certification.html" class="nav-active">CERTIFICATION</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        
        <div class="section-header">
            <h2 class="section-title">CERTIFICATIONS</h2>
        </div>

        <div class="cert-grid">
            
            <div class="cert-card">
                <div class="cert-img-wrapper">
                    <img src="images/fssc-22000.png" alt="FSSC 22000">
                </div>
                <div class="cert-info">
                    <h3>FSSC 22000</h3>
                    <p>(By SGS)</p>
                </div>
            </div>

            <div class="cert-card">
                <div class="cert-img-wrapper">
                    <img src="images/fssc-22027.png" alt="HACCP">
                </div>
                <div class="cert-info">
                    <h3>HACCP</h3>
                    <p>International Standard</p>
                </div>
            </div>

            <div class="cert-card">
                <div class="cert-img-wrapper">
                    <img src="images/fssc-22026.png" alt="GHPs">
                </div>
                <div class="cert-info">
                    <h3>GHPs</h3>
                    <p>Hygiene Certification</p>
                </div>
            </div>

            <div class="cert-card">
                <div class="cert-img-wrapper">
                    <img src="images/fssc-22028.png" alt="US FDA">
                </div>
                <div class="cert-info">
                    <h3>US FDA</h3>
                    <p>Food & Drug Compliance</p>
                </div>
            </div>

        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification - Ever Good Partners</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #2B4E2B;
            --accent-green: #59803C;
            --gold: #A88F61;
            --text-dark: #222222;
            --bg-light: #fcfdfc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        
        body { 
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: url('images/fssc-22022.png'); 
            background-size: cover; 
            background-attachment: fixed;
            background-position: center;
        }

        /* --- HEADER --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            background: #FFFFFF;
            position: relative;
            z-index: 100;
            border-bottom: 1px solid #eeeeee;
        }

        .brand-header { 
            color: var(--gold); 
            font-size: 1.8rem; 
            font-weight: 700; 
            line-height: 1.1; 
        }

        .partners-text { 
            color: var(--gold); 
            font-size: 0.85rem; 
            letter-spacing: 4px; 
            margin-bottom: 15px; 
        }

        .cert-icons { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
        }

        .cert-icons img { 
            height: 40px; 
            mix-blend-mode: multiply; 
        }
        
        .cert-icons img.img-bg-fix {
            filter: contrast(1.2) brightness(1.1);
        }

        .nav-menu { 
            display: flex; 
            list-style: none; 
            gap: 50px; 
        }

        .nav-menu li a {
            text-decoration: none; 
            color: var(--text-dark); 
            font-size: 0.85rem;
            font-weight: 600; 
            letter-spacing: 1px; 
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-menu li a:hover, 
        .nav-menu li a.nav-active { 
            color: var(--accent-green); 
        }

        .nav-menu li a.nav-active {
            border-bottom: 2px solid var(--accent-green);
            padding-bottom: 5px;
        }

        /* --- Main Content --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px 80px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        /* ปรับสไตล์หัวข้อให้เหมือนคำว่า COCONUT (หน้าปก) */
        .section-title {
            font-family: 'Prompt', sans-serif;
            font-size: 3.5rem;
            color: #1F3F23;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 15px;
            line-height: 1.1;
        }

        /* --- Certification Grid --- */
        .cert-grid {
            display: grid;
            /* ปรับขนาดคอลัมน์ให้เล็กลงเพื่อให้รูปทรงการ์ดสวยงามพอดีกับโลโก้ */
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        /* ปรับกรอบให้เป็นสี่เหลี่ยมจัตุรัสและจัดกลางโลโก้ */
        .cert-card {
            background: #ffffff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            aspect-ratio: 1 / 1; /* บังคับให้เป็นกรอบสี่เหลี่ยมจัตุรัส */
        }

        .cert-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .cert-img-wrapper {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cert-img-wrapper img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            mix-blend-mode: multiply; /* ตัดพื้นหลังสีขาวออก */
        }

        .img-bg-fix {
            filter: contrast(1.3) brightness(1.1);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .header-container { flex-direction: column; align-items: center; text-align: center; gap: 20px; padding: 20px; }
            .nav-menu { flex-wrap: wrap; justify-content: center; gap: 15px; }
            .section-title { font-size: 2.8rem; }
        }

        @media (max-width: 600px) {
            .cert-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC 22000">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA Organic">
                <img src="images/fssc-22003.png" alt="Kosher" class="img-bg-fix">
                <img src="images/fssc-22004.png" alt="Superior Taste Award">
            </div>
        </div>

        <nav class="nav-section">
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="overview.html">OVERVIEW</a></li>
                <li><a href="production.html">PRODUCTION</a></li>
                <li><a href="certification.html" class="nav-active">CERTIFICATION</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        
        <div class="section-header">
            <h2 class="section-title">OUR CERTIFICATIONS</h2>
        </div>

        <div class="cert-grid">
            
            <div class="cert-card">
                <div class="cert-img-wrapper">
                    <img src="images/fssc-22000.png" alt="FSSC 22000">
                </div>
            </div>

            <div class="cert-card">
                <div class="cert-img-wrapper">
                    <img src="images/fssc-22001.png" alt="Halal">
                </div>
            </div>

            <div class="cert-card">
                <div class="cert-img-wrapper">
                    <img src="images/fssc-22002.png" alt="USDA Organic">
                </div>
            </div>

            <div class="cert-card">
                <div class="cert-img-wrapper">
                    <img src="images/fssc-22003.png" alt="Kosher" class="img-bg-fix">
                </div>
            </div>

            <div class="cert-card">
                <div class="cert-img-wrapper">
                    <img src="images/fssc-22004.png" alt="Superior Taste Award">
                </div>
            </div>

        </div>

    </div>

</body>
</html>

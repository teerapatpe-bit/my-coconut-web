<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F2EFE9;
            --brand-green: #2B4C3B;    
            --text-brown: #5D5443;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #1C1D1B;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* --- Header: Logo & Certifications --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 50px 0;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--brand-green);
            line-height: 1;
        }

        .cert-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .cert-row img {
            height: 35px;
            width: auto;
            object-fit: contain;
        }

        /* --- Hero Section --- */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 60vh;
            gap: 40px;
            padding-bottom: 50px;
        }

        .features {
            flex: 1;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-brown);
            margin-bottom: 20px;
        }

        .check-icon {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }

        /* --- Product Card --- */
        .product-card {
            flex: 1;
            background: var(--white);
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            max-width: 450px;
        }

        .product-card img {
            width: 100%;
            max-width: 320px;
            margin-bottom: 30px;
        }

        .price {
            font-size: 3rem;
            font-weight: 800;
            color: var(--brand-green);
            display: block;
            margin-bottom: 20px;
        }

        .btn-order {
            background-color: var(--brand-green);
            color: white;
            padding: 16px 60px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-order:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* --- Award Footer --- */
        .footer-award {
            padding: 40px 0;
        }

        .footer-award img {
            height: 60px;
            width: auto;
        }

        @media (max-width: 1024px) {
            header { flex-direction: column; align-items: center; text-align: center; }
            .cert-row { justify-content: center; flex-wrap: wrap; }
            .hero { flex-direction: column; text-align: center; }
            .feature-item { justify-content: center; }
            .product-card { margin: 0 auto; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-section">
                <div class="logo">ELI.</div>
                <div class="cert-row">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/fssc-22001.png" alt="Halal">
                    <img src="images/fssc-22002.png" alt="USDA">
                    <img src="images/fssc-22003.png" alt="Kosher">
                    <img src="images/fssc-22004.png" alt="SGS">
                </div>
            </div>
        </header>

        <section class="hero">
            <div class="features">
                <div class="feature-item">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Artificial Flavor</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Coloring</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="product-card">
                <img src="images/fssc-22005.png" alt="ELI Product">
                <span class="price">฿45.00</span>
                <a href="#" class="btn-order">Shop Now</a>
            </div>
        </section>

        <footer class="footer-award">
            <img src="images/fssc-22006.png" alt="Taste Award">
        </footer>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Professional Product Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-gold: #C3A358;
            --brand-navy: #2b5b84;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            color: #333;
            overflow-x: hidden;
            background-image: url('images/fssc-22007.png'); /* รูปพื้นหลัง */
            background-size: cover;        
            background-position: center;   
            background-repeat: no-repeat;  
            background-attachment: fixed; 
            min-height: 100vh;             
        }

        /* --- Header Section --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative; 
            z-index: 10;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .brand-header {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--brand-gold);
            letter-spacing: 0.5px;
            line-height: 1.1;
        }

        .partners-text {
            font-size: 14px;
            font-weight: 600;
            color: #888;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* เอาสีขาวดำออก โลโก้เป็นสีตามปกติ */
        .cert-icons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .cert-icons img {
            height: 24px;
            width: auto;
            /* เอาฟิลเตอร์สีเทาออก */
        }

        /* --- Navigation --- */
        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
            border: 1.5px solid #333;
            padding: 12px 35px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.4); /* ให้เมนูโปร่งแสงด้วย */
            backdrop-filter: blur(10px);          
        }

        nav ul li a {
            text-decoration: none;
            color: #000;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        
        nav ul li a:hover {
            color: var(--brand-gold);
        }

        /* --- Main Content Section --- */
        main {
            position: relative;
            max-width: 1300px;
            margin: 20px auto;
            padding: 0 40px;
            z-index: 1; 
            display: flex;
            align-items: center;
            justify-content: flex-end; /* ดันกล่องหลักไปชิดขวา */
            min-height: 650px;
        }

        /* กล่องเนื้อหาหลัก (กล่องใหญ่) ทำให้โปร่งแสงมากขึ้น */
        .product-card {
            background: rgba(255, 255, 255, 0.55); /* ปรับให้โปร่งแสง จางลง */
            backdrop-filter: blur(15px); /* เบลอฉากหลังให้สวย */
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.7); /* เส้นขอบเงากระจก */
            border-radius: 40px;
            width: 82%; /* ปรับขนาดเพื่อให้มีพื้นที่ด้านซ้าย */
            min-height: 580px;
            /* เพิ่ม Padding ด้านซ้าย (150px) เพื่อหลบกล่อง Eli */
            padding: 50px 70px 50px 150px; 
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }

        /* กล่องลอยสีขาวด้านซ้าย (กล่อง Eli) */
        .eli-features {
            position: absolute;
            left: 20px; /* ตำแหน่งยึดขอบซ้ายจอ */
            top: 50%; 
            transform: translateY(-50%); 
            background: rgba(255, 255, 255, 0.5); /* ปรับให้โปร่งแสงมากๆ */
            backdrop-filter: blur(20px); /* เบลอกระจก */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8); 
            width: 320px;
            padding: 50px 30px 40px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            z-index: 10; 
        }

        .eli-badge {
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 800;
            position: absolute;
            top: -20px;
            left: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 15px;
            color: #111;
        }

        .check-circle {
            width: 24px;
            height: 24px;
            background: #27ae60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        /* --- Search & Content Detail --- */
        .search-bar {
            background: rgba(255, 255, 255, 0.9);
            width: 450px;
            margin: 0 auto 50px;
            padding: 10px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: relative;
            z-index: 1;
        }

        .search-bar input {
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 600;
            width: 80%;
            color: #333;
            background: transparent;
        }

        .search-btn {
            background: #3b82f6;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-btn:hover {
            background: #2563eb;
        }

        .details {
            display: flex;
            align-items: center;
            position: relative;
            z-index: 1;
            /* ไม่ต้องใช้ padding-left ตรงนี้แล้ว เพราะกล่องแม่ดันให้แล้ว */
        }

        .text-side { flex: 1; }
        .text-side h4 { color: #7da58a; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 700; }
        .text-side h1 { font-size: 75px; color: var(--brand-navy); line-height: 1; margin-bottom: 5px; }
        .text-side p { font-size: 26px; color: #8896a6; margin-bottom: 25px; font-weight: 500; }
        .text-side h2 { font-size: 85px; color: #1e293b; margin-bottom: 20px; line-height: 1; }
        .stars { color: #fbbf24; font-size: 22px; gap: 5px; display: flex; }

        .image-side {
            flex: 1;
            height: 450px;
            border: 2px dashed rgba(203, 213, 225, 0.8);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.2);
        }

    </style>
</head>
<body>

    <header class="container">
        <div class="brand-section">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="HALAL">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22003.png" alt="K">
                <img src="images/fssc-22004.png" alt="KOSHER">
            </div>
        </div>

        <nav>
            <ul>
                <li><a href="#">OVERVIEW</a></li>
                <li><a href="#">PRODUCTION</a></li>
                <li><a href="#">CERTIFICATION</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="eli-features">
            <div class="eli-badge">Eli</div>
            <div class="feature-item"><div class="check-circle"><i class="fa-solid fa-check"></i></div> 100% Natural Coconut water</div>
            <div class="feature-item"><div class="check-circle"><i class="fa-solid fa-check"></i></div> No Sugar Added</div>
            <div class="feature-item"><div class="check-circle"><i class="fa-solid fa-check"></i></div> No Artificial Flavor</div>
            <div class="feature-item"><div class="check-circle"><i class="fa-solid fa-check"></i></div> No Coloring</div>
            <div class="feature-item"><div class="check-circle"><i class="fa-solid fa-check"></i></div> No Preservatives</div>
        </div>

        <div class="product-card">
            <div class="search-bar">
                <input type="text" value="coconut water" readonly>
                <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="details">
                <div class="text-side">
                    <h4>Premium Export Quality</h4>
                    <h1>18 months</h1>
                    <p>@ room temp</p>
                    <h2>330ml</h2>
                    <div class="stars">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                    </div>
                </div>

                <div class="image-side">
                    <div><br>
 <img src="images/fssc-22009.png" class="bottle-render" alt="Ever Good Bottle">                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>

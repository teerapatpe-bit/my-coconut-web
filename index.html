<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS | Premium Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand-gold: #D4AF37; 
            --brand-green: #2B4C3B; 
            --accent-blue: #4A90E2;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8F9FA;
            /* พื้นหลังจางๆ เพื่อส่งเสริมสินค้า */
            background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('images/fssc-22007.png');
            background-size: cover;
            background-attachment: fixed;
            color: #333;
        }

        /* ส่วนหัว: ชื่อบริษัทและโลโก้ใบเซอร์อยู่ด้านล่าง */
        header {
            padding: 60px 100px 20px 100px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .brand { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 3.5rem; 
            color: var(--brand-gold); 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 15px;
        }

        .cert-row-top {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .cert-row-top img { height: 35px; opacity: 0.9; }

        /* ส่วนจัดวางเนื้อหาหลัก: สลับซ้ายขวาตามโจทย์ */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 100px;
            display: grid;
            grid-template-columns: 1.1fr 1fr; /* กล่องข้อมูลซ้าย สินค้าขวา */
            gap: 60px;
            align-items: center;
            min-height: 70vh;
        }

        /* กล่องข้อมูลด้านซ้าย */
        .info-panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .info-panel h1 {
            font-size: 4rem;
            color: var(--accent-blue);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .feature-list { list-style: none; }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #444;
        }
        .feature-item span { color: #7ED321; font-size: 1.8rem; }

        /* สินค้าด้านขวาให้ดูสง่า */
        .product-display {
            display: flex;
            justify-content: center;
            position: relative;
        }

        .product-display::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 20px;
            background: rgba(0,0,0,0.1);
            bottom: -30px;
            filter: blur(15px);
            border-radius: 50%;
        }

        .main-bottle {
            width: 420px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.1));
            animation: elegantFloat 6s infinite ease-in-out;
        }

        @keyframes elegantFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        .order-btn {
            display: inline-block;
            margin-top: 40px;
            background: var(--brand-green);
            color: white;
            padding: 22px 50px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 15px 30px rgba(43,76,59,0.2);
        }

        .order-btn:hover {
            transform: translateY(-5px);
            background: #1e362a;
            box-shadow: 0 20px 40px rgba(43,76,59,0.3);
        }

        @media (max-width: 1100px) {
            header { padding: 40px; text-align: center; }
            .cert-row-top { justify-content: center; }
            .main-container { grid-template-columns: 1fr; text-align: center; }
            .feature-item { justify-content: center; }
            .product-display { order: -1; } /* มือถือเอาขวดขึ้นก่อน */
            .main-bottle { width: 300px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">EVER GOOD PARTNERS</div>
        <div class="cert-row-top">
            <img src="images/fssc-22000.png" alt="FSSC">
            <img src="images/fssc-22001.png" alt="Halal">
            <img src="images/fssc-22002.png" alt="USDA">
            <img src="images/fssc-22003.png" alt="Kosher">
            <img src="images/fssc-22004.png" alt="SGS">
        </div>
    </header>

    <main class="main-container">
        <div class="info-panel">
            <h1>Coconut<br>Water</h1>
            <ul class="feature-list">
                <li class="feature-item"><span>✓</span> 100% NATURAL & PURE</li>
                <li class="feature-item"><span>✓</span> ZERO ADDED SUGAR</li>
                <li class="feature-item"><span>✓</span> NO ARTIFICIAL FLAVOR</li>
                <li class="feature-item"><span>✓</span> NO COLORING</li>
                <li class="feature-item"><span>✓</span> NO PRESERVATIVES</li>
            </ul>
            <a href="#" class="order-btn">Order Now</a>
        </div>

        <div class="product-display">
            <img src="images/fssc-22005.png" class="main-bottle" alt="Premium Coconut Water Bottle">
        </div>
    </main>

</body>
</html>

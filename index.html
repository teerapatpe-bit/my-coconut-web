<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F2EFE9;
            --brand-green: #2B4C3B;    
            --text-brown: #5D5443;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #1C1D1B;
            line-height: 1.2; /* กระชับที่สุด */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* --- Header Section: ปรับให้บางลงมาก --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 0 0 0; /* ลดเหลือเพียงเล็กน้อย */
        }

        .brand-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--brand-green);
            line-height: 1;
        }

        .cert-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .cert-row img {
            height: 30px;
            width: auto;
        }

        /* --- Main Layout: ดึงขึ้นสูงด้วย Negative Margin --- */
        .main-content {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-top: -15px; /* ดึงส่วนรายการขึ้นไปหาโลโก้ */
            gap: 40px;
            padding-bottom: 40px;
        }

        /* รายการเครื่องหมายถูก: ขยับชิดบนสุด */
        .feature-list {
            flex: 1;
            padding-top: 10px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-brown);
            margin-bottom: 12px; /* ลดระยะห่างระหว่างจุดเด่น */
        }

        .icon-check {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* การ์ดสินค้าพรีเมียม */
        .product-display {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            max-width: 400px;
            margin-top: 20px; /* ให้รูปขวดน้ำมะพร้าวอยู่ต่ำกว่าตัวหนังสือเล็กน้อย */
        }

        .product-display img {
            width: 100%;
            max-width: 280px;
            margin-bottom: 15px;
        }

        .price-tag {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--brand-green);
            display: block;
            margin-bottom: 15px;
        }

        .btn-buy {
            background-color: var(--brand-green);
            color: white;
            padding: 12px 45px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
            display: inline-block;
        }

        /* รางวัลด้านล่าง */
        .footer-award {
            padding: 20px 0;
        }

        .footer-award img {
            height: 50px;
        }

        @media (max-width: 1024px) {
            header { flex-direction: column; align-items: center; text-align: center; }
            .cert-row { justify-content: center; }
            .main-content { flex-direction: column; align-items: center; text-align: center; margin-top: 20px; }
            .feature-item { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-block">
                <div class="logo">ELI.</div>
                <div class="cert-row">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/fssc-22001.png" alt="Halal">
                    <img src="images/fssc-22002.png" alt="USDA">
                    <img src="images/fssc-22003.png" alt="Kosher">
                    <img src="images/fssc-22004.png" alt="SGS">
                </div>
            </div>
        </header>

        <section class="main-content">
            <div class="feature-list">
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Artificial Flavor</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Coloring</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="product-display">
                <img src="images/fssc-22005.png" alt="ELI Product">
                <span class="price-tag">฿45.00</span>
                <a href="#" class="btn-buy">Shop Now</a>
            </div>
        </section>

        <footer class="footer-award">
            <img src="images/fssc-22006.png" alt="Taste Award">
        </footer>
    </div>

</body>
</html>

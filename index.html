<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            --gold-text: #C5A059;
            --glass-bg: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            /* พื้นหลังมีลายน้ำจางๆ ตามรูป */
            background-image: radial-gradient(circle at 10% 10%, rgba(0,0,0,0.02) 0%, transparent 50%);
            min-height: 100vh;
            color: #2D3436;
            padding: 40px;
        }

        /* --- Header: ชื่อบริษัทสีทองบรรทัดเดียว --- */
        .header {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--gold-text);
            line-height: 1;
        }

        .nav-pill {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 10px 35px;
            display: flex;
            gap: 25px;
            background: #fff;
        }

        .nav-pill a {
            text-decoration: none;
            color: #000;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        /* --- Main Content Layout --- */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* --- ฝั่งซ้าย: กล่อง Eli แบบหัวดำตามรูป --- */
        .info-card { width: 320px; }

        .eli-header-black {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 10px 10px 0 0;
        }

        .feature-list-box {
            background: #fff;
            padding: 30px 25px;
            border-radius: 0 0 25px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .feature-item {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 18px;
        }

        .check-icon {
            width: 22px; height: 22px;
            background: #27AE60;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        /* --- ฝั่งขวา: พื้นที่สินค้าขนาดใหญ่ขอบมน --- */
        .product-showcase {
            flex: 1;
            background: #fff;
            border-radius: 50px;
            padding: 60px 80px;
            box-shadow: 0 20px 70px rgba(0,0,0,0.06);
            position: relative;
            min-height: 700px;
        }

        /* กล่องค้นหาตามตำแหน่งในรูป */
        .search-bar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .search-input-box {
            width: 100%;
            max-width: 500px;
            border: 1.5px solid #E2E8F0;
            border-radius: 15px;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }

        .search-input-box span {
            font-weight: 700;
            color: #4A5568;
            font-size: 1.1rem;
        }

        .search-btn-blue {
            width: 32px; height: 32px;
            background: #3182CE;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        /* ปุ่ม present ย้ายมาอยู่เหนือข้อมูลสินค้าตามรูป */
        .present-btn-pill {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 10px 50px;
            display: inline-block;
            text-decoration: none;
            color: #000;
            font-weight: 900;
            font-size: 1rem;
            margin-bottom: 50px;
            background: #fff;
            transition: 0.3s;
        }

        .present-btn-pill:hover { background: #000; color: #fff; }

        /* ข้อมูลสินค้าและรูปภาพ */
        .product-layout {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .product-info-text { flex: 1; }

        .label-premium {
            color: var(--gold-text);
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .main-stats {
            font-size: 6.5rem; /* ขนาดใหญ่พิเศษตามรูป */
            font-weight: 900;
            line-height: 0.9;
            color: var(--brand-blue);
        }

        .main-stats span {
            display: block;
            font-size: 3rem;
            color: #CBD5E0;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .volume-big {
            font-size: 8rem; /* ขนาดใหญ่พิเศษตามรูป */
            font-weight: 950;
            color: #1A202C;
            margin: 0;
            letter-spacing: -3px;
        }

        .stars-row { color: #F6AD55; font-size: 1.8rem; margin-top: 20px; }

        /* รูปสินค้าพร้อมเงาที่สมจริง */
        .product-image-container {
            flex: 1;
            text-align: right;
            padding-top: 30px;
        }

        .product-image-container img {
            width: 100%;
            max-width: 420px;
            filter: drop-shadow(40px 50px 60px rgba(0,0,0,0.15));
            transform: rotate(3deg); /* เอียงเล็กน้อยตามรูป */
        }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="brand-title">EVER GOOD PARTNERS CO.,LTD.</h1>
        <nav class="nav-pill">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-container">
        <div class="info-card">
            <div class="eli-header-black">Eli</div>
            <div class="feature-list-box">
                <div class="feature-item"><div class="check-icon">✓</div> 100% Natural Coconut water</div>
                <div class="feature-item"><div class="check-icon">✓</div> No Sugar Added</div>
                <div class="feature-item"><div class="check-icon">✓</div> No Artificial Flavor</div>
                <div class="feature-item"><div class="check-icon">✓</div> No Coloring</div>
                <div class="feature-item"><div class="check-icon">✓</div> No Preservatives</div>
            </div>
        </div>

        <div class="product-showcase">
            <div class="search-bar-container">
                <div class="search-input-box">
                    <span>coconut water</span>
                    <div class="search-btn-blue">🔍</div>
                </div>
            </div>

            <a href="#" class="present-btn-pill">present</a>

            <div class="product-layout">
                <div class="product-info-text">
                    <p class="label-premium">PREMIUM EXPORT QUALITY</p>
                    <div class="main-stats">
                        18 months
                        <span>@ room temp.</span>
                    </div>
                    <div class="volume-big">330ml</div>
                    <div class="stars-row">★★★★★</div>
                </div>

                <div class="product-image-container">
                    <img src="images/fssc-22009.png" alt="Eli Coconut Pouch">
                </div>
            </div>
        </div>
    </main>

</body>
</html>

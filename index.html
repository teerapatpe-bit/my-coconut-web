<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELI | 100% Pure Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F2EFE9;
            --text-dark: #1C1D1B;      
            --text-light: #5A5A5A;
            --brand-green: #2B4C3B;    
            --brand-gold: #B5935E;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
        }

        /* --- Header & Navigation --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 50px 0;
            gap: 20px;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            color: var(--brand-green);
            line-height: 0.8;
            letter-spacing: -2px;
        }

        .cert-icons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .cert-icons img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }

        nav .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
            padding-top: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            white-space: nowrap;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--brand-green); }

        /* --- Hero / Product Showcase --- */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 70vh;
            padding: 40px 0 100px;
            gap: 60px;
        }

        .hero-text {
            flex: 1;
        }

        .hero-text h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 7vw, 5.5rem);
            font-weight: 800;
            line-height: 0.95;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: var(--text-light);
            max-width: 450px;
            margin-bottom: 40px;
        }

        /* --- Product Card (ตามรูปภาพ) --- */
        .product-card {
            flex: 1;
            background: var(--white);
            border-radius: 30px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        .product-card img {
            width: 100%;
            max-width: 400px;
            height: auto;
            object-fit: contain;
            margin-bottom: 30px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.08));
        }

        .product-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .product-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--brand-green);
        }

        .price-box {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .currency { font-size: 1.2rem; font-weight: 600; color: var(--brand-green); }
        .amount { font-size: 3rem; font-weight: 800; color: var(--brand-green); }

        .btn-shop {
            background-color: var(--brand-green);
            color: var(--white);
            padding: 18px 60px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-shop:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(43, 76, 59, 0.2);
        }

        /* --- Responsive --- */
        @media (max-width: 1100px) {
            header { flex-direction: column; }
            .nav-links { padding-top: 20px; flex-wrap: wrap; }
            .hero { flex-direction: column; text-align: center; }
            .hero-text p { margin: 0 auto 40px; }
            .product-card { width: 100%; max-width: 600px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-section">
                <div class="logo">ELI.</div>
               <div class="cert-box">
                <img src="images/fssc-22000.png" alt="cert">
                <img src="images/fssc-22001.png" alt="cert">
                <img src="images/fssc-22002.png" alt="cert">
                <img src="images/fssc-22003.png" alt="cert">
                <img src="images/fssc-22004.png" alt="cert">
             </div>
            </div>
            
            <nav>
                <ul class="nav-links">
                    <li><a href="#">Product Overview</a></li>
                    <li><a href="#">Factory Excellence</a></li>
                    <li><a href="#">Certification</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </header>

        <section class="hero">
            <div class="hero-text">
                <h1>NATURE'S<br>PUREST<br>HYDRATION.</h1>
                <p>100% Coconut Water from Thailand’s finest young coconuts. Sip Eli, Sip Elegance.</p>
            </div>

            <div class="product-card">
                <img src="images/fssc-22005.png" alt="ELI Premium Coconut Water">
                
                <div class="product-info">
                    <span class="product-name">Premium Coconut Water (330ml)</span>
                    <div class="price-box">
                        <span class="currency">฿</span>
                        <span class="amount">45.00</span>
                    </div>
                    <a href="#" class="btn-shop">Shop Now</a>
                </div>
            </div>
        </section>
    </div>

</body>
</html>

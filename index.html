<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --text-dark: #222222;
            --bg-light: #f8faf9;
            --divider-color: #eeeeee;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--bg-light); overflow-x: hidden; }

        /* --- HEADER --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            background: var(--white);
            position: relative;
            z-index: 100;
        }

        .brand-header { color: var(--gold); font-size: 1.8rem; font-weight: 700; line-height: 1.1; }
        .partners-text { color: var(--gold); font-size: 0.85rem; letter-spacing: 4px; margin-bottom: 15px; }
        
        .cert-icons { display: flex; gap: 15px; align-items: center; }
        .cert-icons img { height: 40px; mix-blend-mode: multiply; }

        .nav-menu { display: flex; list-style: none; gap: 50px; }
        .nav-menu li a {
            text-decoration: none; color: var(--text-dark); font-size: 0.85rem;
            font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s;
        }
        .nav-menu li a:hover { color: var(--accent-green); }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 800px;
            width: 100%;
            background-image: url('images/fssc-22013.png'); 
            background-size: cover;
            background-position: center right; 
            display: flex;
            align-items: center;
            padding: 0 8%;
        }

        .hero-top-icon {
            position: absolute;
            top: -15px;
            left: 8%;
            width: 240px;
            z-index: 15;
            mix-blend-mode: multiply; 
        }

        .hero-content h4 {
            color: var(--accent-green);
            font-size: 2.5rem; 
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 100px;
            margin-bottom: 5px;
        }

        /* หัวข้อหลักเน้นใหญ่ */
        .hero-content h1 { 
            color: var(--primary-green); 
            font-size: 7rem;
            line-height: 0.8;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0; 
            text-transform: uppercase;
        }

        /* ปรับให้เล็กลงมากตามต้องการ เพื่อให้ COCONUT เด่นขึ้น */
        .product-origin {
            color: var(--primary-green);
            font-size: 0.7rem; 
            font-weight: 400;
            margin-top: 10px; 
            margin-bottom: 45px; 
            letter-spacing: 5px; /* เพิ่มระยะห่างให้อารมณ์หรูหรา */
            text-transform: uppercase;
            opacity: 0.8;
        }

        .btn-more {
            background: var(--accent-green);
            color: var(--white);
            font-size: 1.4rem;
            padding: 18px 55px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(89, 128, 60, 0.3);
            transition: 0.3s;
        }
        .btn-more:hover { transform: scale(1.05); background: var(--primary-green); }

        /* --- FEATURES BAR --- */
        .features-bar {
            background: var(--white);
            margin: -60px 80px 40px;
            padding: 25px 40px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 15px 45px rgba(0,0,0,0.08);
            position: relative;
            z-index: 20;
        }
        .feature-item { flex: 1; display: flex; align-items: center; gap: 12px; justify-content: center; position: relative; }
        .feature-item:not(:last-child)::after { content: ""; position: absolute; right: 0; height: 40px; width: 1px; background-color: var(--divider-color); }
        .f-icon-circle { width: 50px; height: 50px; background: #5a7e3d; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; }
        .f-text b { display: block; font-size: 1.1rem; color: var(--primary-green); font-weight: 700; }
        .f-text span { font-size: 0.75rem; color: #666; }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            .hero-content h1 { font-size: 6rem; }
            .product-origin { font-size: 0.6rem !important; letter-spacing: 3px; margin-bottom: 30px; }
            .features-bar { margin: -40px 40px 30px; padding: 15px 20px; border-radius: 40px; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC 22000">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA Organic">
                <img src="images/fssc-22003.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="Superior Taste Award">
            </div>
        </div>

        <nav class="nav-section">
            <ul class="nav-menu">
                <li><a href="overview.html">OVERVIEW</a></li>
                <li><a href="#production">PRODUCTION</a></li>
                <li><a href="#certification">CERTIFICATION</a></li>
                <li><a href="#contact">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <img src="images/fssc-22007.png" alt="Eli Logo" class="hero-top-icon">
        
        <div class="hero-content">
            <h4>100% NATURAL</h4>
            <h1>COCONUT<br>WATER </h1>
            <h3 class="product-origin">PRODUCT OF THAILAND</h3>
            <a href="overview.html" class="btn-more">
                330 ml <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon-circle"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon-circle"><i class="fas fa-cubes"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon-circle"><i class="fas fa-flask"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon-circle"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon-circle"><i class="fas fa-shield"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

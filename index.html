<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Montserrat:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            --gold-gradient: linear-gradient(135deg, #C5A059 0%, #F1D592 50%, #B8860B 100%);
            /* ปรับพื้นหลังกล่องให้มีความนวลและโปร่งแสงมากขึ้น (0.4) */
            --glass-panel: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            /* ปรับพื้นหลังให้ดูสะอาดตาและเชื่อมต่อกับตัวขวดได้ดีขึ้น */
            background: radial-gradient(circle at 70% 30%, rgba(255,255,255,1) 0%, rgba(242, 246, 249, 0.8) 100%), 
                        url('images/fssc-22007.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header Section --- */
        .header {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 35px 5% 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem; /* ลดขนาดลงอีกเล็กน้อยเพื่อให้ดูแพง */
            font-weight: 500;
            letter-spacing: 2px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .slogan {
            font-size: 0.6rem;
            font-weight: 700;
            color: #94A3B8;
            letter-spacing: 4px;
            margin: 4px 0 12px;
        }

        .cert-logos {
            display: flex;
            gap: 12px;
        }

        .cert-logos img {
            height: 24px; /* ปรับขนาดโลโก้ให้กะทัดรัด */
            opacity: 0.8;
        }

        /* --- Content Layout --- */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 5% 40px;
            display: flex;
            gap: 30px;
            align-items: center;
        }

        /* --- Eli Info Card (Compact Version) --- */
        .info-side {
            width: 280px; /* ลดความกว้างกล่อง Eli ลง */
            z-index: 2;
        }

        .eli-badge {
            background: #000;
            color: #fff;
            padding: 6px 20px;
            border-radius: 10px 10px 0 0;
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
        }

        .feature-box {
            background: var(--glass-panel);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 0 18px 18px 18px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.02);
        }

        .feature-item {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem; /* ลดขนาดตัวอักษรลง */
            font-weight: 600;
            margin-bottom: 10px;
            color: #475569;
        }

        .feature-item::before {
            content: '✓';
            width: 16px;
            height: 16px;
            background: #27AE60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
        }

        /* --- Product Showcase (ปรับขนาดให้เล็กลงและนวลขึ้น) --- */
        .product-display {
            flex: 1;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            border-radius: 35px;
            padding: 40px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            min-height: 400px;
        }

        .product-text {
            max-width: 200px;
        }

        .product-text h2 {
            font-size: 2.5rem; /* ลดขนาดหัวข้อ */
            color: var(--brand-blue);
            font-weight: 800;
            line-height: 1.1;
        }

        .product-text .vol {
            font-size: 3rem; /* ลดขนาดตัวเลขปริมาณ */
            font-weight: 800;
            margin: 10px 0;
            color: #1E293B;
        }

        .bottle-img {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .bottle-img img {
            max-width: 320px; /* ลดขนาดขวดลง (เดิมประมาณ 400-480px) */
            width: 100%;
            /* ปรับเงาให้ฟุ้งจางๆ เพื่อความกลมกลืน */
            filter: drop-shadow(10px 15px 30px rgba(0,0,0,0.06));
            transform: rotate(2.5deg);
            transition: transform 0.4s ease;
        }

        .bottle-img img:hover {
            transform: rotate(0deg) scale(1.02);
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="brand-group">
            <h1 class="brand-title">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="slogan">PARTNERS IN PURITY.</p>
            <div class="cert-logos">
                <img src="images/fssc-22000.png" alt="Certification">
                <img src="images/fssc-22001.png" alt="Certification">
                <img src="images/fssc-22002.png" alt="Certification">
                <img src="images/fssc-22003.png" alt="Certification">
                <img src="images/fssc-22004.png" alt="Certification">
            </div>
        </div>
        <nav class="nav-links">
            <a href="#" style="color: #64748B; font-size: 0.7rem;">OVERVIEW</a>
            <a href="#" style="color: #64748B; font-size: 0.7rem;">PRODUCTION</a>
            <a href="#" style="color: #64748B; font-size: 0.7rem;">CERTIFICATION</a>
            <a href="#" style="color: #64748B; font-size: 0.7rem;">CONTACT</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-side">
            <div class="eli-badge">Eli</div>
            <div class="feature-box">
                <ul>
                    <li class="feature-item">100% Natural Coconut water</li>
                    <li class="feature-item">No Sugar Added</li>
                    <li class="feature-item">No Artificial Flavor</li>
                    <li class="feature-item">No Coloring</li>
                    <li class="feature-item">No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="product-display">
            <div class="product-text">
                <p style="color:#94A3B8; font-weight:700; font-size:0.65rem; letter-spacing:1.5px; margin-bottom:8px; text-transform:uppercase;">Premium Quality</p>
                <h2>18 months <span style="display:block; font-size:1.2rem; color:#64748B; font-weight:400;">@ room temp.</span></h2>
                <div class="vol">330ml</div>
                <div style="color: #FACC15; font-size: 1rem;">★★★★★</div>
            </div>
            <div class="bottle-img">
                <img src="images/fssc-22009.png" alt="Eli Coconut Water 330ml">
            </div>
        </div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --green: #2B4C3B; --blue: #4A90E2; --bg-white: rgba(248, 247, 245, 0.93); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: #111; 
            line-height: 1.6; 
            overflow-x: hidden;
            /* ใส่พื้นหลังเป็นรูป fssc-22007.png ตามโครงสร้างไฟล์ */
            background-image: linear-gradient(var(--bg-white), var(--bg-white)), url('images/fssc-22007.png');
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 60px; display: grid; grid-template-columns: 1fr 1.1fr; gap: 80px; align-items: center; min-height: 90vh; }
        
        /* ข้อมูลแบรนด์และจุดเด่น */
        .brand { font-family: 'Montserrat', sans-serif; font-size: 4rem; color: var(--green); margin-bottom: 20px; font-weight: 900; }
        .cert-icons { display: flex; gap: 12px; margin-bottom: 40px; }
        .cert-icons img { height: 26px; opacity: 0.6; } /* แก้ไขปัญหาภาพไอคอนไม่โหลด */
        
        .feat-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-size: 1.5rem; font-weight: 800; }
        .check { color: #7ED321; font-weight: 900; }

        /* ส่วนแสดงผลขวดน้ำ (Interactive Area) */
        .display-box { display: flex; flex-direction: column; align-items: center; }
        .info-text { align-self: flex-start; margin-bottom: 10px; }
        .info-text b { font-size: 2.6rem; color: var(--blue); display: block; font-weight: 900; }
        .info-text span { font-size: 1.4rem; color: var(--blue); font-weight: 700; }

        .bottle-img { width: 280px; filter: drop-shadow(0 40px 60px rgba(0,0,0,0.12)); transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); animation: float 4s infinite ease-in-out; margin: 20px 0; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* ระบบเลือกขนาดแบบ Hover & Expand */
        .selector { display: flex; gap: 20px; width: 100%; max-width: 480px; margin-bottom: 35px; }
        .size-btn { flex: 1; background: #FFF; border-radius: 25px; padding: 25px; text-align: center; cursor: pointer; border: 2.5px solid transparent; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: 0.4s; }
        .size-btn:hover { transform: scale(1.1); box-shadow: 0 20px 45px rgba(0,0,0,0.08); }
        .size-btn.active { border-color: var(--green); }
        .size-btn img { height: 50px; margin-bottom: 10px; }
        .size-btn b { display: block; font-size: 1.2rem; font-weight: 900; }
        .size-btn p { font-size: 0.75rem; font-weight: 800; color: #BBB; text-transform: uppercase; }

        .shop-btn { background: var(--green); color: #FFF; width: 100%; max-width: 480px; padding: 25px; border-radius: 100px; text-decoration: none; font-weight: 900; text-align: center; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 15px 35px rgba(43,76,59,0.25); display: block; }

        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; text-align: center; } .cert-icons, .feat-item { justify-content: center; } .info-text { align-self: center; } }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="brand">ELI.</div>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC"> <img src="images/fssc-22001.png" alt="Halal"> 
                <img src="images/fssc-22002.png" alt="USDA"> <img src="images/fssc-22003.png" alt="Kosher"> 
                <img src="images/fssc-22004.png" alt="SGS">
            </div>
            <div class="feat-item"><span class="check">✓</span> 100% Natural Coconut water</div>
            <div class="feat-item"><span class="check">✓</span> No Sugar Added</div>
            <div class="feat-item"><span class="check">✓</span> No Preservatives</div>
        </div>
        
        <div class="display-box">
            <div class="info-text"><b>18 months</b><span>@ room temp.</span></div>
            <img src="images/fssc-22005.png" id="mainBottle" class="bottle-img" alt="330ml bottle">
            <div class="selector">
                <div class="size-btn active" onmouseover="changeImg('330ml')" onclick="setActive(this)">
                    <img src="images/fssc-22005.png" alt="330ml"><b>330ml</b><p>PRESENT</p>
                </div>
                <div class="size-btn" onmouseover="changeImg('1000ml')" onclick="setActive(this)">
                    <img src="images/fssc-22006.png" style="transform: scale(1.2)" alt="1000ml"><b>1000ml</b><p>FUTURE</p>
                </div>
            </div>
            <a href="#" class="shop-btn">Shop Now</a>
        </div>
    </div>
    <script>
        function changeImg(s) { const h = document.getElementById('mainBottle'); h.style.transform = (s === '1000ml') ? 'scale(1.15)' : 'scale(1)'; }
        function setActive(e) { document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); e.classList.add('active'); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --text-dark: #333333;
            --bg-light: #f8faf9;
            --divider-color: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--bg-light); }

        /* --- ปรับขนาดส่วน HEADER ให้ใหญ่ขึ้น --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px; /* เพิ่ม Padding บน-ล่าง */
            background: var(--white);
            position: relative;
            z-index: 100;
        }

        /* ขยายขนาดชื่อบริษัท */
        .brand-header { 
            color: var(--gold); 
            font-size: 1.8rem; /* เพิ่มจาก 1.35rem */
            font-weight: 700; 
            line-height: 1.1;
        }

        /* ขยายขนาดคำขวัญ */
        .partners-text { 
            color: var(--gold); 
            font-size: 0.9rem; /* เพิ่มจาก 0.75rem */
            letter-spacing: 4px; 
            margin-bottom: 15px; 
        }

        /* ขยายขนาดไอคอน Certification (อ้างอิงจาก image_31dad3.png) */
        .cert-icons { 
            display: flex; 
            gap: 15px; 
        }

        .cert-icons img { 
            height: 45px; /* เพิ่มขนาดจากเดิมเพื่อให้เห็นรายละเอียดชัดขึ้น */
            mix-blend-mode: multiply; 
        }

        .nav-section { display: flex; align-items: center; gap: 40px; }
        .nav-menu { display: flex; list-style: none; gap: 30px; }
        .nav-menu li a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .search-container {
            width: 50px;
            height: 50px;
            background: #f5f5f5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-green);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 650px;
            background: url('images/fssc-22018.png') no-repeat center right;
            background-size: cover;
            display: flex;
            align-items: center;
            padding: 0 10%;
        }

        /* ขยายขนาดโลโก้ Eli ในหน้า Hero (อ้างอิงจาก image_267e06.png) */
        .hero-top-icon {
            position: absolute;
            top: 50px;
            left: 10%;
            width: 250px; /* เพิ่มขนาดให้ดูเด่นขึ้น */
            z-index: 15;
        }

        .hero-content h1 { 
            color: var(--primary-green); 
            font-size: 6.5rem; 
            line-height: 0.9; 
            font-weight: 800; 
            margin-bottom: 30px;
        }

        /* --- FEATURES BAR (อ้างอิงจาก image_27f5c4.png) --- */
        .features-bar {
            background: var(--white);
            margin: -60px 80px 40px;
            padding: 30px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            position: relative;
            z-index: 20;
        }

        .feature-item { flex: 1; display: flex; align-items: center; gap: 15px; justify-content: center; position: relative; }
        .feature-item:not(:last-child)::after {
            content: ""; position: absolute; right: 0; height: 40px; width: 1px; background: var(--divider-color);
        }

        .f-icon { 
            width: 60px; height: 60px; background: var(--accent-green); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; color: white; font-size: 1.5rem;
        }

        .f-text b { display: block; font-size: 1.2rem; color: var(--primary-green); }
        .f-text span { font-size: 0.75rem; color: #666; display: block; }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/cert-fssc.png" alt="FSSC 22000">
                <img src="images/cert-halal.png" alt="Halal">
                <img src="images/cert-usda.png" alt="USDA Organic">
                <img src="images/cert-kosher.png" alt="Kosher">
                <img src="images/cert-brc.png" alt="BRC Quality">
            </div>
        </div>

        <div class="nav-section">
            <ul class="nav-menu">
                <li><a href="#">Overview</a></li>
                <li><a href="#">Production</a></li>
                <li><a href="#">Certification</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="search-container">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </header>

    <section class="hero">
        <img src="images/eli-logo.png" alt="Eli Logo" class="hero-top-icon">
        <div class="hero-content">
            <h4 style="color: var(--accent-green); font-size: 2rem;">100% NATURAL</h4>
            <h1>Coconut<br>Water</h1>
            <a href="#" style="background: var(--accent-green); color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 700; display: inline-block;">
                DISCOVER MORE <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-cubes-stacked"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-vial"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-halved"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

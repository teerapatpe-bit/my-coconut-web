<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700;900&family=Montserrat:wght@200;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            --gold-gradient: linear-gradient(135deg, #C5A059 0%, #F1D592 50%, #B8860B 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(245, 247, 250, 0.9), rgba(245, 247, 250, 0.9)), 
                        url('images/fssc-22007.png') no-repeat center center fixed;
            background-size: cover;
            color: #333;
        }

        /* --- Professional Header --- */
        .header {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 200; /* ตัวบางแบบพรีเมียม */
            letter-spacing: 6px; /* เพิ่มระยะห่างตัวอักษร */
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .nav-links a {
            text-decoration: none;
            color: #444;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-left: 40px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--brand-blue); }

        /* --- Main Content Layout --- */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 5% 100px;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 60px;
            align-items: center;
        }

        /* --- Eli & Info Section (Professional Look) --- */
        .info-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0; /* รวมกล่องเข้าด้วยกัน */
        }

        .eli-brand-tag {
            background: #000;
            color: #fff;
            padding: 15px 40px;
            border-radius: 20px 20px 0 0; /* มนแค่ด้านบน */
            display: inline-block;
            width: fit-content;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
        }

        .feature-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 0 30px 30px 30px; /* มนต่อเนื่องจาก Eli */
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }

        .feature-list { list-style: none; }
        
        .feature-list li {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 20px;
            color: #2D3436;
        }

        .feature-list li::before {
            content: '✓';
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: #27AE60;
            color: white;
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: 900;
        }

        /* --- Product Showcase --- */
        .product-display {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(30px);
            border-radius: 60px;
            padding: 60px;
            border: 1.5px solid rgba(255,255,255,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
        }

        .product-info h2 {
            font-size: 3.5rem;
            color: var(--brand-blue);
            font-weight: 900;
            line-height: 0.9;
        }

        .product-info .sub-text {
            font-size: 1.5rem;
            color: #636E72;
            font-weight: 400;
            margin-top: 10px;
            display: block;
        }

        .product-info .volume {
            font-size: 4rem;
            font-weight: 900;
            margin: 20px 0;
            color: #111;
        }

        .bottle-visual {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .bottle-visual img {
            width: 120%;
            max-width: 480px;
            filter: drop-shadow(30px 40px 60px rgba(0,0,0,0.15));
            transform: rotate(3deg);
        }

        .certifications {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .certifications img {
            height: 32px;
            opacity: 0.8;
            filter: grayscale(100%);
            transition: 0.3s;
        }

        .certifications img:hover {
            opacity: 1;
            filter: grayscale(0%);
        }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="brand-title">Ever Good Partners</h1>
        <nav class="nav-links">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-container">
        <div class="info-wrapper">
            <div class="eli-brand-tag">Eli</div>
            
            <div class="feature-card">
                <div class="certifications">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/fssc-22001.png" alt="Halal">
                    <img src="images/fssc-22002.png" alt="USDA">
                    <img src="images/fssc-22003.png" alt="Kosher">
                </div>
                <hr style="border: none; border-top: 1px solid rgba(0,0,0,0.05); margin: 25px 0;">
                <ul class="feature-list">
                    <li>100% Natural Coconut water</li>
                    <li>No Sugar Added</li>
                    <li>No Artificial Flavor</li>
                    <li>No Coloring</li>
                    <li>No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="product-display">
            <div class="product-info">
                <p style="text-transform: uppercase; letter-spacing: 3px; font-weight: 700; color: #B2BEC3; margin-bottom: 15px; font-size: 0.75rem;">Premium Export Quality</p>
                <h2>18 months <span class="sub-text">Shelf-life at room temp.</span></h2>
                <div class="volume">330ml</div>
                <div style="color: #F1C40F; font-size: 1.2rem;">★★★★★</div>
            </div>
            <div class="bottle-visual">
                <img src="images/fssc-22008.png" alt="Eli Coconut Water Product">
            </div>
        </div>
    </main>

</body>
</html>

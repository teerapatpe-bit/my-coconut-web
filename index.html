<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            --gold-gradient: linear-gradient(135deg, #C5A059 0%, #F1D592 50%, #B8860B 100%);
            --glass-white: rgba(255, 255, 255, 0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            background-image: radial-gradient(circle at 80% 20%, rgba(197, 160, 89, 0.1), transparent 40%),
                              radial-gradient(circle at 20% 80%, rgba(26, 79, 139, 0.05), transparent 40%);
            min-height: 100vh;
            color: #2D3436;
        }

        /* --- Header --- */
        .header {
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-pill {
            border: 1.5px solid #000;
            border-radius: 50px;
            padding: 8px 25px;
            display: flex;
            gap: 20px;
            background: white;
        }

        .nav-pill a {
            text-decoration: none;
            color: #000;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        /* --- Layout --- */
        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 5% 50px;
            display: flex;
            gap: 30px;
        }

        /* --- Left Side: Eli Info --- */
        .info-side { width: 300px; }

        .eli-header {
            background: #000;
            color: #fff;
            border-radius: 12px 12px 0 0;
            padding: 10px;
            text-align: center;
            font-weight: 900;
            font-size: 1.4rem;
        }

        .feature-box {
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .feature-item {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .feature-item::before {
            content: '✓';
            width: 20px; height: 20px;
            background: #27AE60;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        /* --- Right Side: Showcase (The Mood) --- */
        .showcase-card {
            flex: 1;
            background: white;
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* แสงฟุ้งกระจายด้านหลังสินค้า */
        .showcase-card::after {
            content: '';
            position: absolute;
            top: 50%; right: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.15), transparent 70%);
            z-index: 0;
        }

        /* Search Box */
        .search-container {
            align-self: center;
            width: 100%;
            max-width: 480px;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }

        .search-box {
            background: #fff;
            border: 1px solid #E2E8F0;
            border-radius: 15px;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .search-box span { font-weight: 700; color: #4A5568; font-size: 1.1rem; }
        .search-icon { 
            width: 28px; height: 28px; 
            background: #3182CE; 
            border-radius: 8px; 
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1rem;
        }

        /* Present Button Location */
        .present-area { margin-bottom: 20px; z-index: 2; }
        .present-btn {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 10px 50px;
            text-decoration: none;
            color: #000;
            font-weight: 800;
            display: inline-block;
            transition: 0.3s;
            background: white;
        }
        .present-btn:hover { background: #000; color: #fff; }

        /* Product Main Layout */
        .product-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1;
            gap: 20px;
        }

        .product-text { flex: 1; }
        
        .label-export {
            color: #C5A059;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .text-18 {
            font-size: 5rem;
            color: var(--brand-blue);
            font-weight: 800;
            line-height: 0.9;
        }

        .text-18 span {
            display: block;
            font-size: 2.2rem;
            color: #A0AEC0;
            font-weight: 400;
            margin-top: 5px;
        }

        .text-330 {
            font-size: 6rem;
            font-weight: 900;
            color: #1A202C;
            margin: 10px 0;
        }

        .stars { color: #F6AD55; font-size: 1.5rem; }

        /* การแต่งรูปสินค้าให้ดูน่าซื้อ */
        .product-img {
            flex: 1;
            text-align: right;
            position: relative;
        }

        .product-img img {
            max-width: 420px;
            width: 100%;
            /* เงาสินค้าแบบนุ่มนวลให้ดูมีมิติ */
            filter: drop-shadow(30px 40px 50px rgba(0,0,0,0.15));
            transform: rotate(2deg);
            transition: transform 0.5s ease;
        }

        .product-img:hover img {
            transform: rotate(0deg) scale(1.02);
        }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="brand-title">EVER GOOD PARTNERS CO.,LTD.</h1>
        <nav class="nav-pill">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-side">
            <div class="eli-header">Eli</div>
            <div class="feature-box">
                <ul class="feature-list">
                    <li class="feature-item">100% Natural Coconut water</li>
                    <li class="feature-item">No Sugar Added</li>
                    <li class="feature-item">No Artificial Flavor</li>
                    <li class="feature-item">No Coloring</li>
                    <li class="feature-item">No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="showcase-card">
            <div class="search-container">
                <div class="search-box">
                    <span>coconut water</span>
                    <div class="search-icon">🔍</div>
                </div>
            </div>

            <div class="present-area">
                <a href="#" class="present-btn">present</a>
            </div>

            <div class="product-body">
                <div class="product-text">
                    <p class="label-export">PREMIUM EXPORT QUALITY</p>
                    <h2 class="text-18">18 months <span>@ room temp.</span></h2>
                    <div class="text-330">330ml</div>
                    <div class="stars">★★★★★</div>
                </div>

                <div class="product-img">
                    <img src="images/fssc-22009.png" alt="Eli Coconut Water">
                </div>
            </div>
        </div>
    </main>

</body>
</html>

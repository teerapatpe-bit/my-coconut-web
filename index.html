<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            /* สีทอง Gradient แบบพรีเมียม */
            --gold-gradient: linear-gradient(135deg, #C5A059 0%, #F1D592 50%, #B8860B 100%);
            --gold-solid: #C5A059;
            --glass-bg: rgba(255, 255, 255, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.8), rgba(235, 240, 245, 0.7));
            background-size: cover;
            min-height: 100vh;
            color: #2D3436;
        }

        /* --- ส่วนหัวบริษัท --- */
        .header {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 5% 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            /* ใช้สีทอง Gradient ตามบรีฟ */
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cert-row {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .cert-row img { height: 28px; }

        /* --- เมนูนำทางทรงแคปซูล --- */
        .nav-pill {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 8px 30px;
            display: flex;
            gap: 20px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
        }

        .nav-pill a {
            text-decoration: none;
            color: #000;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* --- Layout หลัก --- */
        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 5% 50px;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        /* --- กล่อง Eli (Double Pill Design) --- */
        .info-side { width: 340px; }

        .eli-pill-header {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 8px 0;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: #000;
            margin-bottom: 10px;
        }

        .feature-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .feature-item {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 700; /* เน้นตัวหนาตามต้องการ */
        }

        .feature-item::before {
            content: '✓';
            width: 18px; height: 18px;
            background: #27AE60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }

        .present-btn {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: #000;
            font-weight: 800;
            transition: 0.3s;
        }

        .present-btn:hover { background: #000; color: #fff; }

        /* --- พื้นที่แสดงสินค้า --- */
        .product-display {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .shelf-life {
            font-size: 3.5rem;
            color: var(--brand-blue);
            font-weight: 800;
            line-height: 1.1;
        }

        .shelf-life span {
            display: block;
            font-size: 1.8rem;
            color: #718096;
            font-weight: 400;
        }

        .volume {
            font-size: 4.8rem;
            font-weight: 900;
            color: #1a202c;
            margin: 10px 0;
        }

        .stars { color: #F1C40F; font-size: 1.3rem; }

        .bottle-img img {
            max-width: 400px;
            filter: drop-shadow(20px 25px 40px rgba(0,0,0,0.1));
        }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h1 class="brand-title">EVER GOOD PARTNERS</h1>
            <div class="cert-row">
                <img src="cert1.png" alt="FSSC 22000">
                <img src="cert2.png" alt="Halal">
                <img src="cert3.png" alt="USDA">
                <img src="cert4.png" alt="Kosher">
            </div>
        </div>
        
        <nav class="nav-pill">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-side">
            <div class="eli-pill-header">Eli</div>
            <div class="feature-box">
                <ul>
                    <li class="feature-item">100% Natural Coconut water</li>
                    <li class="feature-item">No Sugar Added</li>
                    <li class="feature-item">No Artificial Flavor</li>
                    <li class="feature-item">No Coloring</li>
                    <li class="feature-item">No Preservatives</li>
                </ul>
                <a href="#" class="present-btn">present</a>
            </div>
        </div>

        <div class="product-display">
            <div class="product-text">
                <p style="color: var(--gold-solid); font-weight: 800; letter-spacing: 2px;">PREMIUM EXPORT QUALITY</p>
                <h2 class="shelf-life">18 months <span>Shelf-life at room temp.</span></h2>
                <div class="volume">330ml</div>
                <div class="stars">★★★★★</div>
            </div>
            <div class="bottle-img">
                <img src="eli-pouch.png" alt="Eli Coconut Water">
            </div>
        </div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS CO., LTD.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B6CB0;
            --gold-gradient: linear-gradient(to bottom, #D4AF37 0%, #F1D592 50%, #B8860B 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            /* พื้นหลังหลัก fssc-22007 */
            background: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), 
                        url('images/fssc-22007.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* เมนูบาร์ */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 8% 10px;
            gap: 30px;
        }
        header a { 
            text-decoration: none; 
            color: #111; 
            font-weight: 800; 
            font-size: 0.85rem; 
            text-transform: uppercase;
        }

        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 6% 60px; /* ลด padding top ลงเพื่อให้ชื่อแบรนด์สูงขึ้น */
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            align-items: flex-start; /* เปลี่ยนเป็น flex-start เพื่อให้เนื้อหาดันขึ้นบนสุด */
            gap: 50px;
            flex: 1;
            margin-top: 20px;
        }

        /* --- ย้ายชื่อแบรนด์ขึ้นมาบนสุด --- */
        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.8rem; /* เพิ่มขนาดเล็กน้อยให้ดูอลังการ */
            line-height: 0.95;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-transform: uppercase;
            padding-top: 0; /* ดันขึ้นสุด */
        }

        .slogan {
            font-size: 1.1rem;
            font-weight: 800;
            color: #7f8c8d;
            letter-spacing: 5px;
            margin-bottom: 35px;
        }

        .cert-group {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        .cert-group img {
            height: 42px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
        }

        .details-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid white;
        }
        .details-card li { display: flex; align-items: center; gap: 12px; font-weight: 700; margin-bottom: 15px; list-style: none; font-size: 1.05rem; }
        .details-card li::before { content: '✓'; color: #2ecc71; font-weight: 900; }

        .present-btn {
            width: 100%;
            padding: 18px;
            border: 3px solid #000;
            border-radius: 22px;
            text-align: center;
            font-weight: 900;
            font-size: 1.5rem;
            margin-top: 10px;
        }

        /* --- กล่องสินค้าฝั่งขวา --- */
        .product-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            border-radius: 60px;
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
        }

        .search-ui {
            background: #fff;
            border-radius: 22px;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
        }
        .search-ui span { color: var(--brand-blue); font-weight: 900; font-size: 1.7rem; }

        .content-flex { display: flex; align-items: center; gap: 20px; }

        .text-info { flex: 1; }
        .text-info h2 { font-size: 2.3rem; color: var(--brand-blue); font-weight: 900; line-height: 1.1; margin-bottom: 25px; }
        .text-info .room-temp { font-size: 1.9rem; display: block; color: #555; }

        .size-text { font-size: 3.8rem; font-weight: 900; }
        .rating { color: #f1c40f; font-size: 1.8rem; margin-top: 10px; }

        .bottle-wrap { flex: 1.3; display: flex; justify-content: center; }
        .bottle-img {
            width: 125%;
            max-width: 400px;
            mix-blend-mode: multiply;
            filter: drop-shadow(20px 30px 60px rgba(0,0,0,0.2));
            transform: rotate(5deg);
        }

    </style>
</head>
<body>

    <header>
        <a href="#">OVERVIEW</a>
        <a href="#">PRODUCTION</a>
        <a href="#">CERTIFICATION</a>
        <a href="#">CONTACT</a>
    </header>

    <div class="main-wrapper">
        <div class="left-side">
            <h1 class="brand-title">EVER GOOD<br>PARTNERS CO., LTD.</h1>
            <p class="slogan">PARTNERS IN PURITY.</p>
            
            <div class="cert-group">
                <img src="images/fssc-22000.png" alt="Standard">
                <img src="images/fssc-22001.png" alt="Standard">
                <img src="images/fssc-22002.png" alt="Standard">
                <img src="images/fssc-22003.png" alt="Standard">
                <img src="images/fssc-22004.png" alt="Standard">
            </div>

            <div class="details-card">
                <ul>
                    <li>100% Natural Coconut water</li>
                    <li>No Sugar Added</li>
                    <li>No Artificial Flavor</li>
                    <li>No Coloring</li>
                    <li>No Preservatives</li>
                </ul>
                <div class="present-btn">PRESENT</div>
            </div>
        </div>

        <div class="product-panel">
            <div class="search-ui">
                <span>coconut water</span>
                <div style="background: var(--brand-blue); color:white; padding:10px 14px; border-radius:12px;">🔍</div>
            </div>

            <div class="content-flex">
                <div class="text-info">
                    <p style="color:#888; font-weight:700; margin-bottom:12px;">SEO. www.evergood.co.th</p>
                    <h2>18 months<span class="room-temp">@ room temp.</span></h2>
                    <div class="size-text">300ml</div>
                    <div class="rating">★★★★★</div>
                </div>

                <div class="bottle-wrap">
                    <img src="images/fssc-22008.png" class="bottle-img" alt="Product Image">
                </div>
            </div>
        </div>
    </div>

</body>
</html>

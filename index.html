<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Montserrat:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            --gold-gradient: linear-gradient(135deg, #C5A059 0%, #F1D592 50%, #B8860B 100%);
            /* ปรับความโปร่งใสของพื้นหลังกล่องให้กลมกลืนขึ้น (0.6) */
            --glass-panel: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            /* พื้นหลังไล่เฉดสีแบบนวลๆ เพื่อให้ภาพดูสะอาดตา */
            background: radial-gradient(circle at top right, rgba(255,255,255,0.9), rgba(240, 244, 248, 0.8)), 
                        url('images/fssc-22007.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        /* --- Header Section --- */
        .header {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 5% 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem; /* ลดขนาดลงเล็กน้อยตามบรีฟ */
            font-weight: 500;
            letter-spacing: 3px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .slogan {
            font-size: 0.65rem;
            font-weight: 700;
            color: #8E9AAF;
            letter-spacing: 4px;
            margin: 5px 0 15px;
        }

        .cert-logos {
            display: flex;
            gap: 15px;
        }

        .cert-logos img {
            height: 28px;
            opacity: 0.85;
        }

        .nav-links a {
            text-decoration: none;
            color: #2D3436;
            font-weight: 700;
            font-size: 0.75rem;
            margin-left: 25px;
            text-transform: uppercase;
        }

        /* --- Content Layout --- */
        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 5% 50px;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        /* --- Eli Info Card (ปรับขนาดให้เล็กลงและโปร่งแสง) --- */
        .info-side {
            width: 320px; /* ลดความกว้างกล่องข้อมูล */
        }

        .eli-badge {
            background: #000;
            color: #fff;
            padding: 8px 25px;
            border-radius: 12px 12px 0 0;
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
        }

        .feature-box {
            background: var(--glass-panel);
            backdrop-filter: blur(15px); /* เอฟเฟกต์กระจกฝ้า */
            padding: 25px;
            border-radius: 0 20px 20px 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .feature-item {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #4A5568;
        }

        .feature-item::before {
            content: '✓';
            width: 18px;
            height: 18px;
            background: #27AE60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }

        /* --- Product Showcase (ปรับให้ดูกลมกลืน) --- */
        .product-display {
            flex: 1;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-text h2 {
            font-size: 3rem;
            color: var(--brand-blue);
            font-weight: 800;
            line-height: 1;
        }

        .product-text .vol {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 15px 0 5px;
        }

        .bottle-img {
            position: relative;
        }

        .bottle-img img {
            max-width: 400px;
            width: 100%;
            /* ใส่เงาแบบจางๆ ให้ดูเป็นธรรมชาติ */
            filter: drop-shadow(15px 20px 40px rgba(0,0,0,0.08));
            transform: rotate(2deg);
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="brand-group">
            <h1 class="brand-title">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="slogan">PARTNERS IN PURITY.</p>
            <div class="cert-logos">
                <img src="images/fssc-22000.png" alt="Certification">
                <img src="images/halal.png" alt="Certification">
                <img src="images/usda.png" alt="Certification">
                <img src="images/kosher.png" alt="Certification">
                <img src="images/taste.png" alt="Certification">
            </div>
        </div>
        <nav class="nav-links">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-side">
            <div class="eli-badge">Eli</div>
            <div class="feature-box">
                <ul>
                    <li class="feature-item">100% Natural Coconut water</li>
                    <li class="feature-item">No Sugar Added</li>
                    <li class="feature-item">No Artificial Flavor</li>
                    <li class="feature-item">No Coloring</li>
                    <li class="feature-item">No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="product-display">
            <div class="product-text">
                <p style="color:#A0AEC0; font-weight:700; font-size:0.7rem; letter-spacing:2px; margin-bottom:10px;">PREMIUM EXPORT QUALITY</p>
                <h2>18 months <span style="display:block; font-size:1.4rem; color:#718096; font-weight:400;">@ room temp.</span></h2>
                <div class="vol">330ml</div>
                <div style="color: #F1C40F; font-size: 1.1rem;">★★★★★</div>
            </div>
            <div class="bottle-img">
                <img src="images/eli-pouch.png" alt="Eli Coconut Water Product">
            </div>
        </div>
    </main>

</body>
</html>

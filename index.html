<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ever good partne.co ltd | 100% Pure Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        /* ตั้งค่าสีตามรูปภาพใหม่ */
        :root { 
            --brand-green: #2B4C3B; 
            --soft-blue: #4A90E2; 
            --bg-overlay: rgba(248, 247, 245, 0.85); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: #111; 
            background-image: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('images/fssc-22007.png');
            background-attachment: fixed;
            background-position: center;
            background-size: contain;
        }

        /* ส่วนหัวที่ปรับชื่อแบรนด์ใหม่ */
        header {
            width: 100%;
            padding: 60px 80px 10px 80px;
        }

        .brand { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 5.5rem; /* ปรับขนาดให้พอดีกับชื่อที่ยาวขึ้น */
            color: var(--brand-green); 
            font-weight: 900; 
            letter-spacing: -2px; 
            line-height: 0.9; 
            text-transform: lowercase; /* ใช้ตัวพิมพ์เล็กตามรูป */
        }

        .cert-icons { display: flex; gap: 15px; margin-top: 15px; }
        .cert-icons img { height: 28px; opacity: 0.9; }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0 80px 80px 80px; 
            display: grid; 
            grid-template-columns: 1fr 1.2fr; 
            gap: 60px; 
            align-items: center; 
            min-height: 70vh; 
        }
        
        .feat-item { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; font-size: 1.8rem; font-weight: 900; }
        .check { color: #7ED321; font-size: 2.2rem; }

        .display-box { display: flex; flex-direction: column; align-items: center; }
        .info-text { align-self: flex-start; }
        .info-text b { font-size: 3.5rem; color: var(--soft-blue); display: block; font-weight: 900; line-height: 1; }
        .info-text span { font-size: 1.8rem; color: var(--soft-blue); font-weight: 700; }

        .bottle-img { width: 380px; filter: drop-shadow(0 50px 80px rgba(0,0,0,0.18)); animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .selector { display: flex; gap: 20px; width: 100%; max-width: 550px; margin: 30px 0; }
        .size-btn { flex: 1; background: #FFF; border-radius: 30px; padding: 30px; text-align: center; cursor: pointer; border: 3px solid transparent; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
        .size-btn.active { border-color: var(--brand-green); }
        .size-btn b { display: block; font-size: 1.4rem; font-weight: 900; }

        .shop-btn { background: var(--brand-green); color: #FFF; width: 100%; max-width: 550px; padding: 25px; border-radius: 100px; text-decoration: none; font-weight: 900; text-align: center; text-transform: uppercase; font-size: 1.3rem; display: block; transition: 0.3s; }
        .shop-btn:hover { transform: translateY(-5px); background: #1e362a; }

        @media (max-width: 1200px) { 
            .brand { font-size: 3.5rem; }
            .container { grid-template-columns: 1fr; text-align: center; }
            .feat-item, .info-text { justify-content: center; align-self: center; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">ever good partne.co ltd</div>
        <div class="cert-icons">
            <img src="images/fssc-22000.png" alt="FSSC"> 
            <img src="images/fssc-22001.png" alt="Halal"> 
            <img src="images/fssc-22002.png" alt="USDA"> 
            <img src="images/fssc-22003.png" alt="Kosher"> 
            <img src="images/fssc-22004.png" alt="SGS">
        </div>
    </header>

    <div class="container">
        <div>
            <div class="feat-item"><span class="check">✓</span> 100% Natural Coconut water</div>
            <div class="feat-item"><span class="check">✓</span> No Sugar Added</div>
            <div class="feat-item"><span class="check">✓</span> No Preservatives</div>
        </div>
        
        <div class="display-box">
            <div class="info-text"><b>18 months</b><span>@ room temp.</span></div>
            <img src="images/fssc-22005.png" id="mainBottle" class="bottle-img" alt="Product">
            <div class="selector">
                <div class="size-btn active" onclick="setActive(this)">
                    <b>330ml</b><p>PRESENT</p>
                </div>
                <div class="size-btn" onclick="setActive(this)">
                    <b>1000ml</b><p>FUTURE</p>
                </div>
            </div>
            <a href="#" class="shop-btn">Shop Now</a>
        </div>
    </div>
    <script>
        function setActive(e) { document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); e.classList.add('active'); }
    </script>
</body>
</html>

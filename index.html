<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ever good partne.co ltd | Premium Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand-gold: #D4AF37; /* สีทองใกล้เคียงภาพต้นฉบับ */
            --brand-green: #2B4C3B; 
            --accent-blue: #4A90E2;
            --bg-overlay: rgba(255, 255, 255, 0.88); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: #333; 
            background-image: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('images/fssc-22007.png');
            background-attachment: fixed;
            background-position: center;
            background-size: contain;
        }

        header {
            width: 100%;
            padding: 70px 100px 20px 100px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ปรับฟอนต์และสีตามรูปภาพ */
        .brand { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 4.5rem; 
            color: var(--brand-gold); /* ใช้สีทองพรีเมียม */
            font-weight: 800; 
            letter-spacing: -1.5px; 
            line-height: 1; 
            text-transform: uppercase; /* ใช้ตัวพิมพ์ใหญ่ตามภาพต้นฉบับ */
        }

        .cert-icons { 
            display: flex; 
            gap: 20px; 
            margin-top: 25px; 
            align-items: center;
        }
        .cert-icons img { 
            height: 48px; /* ขนาดโลโก้ที่ขยายให้สมดุล */
            opacity: 1;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.08));
        }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 40px 100px 100px 100px; 
            display: grid; 
            grid-template-columns: 1fr 1.2fr; 
            gap: 80px; 
            align-items: center; 
        }
        
        .feat-item { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; font-size: 1.7rem; font-weight: 800; color: #222; }
        .check { color: #7ED321; font-size: 2.2rem; }

        .display-box { display: flex; flex-direction: column; align-items: center; }
        .info-text b { font-size: 3.8rem; color: var(--accent-blue); display: block; font-weight: 900; line-height: 1; }
        .info-text span { font-size: 1.8rem; color: var(--accent-blue); font-weight: 700; }

        .bottle-img { width: 380px; animation: float 5s infinite ease-in-out; margin: 20px 0; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .selector { display: flex; gap: 20px; width: 100%; max-width: 550px; margin-bottom: 40px; }
        .size-btn { flex: 1; background: #fff; border-radius: 30px; padding: 30px; text-align: center; cursor: pointer; border: 3px solid transparent; box-shadow: 0 15px 40px rgba(0,0,0,0.05); transition: 0.4s; }
        .size-btn.active { border-color: var(--brand-green); }
        .size-btn b { display: block; font-size: 1.5rem; font-weight: 800; }

        .shop-btn { 
            background: var(--brand-green); 
            color: #fff; 
            width: 100%; 
            max-width: 550px; 
            padding: 30px; 
            border-radius: 100px; 
            text-decoration: none; 
            font-weight: 900; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 1.3rem; 
            display: block; 
            transition: 0.3s;
        }
        .shop-btn:hover { transform: translateY(-5px); box-shadow: 0 20px 45px rgba(43,76,59,0.35); }

        @media (max-width: 1200px) { 
            header { padding: 40px; text-align: center; }
            .brand { font-size: 2.8rem; }
            .cert-icons { justify-content: center; }
            .container { grid-template-columns: 1fr; text-align: center; padding: 20px; }
            .feat-item { justify-content: center; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">EVER GOOD PARTNERS CO., LTD.</div>
        <div class="cert-icons">
            <img src="images/fssc-22000.png" alt="FSSC"> 
            <img src="images/fssc-22001.png" alt="Halal"> 
            <img src="images/fssc-22002.png" alt="USDA"> 
            <img src="images/fssc-22003.png" alt="Kosher"> 
            <img src="images/fssc-22004.png" alt="SGS">
        </div>
    </header>

    <div class="container">
        <div class="features">
            <div class="feat-item"><span class="check">✓</span> 100% Natural Coconut water</div>
            <div class="feat-item"><span class="check">✓</span> No Sugar Added</div>
            <div class="feat-item"><span class="check">✓</span> No Preservatives</div>
        </div>
        
        <div class="display-box">
            <div class="info-text"><b>18 months</b><span>@ room temp.</span></div>
            <img src="images/fssc-22005.png" id="mainBottle" class="bottle-img" alt="Product">
            <div class="selector">
                <div class="size-btn active" onclick="setActive(this)"><b>330ml</b><p>PRESENT</p></div>
                <div class="size-btn" onclick="setActive(this)"><b>1000ml</b><p>FUTURE</p></div>
            </div>
            <a href="#" class="shop-btn">Shop Now</a>
        </div>
    </div>

    <script>
        function setActive(e) { 
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); 
            e.classList.add('active'); 
        }
    </script>
</body>
</html>

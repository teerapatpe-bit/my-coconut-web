<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELI | Premium Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F4F1EC; /* ปรับให้ดูนวลตาขึ้นแบบ Premium */
            --text-dark: #1C1D1B;      
            --text-light: #5A5A5A;
            --brand-green: #2B4C3B;    
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* --- Header & Nav --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 3rem 0;
        }

        .brand-area {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            color: var(--brand-green);
            line-height: 0.8;
            letter-spacing: -2px;
        }

        .cert-box {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .cert-box img { 
            height: 50px; 
            width: auto; 
            opacity: 0.9;
            filter: grayscale(20%);
            transition: var(--transition);
        }
        
        .cert-box img:hover { opacity: 1; filter: grayscale(0%); }

        .nav-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: flex-end;
            max-width: 600px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .nav-links a:hover { color: var(--brand-green); }

        /* --- Hero Section --- */
        .hero {
            display: flex;
            align-items: center;
            min-height: 70vh;
            padding: 4rem 0;
            gap: 2rem;
        }

        .hero-content { flex: 1.2; }

        .hero h1 { 
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 8vw, 5.5rem); /* ปรับขนาดอัตโนมัติตามจอ */
            font-weight: 800;
            line-height: 0.95;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 450px;
        }

        .hero-image { 
            flex: 1; 
            display: flex; 
            justify-content: center;
            align-items: center;
        }

        .hero-image img { 
            width: 100%;
            max-width: 450px;
            height: auto;
            object-fit: contain;
            /* เพิ่มเงาจางๆ ให้สินค้าดูโดดเด่น */
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1));
        }

        footer { 
            text-align: center; 
            padding: 3rem; 
            font-size: 0.75rem; 
            color: var(--text-light);
            letter-spacing: 2px;
        }

        /* --- Responsive --- */
        @media (max-width: 1024px) {
            header { flex-direction: column; gap: 2rem; }
            .nav-links { justify-content: flex-start; }
            .hero { flex-direction: column; text-align: center; }
            .hero p { margin: 0 auto; }
            .logo { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-area">
                <div class="logo">ELI.</div>
                <div class="cert-box">
                    <img src="images/fssc-22000.png" alt="FSSC 22000">
                    <img src="images/halal.png" alt="Halal">
                    <img src="images/usda.png" alt="USDA Organic">
                    <img src="images/kosher.png" alt="Kosher">
                    <img src="images/taste-award.png" alt="Taste Award">
                </div>
            </div>
            
            <nav class="nav-links">
                <a href="#">Product Overview</a>
                <a href="#">Factory & Production Excellence</a>
                <a href="#">Quality & Certification</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <section class="hero">
            <div class="hero-content">
                <h1>NATURE'S<br>PUREST<br>HYDRATION.</h1>
                <p>100% Coconut Water from Thailand’s finest young coconuts. Sip Eli, Sip Elegance.</p>
            </div>
            <div class="hero-image">
                <img src="images/fssc-22005.png" alt="ELI Premium Coconut Water">
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 ELI COCONUT WATER. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>

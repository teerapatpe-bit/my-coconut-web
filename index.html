<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Eli Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-gold: #C3A358;
            --brand-navy: #2b5b84;
            --text-gray: #718096;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* --- Header --- */
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-header {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 500; 
            color: var(--brand-gold);
            letter-spacing: 2px;
        }

        .partners-text {
            font-size: 12px;
            font-weight: 500;
            color: #888;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .cert-icons img { height: 22px; width: auto; margin: 10px 12px 0 0; }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            border: 1px solid #333;
            padding: 10px 30px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        nav ul li a { text-decoration: none; color: #000; font-weight: 600; font-size: 12px; font-family: 'Montserrat', sans-serif;}

        /* --- Main Layout --- */
        main {
            position: relative;
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-height: 600px;
        }

        /* กล่องหลัก */
        .product-card {
            background-image: 
linear-gradient(90deg, rgba(255, 255, 255, 0.98) 30%, rgba(255, 255, 255, 0.75) 48%, rgba(255, 255, 255, 0) 65%) 
                url('images/fssc-22013.png');
            background-size: cover; 
            background-repeat: no-repeat;
            background-position: right center; 
            
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            width: 60%;
            min-height: 540px; 
            padding: 60px 60px 60px 180px; 
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12); 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* กล่อง Eli */
        .eli-box {
            position: absolute;
            left: 40px; 
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 290px;
            padding: 50px 30px 40px;
            border-radius: 35px;
            z-index: 20;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        /* ปรับป้าย Eli เป็นทรงแคปซูลและจัดให้อยู่ตรงกลาง */
        .eli-tag {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            color: #fff;
            padding: 6px 30px; /* เพิ่ม Padding แนวนอนให้ดูเป็นแคปซูลยาวขึ้น */
            border-radius: 50px; /* ทรงแคปซูล */
            font-size: 20px;
            font-weight: 800;
            position: absolute;
            top: -20px;
            left: 50%; /* ดันมาตรงกลาง */
            transform: translateX(-50%); /* ดึงกลับให้กึ่งกลางเป๊ะๆ */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .feature { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 13px; font-weight: 500; color: #222; }
        .check { width: 20px; height: 20px; background: #27ae60; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        /* --- Text Style --- */
        
.search-mini {
    position: absolute;  /* เปลี่ยนจาก relative เป็น absolute เพื่อให้เคลื่อนย้ายได้อิสระ */
    top: -80px;           /* ระยะห่างจากขอบบนของกล่องสีขาว (ปรับให้น้อยลงเพื่อให้สูงขึ้น) */
    left: 430px;         /* ระยะห่างจากขอบซ้าย (เพิ่มค่านี้เพื่อดันไปทางขวาตามลูกศร) */
    
    /* ส่วนด้านล่างนี้ให้คงไว้ตามเดิม หรือปรับตามความสวยงาม */
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    width: 270px; 
    padding: 8px 10px 8px 22px; 
    border-radius: 50px; 
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
    border: 1px solid rgba(255, 255, 255, 0.6);
    z-index: 10;
    margin-bottom: 0;    /* เอา margin ออกเพราะเราใช้ตำแหน่ง absolute แล้ว */
}

        .search-mini input { 
            font-family: 'Inter', sans-serif; 
            border: none; 
            outline: none; 
            font-weight: 500; 
            width: 100%; 
            font-size: 13px; 
            background: transparent;
            color: #333;
        }
        
        .search-mini button { 
            background: #3b82f6; 
            color: #fff; 
            border: none; 
            min-width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .search-mini button:hover {
            background: #2563eb;
            transform: scale(1.05); 
        }

.text-info {
    position: absolute; /* เปลี่ยนเป็น absolute เพื่อให้ย้ายไปได้ทุกที่ */
    top: 20px;         /* ปรับตัวเลขนี้เพื่อเลื่อน ขึ้น-ลง (น้อย = ขึ้น, มาก = ลง) */
    left: 450px;        /* ปรับตัวเลขนี้เพื่อเลื่อน ซ้าย-ขวา (ตามลูกศรที่คุณชี้) */
    z-index: 10;
    font-family: 'Montserrat', sans-serif;
    text-align: left;   /* ให้ข้อความชิดซ้ายเหมือนเดิม */
}        .text-info h4 { color: #7da58a; font-size: 12px; letter-spacing: 2.5px; margin-bottom: 10px; text-transform: uppercase; font-weight: 700; }
        
        .text-info h1 { 
            font-size: 52px; 
            color: var(--brand-navy); 
            line-height: 1; 
            white-space: nowrap; 
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .text-info p { 
            font-family: 'Inter', sans-serif;
            font-size: 20px; 
            color: var(--text-gray); 
            margin-bottom: 30px; 
            font-weight: 400; 
            letter-spacing: 0.5px;
        }

        .text-info h2 { 
            font-size: 60px; 
            color: #1e293b; 
            line-height: 1; 
            margin-bottom: 15px;
            font-weight: 800;
        }

        .stars { color: #fbbf24; display: flex; gap: 5px; font-size: 16px; }

    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22003.png" alt="Kosher">
                 <img src="images/fssc-22004.png" alt="Kosher">
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="#">OVERVIEW</a></li>
                <li><a href="#">PRODUCTION</a></li>
                <li><a href="#">CERTIFICATION</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="eli-box">
            <div class="eli-tag">Eli</div>
            
            <div class="feature"><div class="check"><i class="fa-solid fa-check"></i></div> 100% Natural Coconut water</div>
            <div class="feature"><div class="check"><i class="fa-solid fa-check"></i></div> No Sugar Added</div>
            <div class="feature"><div class="check"><i class="fa-solid fa-check"></i></div> No Artificial Flavor</div>
            <div class="feature"><div class="check"><i class="fa-solid fa-check"></i></div> No Coloring</div>
            <div class="feature"><div class="check"><i class="fa-solid fa-check"></i></div> No Preservatives</div>
        </div>

        <div class="product-card">
            
            <div class="search-mini">
                <input type="text" value="coconut water" readonly>
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="text-info">
                <h1>18 months</h1>
                <p>@ room temp</p>
                <h2>330ml</h2>
                <div class="stars">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                </div>
            </div>
        </div>
    </main>

</body>
</html>

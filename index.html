<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD | Premium Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B6CB0;
            --text-dark: #2D3436;
            --bg-glass: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(240, 244, 248, 0.75), rgba(217, 226, 236, 0.75)), 
                        url('images/fssc-22007.png'); /* พื้นหลัง fssc-22007 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* Navigation Menu ใหม่ */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 30px 6%;
            gap: 25px;
        }
        nav a { 
            text-decoration: none; 
            color: #444; 
            font-weight: 700; 
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 6%;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            align-items: center;
            min-height: 80vh;
            gap: 40px;
        }

        /* ฝั่งซ้าย: แบรนด์ EVER GOOD */
        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 0.9;
            color: var(--brand-blue);
            text-transform: uppercase;
        }

        .slogan {
            font-size: 1.1rem;
            font-weight: 800;
            color: #7f8c8d;
            letter-spacing: 3px;
        }

        .cert-row {
            display: flex;
            gap: 12px;
            margin: 10px 0 20px 0;
        }
        .cert-row img { height: 30px; opacity: 0.9; }

        .info-box {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 30px;
            width: 320px;
            border: 1px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .info-box h3 { font-size: 2.4rem; font-weight: 900; margin-bottom: 15px; }
        .check-list { list-style: none; margin-bottom: 20px; }
        .check-list li { display: flex; align-items: center; gap: 10px; font-weight: 700; margin-bottom: 8px; }
        .check-list li::before { content: '✓'; color: #2ecc71; font-weight: 900; }
        
        .btn-present {
            width: 100%;
            padding: 12px;
            border: 2.5px solid #000;
            border-radius: 15px;
            text-align: center;
            font-weight: 900;
            font-size: 1.2rem;
        }

        /* ฝั่งขวา: รายละเอียดสินค้า */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            border-radius: 50px;
            padding: 45px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }

        .search-bar {
            background: #fff;
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }
        .search-bar span { color: var(--brand-blue); font-weight: 900; font-size: 1.6rem; }
        .search-icon { background: var(--brand-blue); color: #fff; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }

        .product-flex { display: flex; gap: 20px; align-items: flex-start; }

        .detail-text { flex: 1; }
        .seo-tag { color: #7f8c8d; font-weight: 700; margin-bottom: 10px; }
        
        /* จัดบรรทัดใหม่ตามสั่ง */
        .promo-title { font-size: 3rem; font-weight: 900; color: var(--brand-blue); line-height: 1.1; margin-bottom: 20px; }
        .promo-title .bold-tag { color: #e74c3c; font-size: 1.3rem; display: block; margin: 5px 0; }
        .promo-title .temp-tag { font-size: 2.8rem; display: block; }

        .price-section { margin-bottom: 20px; }
        .p-label { font-size: 2.8rem; font-weight: 900; color: #2d3436; }
        .p-sub { color: var(--brand-blue); font-weight: 900; font-size: 1.4rem; }

        .rating { color: #f1c40f; font-size: 1.5rem; margin-top: 15px; }

        /* ลบพื้นหลังสีขาวออกจากรูปภาพ */
        .bottle-img {
            width: 250px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1));
            transform: rotate(5deg);
            mix-blend-mode: multiply; /* เทคนิคช่วยลบพื้นหลังขาวให้เนียนไปกับกระจก */
        }

        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; text-align: center; }
            .cert-row { justify-content: center; }
            .info-box { margin: 0 auto; }
            .product-flex { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">OVERVIEW</a>
        <a href="#">PRODUCTION</a>
        <a href="#">CERTIFICATION</a>
        <a href="#">CONTACT</a>
    </nav>

    <div class="container">
        <div class="brand-section">
            <div>
                <h1 class="brand-name">EVER<br>GOOD</h1>
                <p class="slogan">PARTNERS IN PURITY.</p>
                <div class="cert-row">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/halal.png" alt="HALAL">
                    <img src="images/usda.png" alt="USDA">
                    <img src="images/kosher.png" alt="KOSHER">
                </div>
            </div>

            <div class="info-box">
                <h3>330ml</h3>
                <ul class="check-list">
                    <li>100% NATURAL & PURE</li>
                    <li>ZERO ADDED SUGAR</li>
                    <li>NO PRESERVATIVES</li>
                </ul>
                <div class="btn-present">present</div>
            </div>
        </div>

        <div class="glass-card">
            <div class="search-bar">
                <span>coconut water</span>
                <div class="search-icon">🔍</div>
            </div>

            <div class="product-flex">
                <div class="detail-text">
                    <p class="seo-tag">SEO. www.evergood.co.th</p>
                    <h2 class="promo-title">
                        18 months
                        <span class="bold-tag">ตัวหนา</span>
                        <span class="temp-tag">@ room temp.</span>
                    </h2>
                    
                    <div class="price-section">
                        <div class="p-label">300ml</div>
                        <div class="p-sub">premium quality</div>
                    </div>
                    
                    <div class="rating">★★★★★</div>
                </div>

                <img src="images/fssc-22005.png" class="bottle-img" alt="Ever Good Coconut Water">
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --text-dark: #333333;
            --bg-light: #f8faf9;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Prompt', sans-serif; 
        }

        body {
            background-color: var(--bg-light);
        }

        /* HEADER & NAVIGATION */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: var(--white);
            position: relative;
            z-index: 100;
        }

        .brand-header { 
            color: var(--gold); 
            font-size: 1.35rem; 
            font-weight: 700; 
        }

        .partners-text { 
            color: var(--gold); 
            font-size: 0.75rem; 
            letter-spacing: 3px; 
            margin-bottom: 12px; 
        }

        .cert-icons { 
            display: flex; 
            gap: 10px; 
        }

        .cert-icons img { 
            height: 35px; 
            mix-blend-mode: multiply; 
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 40px;
            margin: -25px 40px 0 auto;
        }

        .nav-menu li a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            transition: color 0.3s ease;
            text-transform: uppercase;
        }

        .nav-menu li a:hover {
            color: var(--accent-green);
        }

        .nav-right-icons {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .mobile-menu-icon {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            min-height: 800px;
            width: 100%;
            background-image: url('images/fssc-22016.png'); 
            background-size: cover;
            background-position: center right; 
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            padding: 0 8%;
        }

        .hero-top-icon {
            position: absolute;
            top: 40px;
            left: 8%;
            width: 220px; 
            mix-blend-mode: multiply;
            z-index: 15;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 650px;
        }

        .hero-content h4 { 
            color: var(--accent-green); 
            font-size: 2.2rem; 
            font-weight: 700; 
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .hero-content h1 { 
            color: var(--primary-green); 
            font-size: 6.5rem; 
            line-height: 0.9; 
            font-weight: 800; 
            margin: 0 0 35px; 
        }

        .btn-more {
            background: var(--accent-green);
            color: var(--white);
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(89, 128, 60, 0.3);
            transition: transform 0.3s ease, background 0.3s ease;
        }
        
        .btn-more:hover {
            transform: translateY(-3px);
            background: var(--primary-green);
        }

        /* FEATURES BAR */
        .features-bar {
            background: var(--white);
            margin: -60px 60px 40px;
            padding: 35px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            position: relative;
            z-index: 20;
        }

        .feature-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }

        .f-icon { 
            width: 50px; 
            height: 50px; 
            background: var(--accent-green); 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--white); 
        }

        .f-text b { 
            display: block; 
            font-size: 1.1rem; 
            color: var(--primary-green); 
            line-height: 1.2; 
        }

        .f-text span {
            font-size: 0.8rem;
            color: #777777;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 1100px) {
            .nav-menu { display: none; } 
            .mobile-menu-icon { display: block; } 
            .header-container { padding: 20px 30px; }
        }

        @media (max-width: 992px) {
            .hero { background-position: center; padding: 120px 20px; text-align: center; }
            .hero-top-icon { position: relative; margin: 0 auto 20px; width: 180px; }
            .hero-content h1 { font-size: 4.5rem; }
            .hero-content h4 { font-size: 1.5rem; }
            .features-bar { flex-wrap: wrap; gap: 20px; margin: 20px; padding: 20px; }
            .feature-item { width: 45%; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC 22000">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA Organic">
                <img src="images/fssc-22014.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="BRC">
            </div>
        </div>

        <ul class="nav-menu">
            <li><a href="#overview">Overview</a></li>
            <li><a href="#production">Production</a></li>
            <li><a href="#certification">Certification</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <div class="nav-right-icons">
            <i class="fas fa-bars mobile-menu-icon" aria-label="Menu"></i>
        </div>
    </header>

    <section class="hero">
        <img src="images/fssc-22015.png" alt="Eli Logo" class="hero-top-icon">
        <div class="hero-content">
            <h4>100% NATURAL</h4>
            <h1>COCONUT<br>WATER</h1>
            <a href="#discover" class="btn-more">
                300 ml &nbsp; <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-tint-slash"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-xmark" style="font-size: 24px;"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --green: #2B4C3B; --blue: #4A90E2; --bg: #F8F7F5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #111; line-height: 1.6; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 60px; display: grid; grid-template-columns: 1fr 1.1fr; gap: 80px; align-items: center; min-height: 90vh; }
        
        /* ฝั่งซ้าย: แบรนด์และจุดเด่น */
        .brand-name { font-family: 'Montserrat', sans-serif; font-size: 4rem; color: var(--green); margin-bottom: 20px; font-weight: 900; }
        .cert-list { display: flex; gap: 12px; margin-bottom: 40px; }
        .cert-list img { height: 26px; filter: grayscale(100%); opacity: 0.5; transition: 0.3s; }
        .cert-list img:hover { filter: grayscale(0%); opacity: 1; }
        
        .feature { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-size: 1.5rem; font-weight: 800; color: #333; }
        .check { color: #7ED321; font-weight: 900; }

        /* ฝั่งขวา: พื้นที่แสดงสินค้าแบบ Interactive */
        .product-section { display: flex; flex-direction: column; align-items: center; position: relative; }
        .shelf-info { align-self: flex-start; margin-bottom: 10px; }
        .shelf-info b { font-size: 2.6rem; color: var(--blue); display: block; font-weight: 900; }
        .shelf-info span { font-size: 1.4rem; color: var(--blue); font-weight: 700; }

        /* ขวดน้ำมะพร้าวลอยตัว */
        .main-bottle { width: 280px; filter: drop-shadow(0 40px 60px rgba(0,0,0,0.12)); transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); animation: floating 4s infinite ease-in-out; margin: 20px 0; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* ตัวเลือกขนาดแบบ Hover to Expand */
        .size-row { display: flex; gap: 20px; width: 100%; max-width: 480px; margin-bottom: 35px; }
        .size-box { flex: 1; background: #FFF; border-radius: 25px; padding: 25px; text-align: center; cursor: pointer; border: 2.5px solid transparent; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .size-box:hover { transform: scale(1.1); box-shadow: 0 20px 45px rgba(0,0,0,0.08); }
        .size-box.active { border-color: var(--green); }
        .size-box img { height: 50px; margin-bottom: 10px; }
        .size-box b { display: block; font-size: 1.2rem; font-weight: 900; }
        .size-box p { font-size: 0.75rem; font-weight: 800; color: #BBB; text-transform: uppercase; letter-spacing: 1px; }

        .cta-btn { background: var(--green); color: #FFF; width: 100%; max-width: 480px; padding: 25px; border-radius: 100px; text-decoration: none; font-weight: 900; text-align: center; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 15px 35px rgba(43,76,59,0.25); transition: 0.3s; }
        .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 45px rgba(43,76,59,0.35); }

        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; text-align: center; } .cert-list, .feature { justify-content: center; } .shelf-info { align-self: center; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="info-side">
            <div class="brand-name">ELI.</div>
            <div class="cert-list">
                <img src="images/fssc.png" alt="FSSC"> <img src="images/halal.png" alt="Halal"> 
                <img src="images/usda.png" alt="USDA"> <img src="images/kosher.png" alt="Kosher"> 
                <img src="images/sgs.png" alt="SGS">
            </div>
            <div class="feature"><span class="check">✓</span> 100% Natural Coconut water</div>
            <div class="feature"><span class="check">✓</span> No Sugar Added</div>
            <div class="feature"><span class="check">✓</span> No Preservatives</div>
        </div>
        
        <div class="product-section">
            <div class="shelf-info"><b>18 months</b><span>@ room temp.</span></div>
            <img src="images/bottle-330.png" id="hero" class="main-bottle">
            <div class="size-row">
                <div class="size-box active" onmouseover="updateImg('330ml')" onclick="select(this)">
                    <img src="images/bottle-330.png"><b>330ml</b><p>PRESENT</p>
                </div>
                <div class="size-box" onmouseover="updateImg('1000ml')" onclick="select(this)">
                    <img src="images/bottle-1000.png" style="transform: scale(1.2)"><b>1000ml</b><p>FUTURE</p>
                </div>
            </div>
            <a href="#" class="cta-btn">Shop Now</a>
        </div>
    </div>
    <script>
        function updateImg(s) { const h = document.getElementById('hero'); h.style.transform = (s === '1000ml') ? 'scale(1.15)' : 'scale(1)'; }
        function select(e) { document.querySelectorAll('.size-box').forEach(b => b.classList.remove('active')); e.classList.add('active'); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELI | 100% Pure Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F2EFE9;
            --text-dark: #1C1D1B;      
            --text-light: #5A5A5A;
            --brand-green: #2B4C3B;    
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
        }

        /* --- Header & Navigation --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 40px 0;
            gap: 20px;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--brand-green);
            line-height: 1;
            letter-spacing: -1px;
        }

        .cert-icons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .cert-icons img {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        nav .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
            padding-top: 10px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* --- Hero Section --- */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 75vh;
            padding: 40px 0 80px;
            gap: 50px;
        }

        /* --- ส่วนจุดเด่นสินค้า (แทนที่ข้อความเดิม) --- */
        .product-features {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.6rem; /* ขนาดตัวอักษรใหญ่ชัดเจน */
            font-weight: 600;
            color: #5D5443; /* สีน้ำตาลเข้มตามรูปภาพ */
        }

        .feature-item img {
            width: 35px; /* ขนาดไอคอนเครื่องหมายถูก */
            height: auto;
        }

        /* --- Product Card --- */
        .product-card {
            flex: 1;
            background: var(--white);
            border-radius: 25px;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
        }

        .product-card img.main-product {
            width: 100%;
            max-width: 380px;
            height: auto;
            margin-bottom: 25px;
        }

        .price-box {
            margin-bottom: 20px;
        }

        .currency { font-size: 1.2rem; font-weight: 600; color: var(--brand-green); }
        .amount { font-size: 3rem; font-weight: 800; color: var(--brand-green); }

        .btn-shop {
            background-color: var(--brand-green);
            color: var(--white);
            padding: 15px 50px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-shop:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(43, 76, 59, 0.2);
        }

        /* --- Responsive --- */
        @media (max-width: 1024px) {
            header { flex-direction: column; align-items: center; text-align: center; }
            .hero { flex-direction: column; gap: 40px; }
            .feature-item { font-size: 1.3rem; justify-content: center; }
            .product-card { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-section">
                <div class="logo">ELI.</div>
                 <div class="cert-box">
                <img src="images/fssc-22000.png" alt="cert">
                <img src="images/fssc-22001.png" alt="cert">
                <img src="images/fssc-22002.png" alt="cert">
                <img src="images/fssc-22003.png" alt="cert">
                <img src="images/fssc-22004.png" alt="cert">
             </div>
            </div>
            
            <nav>
                <ul class="nav-links">
                    <li><a href="#">Product Overview</a></li>
                    <li><a href="#">Factory</a></li>
                    <li><a href="#">Certification</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </header>

        <section class="hero">
            <div class="product-features">
                <div class="feature-item">
                    <img src="images/check-icon.png" alt="check"> <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item">
                    <img src="images/check-icon.png" alt="check">
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item">
                    <img src="images/check-icon.png" alt="check">
                    <span>No Artificial Flavor</span>
                </div>
                <div class="feature-item">
                    <img src="images/check-icon.png" alt="check">
                    <span>No Coloring</span>
                </div>
                <div class="feature-item">
                    <img src="images/check-icon.png" alt="check">
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="product-card">
                <img src="images/fssc-22005.png" alt="ELI Coconut Water" class="main-product">
                
                <div class="price-box">
                    <span class="currency">฿</span>
                    <span class="amount">45.00</span>
                </div>
                <a href="#" class="btn-shop">Shop Now</a>
            </div>
        </section>
    </div>

</body>
</html>

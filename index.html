<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --green: #2B4C3B; --blue: #4A90E2; --bg: #F8F7F5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #111; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        
        .logo { font-family: 'Montserrat', sans-serif; font-size: 3.5rem; color: var(--green); margin-bottom: 20px; }
        .certs { display: flex; gap: 15px; margin-bottom: 40px; }
        .certs img { height: 28px; opacity: 0.6; }

        .feat { display: flex; align-items: center; gap: 15px; margin-bottom: 22px; font-size: 1.4rem; font-weight: 800; }
        .check { color: #7ED321; }

        .display { display: flex; flex-direction: column; align-items: center; }
        .info { align-self: flex-start; margin-bottom: 20px; }
        .info b { font-size: 2.5rem; color: var(--blue); display: block; font-weight: 900; }
        .info span { font-size: 1.4rem; color: var(--blue); font-weight: 700; }

        .hero-img { height: 400px; filter: drop-shadow(0 30px 50px rgba(0,0,0,0.1)); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .sizes { display: flex; gap: 20px; width: 100%; max-width: 500px; margin: 30px 0; }
        .card { flex: 1; background: white; border-radius: 30px; padding: 25px; text-align: center; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2.5px solid transparent; }
        .card:hover { transform: scale(1.1); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .card.active { border-color: var(--green); }
        .card img { height: 50px; margin-bottom: 10px; }
        .card b { display: block; font-size: 1.2rem; font-weight: 900; }

        .btn { background: var(--green); color: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 100px; text-decoration: none; font-weight: 900; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; text-align: center; } .certs, .feat { justify-content: center; } .info { align-self: center; } }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="logo">ELI.</div>
            <div class="certs">
                <img src="images/fssc.png" alt="FSSC"> <img src="images/halal.png" alt="Halal"> <img src="images/usda.png" alt="USDA"> <img src="images/kosher.png" alt="Kosher"> <img src="images/sgs.png" alt="SGS">
            </div>
            <div class="feat"><span class="check">✓</span> 100% Natural Coconut water</div>
            <div class="feat"><span class="check">✓</span> No Sugar Added</div>
            <div class="feat"><span class="check">✓</span> No Preservatives</div>
        </div>
        <div class="display">
            <div class="info"><b>18 months</b><span>@ room temp.</span></div>
            <img src="images/bottle-330.png" id="main" class="hero-img">
            <div class="sizes">
                <div class="card active" onmouseover="pre('330ml')" onclick="sel(this)"><img src="images/bottle-330.png"><b>330ml</b><p>PRESENT</p></div>
                <div class="card" onmouseover="pre('1000ml')" onclick="sel(this)"><img src="images/bottle-1000.png" style="transform:scale(1.2)"><b>1000ml</b><p>FUTURE</p></div>
            </div>
            <a href="#" class="btn">Shop Now</a>
        </div>
    </div>
    <script>
        function pre(s) { document.getElementById('main').style.transform = (s === '1000ml') ? 'scale(1.15)' : 'scale(1)'; }
        function sel(e) { document.querySelectorAll('.card').forEach(c => c.classList.remove('active')); e.classList.add('active'); }
    </script>
</body>
</html>

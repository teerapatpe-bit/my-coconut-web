<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-gold: #D4B26C;
            --brand-blue: #23589B;
            --text-dark: #1A1A1A;
            --text-gray: #8F9EAF;
            --bg-color: #F7F7F5;
            --green-check: #22C55E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background: linear-gradient(135deg, #ffffff 0%, #F1F1EF 100%);
            min-height: 100vh;
            color: var(--text-dark);
            padding: 40px 50px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1280px;
        }

        /* ================= HEADER ================= */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 50px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--brand-gold);
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        .nav-menu {
            border: 1px solid #000;
            border-radius: 50px;
            padding: 10px 30px;
            background: #fff;
            display: flex;
            gap: 25px;
        }

        .nav-menu a {
            text-decoration: none;
            color: #000;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        /* ================= MAIN LAYOUT ================= */
        .main-content {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* ================= LEFT SIDEBAR (ELI BOX) ================= */
        .sidebar {
            width: 320px;
        }

        .eli-title {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 18px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 12px 12px 0 0;
        }

        .features-list {
            background-color: #fff;
            padding: 30px 25px;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #333;
        }

        .check-icon {
            width: 20px;
            height: 20px;
            background-color: var(--green-check);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .check-icon::after {
            content: '';
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-top: -2px;
        }

        /* ================= RIGHT SHOWCASE ================= */
        .showcase {
            flex: 1;
            background-color: #fff;
            border-radius: 30px;
            padding: 50px 60px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* SEARCH BAR */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .search-box {
            width: 100%;
            max-width: 450px;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 8px 8px 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box span {
            font-size: 1rem;
            font-weight: 700;
            color: #4B5563;
        }

        .search-btn {
            background-color: #3B82F6;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-btn::before {
            content: '🔍';
            color: white;
            font-size: 14px;
        }

        /* PRESENT BUTTON */
        .present-wrapper {
            margin-bottom: 30px;
        }

        .present-btn {
            display: inline-block;
            border: 1.5px solid #000;
            border-radius: 50px;
            padding: 8px 45px;
            font-size: 0.95rem;
            font-weight: 800;
            color: #000;
            background: transparent;
            text-decoration: none;
        }

        /* PRODUCT INFO & IMAGE */
        .product-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .product-info {
            flex: 1;
        }

        .export-label {
            color: var(--brand-gold);
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .shelf-life-number {
            font-family: 'Montserrat', sans-serif;
            font-size: 6.5rem;
            font-weight: 900;
            color: var(--brand-blue);
            line-height: 1;
            margin-top: -10px;
        }

        .shelf-life-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            color: var(--brand-blue);
            line-height: 1;
            margin-bottom: 5px;
        }

        .room-temp {
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--text-gray);
            margin-bottom: 25px;
        }

        .volume-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 6.5rem;
            font-weight: 900;
            color: var(--text-dark);
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 20px;
        }

        .stars {
            color: #F59E0B;
            font-size: 1.8rem;
            letter-spacing: 4px;
        }

        .product-image {
            flex: 0 0 45%;
            display: flex;
            justify-content: flex-end;
        }

        .product-image img {
            max-width: 400px;
            width: 100%;
            height: auto;
            /* เพิ่มเงาเล็กน้อยและเอียงรูปตามภาพต้นฉบับ */
            filter: drop-shadow(15px 20px 25px rgba(0,0,0,0.1));
            transform: rotate(3deg);
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="logo">
                EVER GOOD PARTNERS<br>
                CO.,LTD.
            </div>
            <div class="nav-menu">
                <a href="#">OVERVIEW</a>
                <a href="#">PRODUCTION</a>
                <a href="#">CERTIFICATION</a>
                <a href="#">CONTACT</a>
            </div>
        </header>

        <main class="main-content">
            
            <aside class="sidebar">
                <div class="eli-title">Eli</div>
                <div class="features-list">
                    <div class="feature-item"><div class="check-icon"></div> 100% Natural Coconut water</div>
                    <div class="feature-item"><div class="check-icon"></div> No Sugar Added</div>
                    <div class="feature-item"><div class="check-icon"></div> No Artificial Flavor</div>
                    <div class="feature-item"><div class="check-icon"></div> No Coloring</div>
                    <div class="feature-item"><div class="check-icon"></div> No Preservatives</div>
                </div>
            </aside>

            <section class="showcase">
                
                <div class="search-container">
                    <div class="search-box">
                        <span>coconut water</span>
                        <div class="search-btn"></div>
                    </div>
                </div>

                <div class="present-wrapper">
                    <a href="#" class="present-btn">present</a>
                </div>

                <div class="product-grid">
                    <div class="product-info">
                        <div class="export-label">PREMIUM EXPORT QUALITY</div>
                        <div class="shelf-life-number">18</div>
                        <div class="shelf-life-text">months</div>
                        <div class="room-temp">@ room temp.</div>
                        <div class="volume-text">330ml</div>
                        <div class="stars">★★★★★</div>
                    </div>
                    <div class="product-image">
                        <img src="images/fssc-22009.png" alt="Eli Coconut Water Pouch">
                    </div>
                </div>

            </section>
        </main>
    </div>

</body>
</html>

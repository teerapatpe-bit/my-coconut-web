<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS | Professional Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand-gold: #D4AF37; 
            --brand-green: #2B4C3B; 
            --accent-blue: #4A90E2;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #FDFDFD;
            /* ใช้พื้นหลัง fssc-22007.png แบบจางมากเพื่อเน้นความสะอาด */
            background-image: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(245,245,245,0.9) 100%), url('images/fssc-22007.png');
            background-size: cover;
            background-attachment: fixed;
        }

        header {
            padding: 50px 100px 30px 100px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .brand-container { border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 20px; }
        .brand { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 3rem; 
            color: var(--brand-gold); 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .cert-row-top { display: flex; gap: 12px; margin-top: 10px; }
        .cert-row-top img { height: 32px; opacity: 0.8; transition: 0.3s; }
        .cert-row-top img:hover { opacity: 1; transform: scale(1.1); }

        /* จัดวาง Layout ใหม่ให้ดูเป็นมืออาชีพ */
        .showcase-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 100px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 80px;
            align-items: center;
        }

        /* กล่องข้อมูล (Info Box) */
        .info-card {
            background: #FFFFFF;
            padding: 60px;
            border-radius: 50px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.04);
            position: relative;
            overflow: hidden;
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 8px; height: 100%;
            background: var(--accent-blue);
        }

        .feature-list { list-style: none; margin-top: 20px; }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 18px;
            color: #444;
        }
        .feature-item span { color: #7ED321; font-weight: 900; }

        .order-btn {
            display: inline-block;
            margin-top: 30px;
            background: var(--brand-green);
            color: white;
            padding: 20px 60px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(43,76,59,0.2);
        }

        .order-btn:hover { transform: translateY(-5px); background: #1e362a; box-shadow: 0 20px 45px rgba(43,76,59,0.3); }

        /* ส่วนแสดงสินค้าที่มีหัวข้อ Coconut Water ด้านบน */
        .product-visual-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .product-title {
            font-size: 5.5rem;
            color: var(--accent-blue);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(74, 144, 226, 0.1);
        }

        .main-bottle {
            width: 450px;
            filter: drop-shadow(0 40px 80px rgba(0,0,0,0.12));
            animation: floating 6s infinite ease-in-out;
            transition: 0.5s;
        }
        
        .main-bottle:hover { transform: scale(1.03) rotate(2deg); }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        @media (max-width: 1200px) {
            header { padding: 40px; text-align: center; }
            .cert-row-top { justify-content: center; }
            .showcase-container { grid-template-columns: 1fr; text-align: center; padding: 20px; }
            .info-card { padding: 40px; }
            .product-title { font-size: 3.5rem; margin-top: 40px; }
            .main-bottle { width: 320px; }
            .feature-item { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <div class="brand">EVER GOOD PARTNERS</div>
            <div class="cert-row-top">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22003.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="SGS">
            </div>
        </div>
    </header>

    <main class="showcase-container">
        <div class="info-card">
            <ul class="feature-list">
                <li class="feature-item"><span>✓</span> 100% NATURAL & PURE</li>
                <li class="feature-item"><span>✓</span> ZERO ADDED SUGAR</li>
                <li class="feature-item"><span>✓</span> NO ARTIFICIAL FLAVOR</li>
                <li class="feature-item"><span>✓</span> NO COLORING</li>
                <li class="feature-item"><span>✓</span> NO PRESERVATIVES</li>
            </ul>
            <a href="#" class="order-btn">Order Now</a>
        </div>

        <div class="product-visual-group">
            <h2 class="product-title">Coconut<br>Water</h2>
            <img src="images/fssc-22005.png" class="main-bottle" alt="Premium Coconut Water">
        </div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS | Balanced Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --deep-green: #2B4C3B; 
            --sky-blue: #4A90E2;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #FFFFFF;
            color: #2D3436;
        }

        /* 1. ขยายชื่อแบรนด์ให้ใหญ่ขึ้นและดูเด่น */
        header {
            padding: 60px 8% 30px 8%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .brand-header {
            font-family: 'Montserrat', sans-serif;
            color: var(--gold);
            font-size: 3.8rem; /* เพิ่มขนาดชื่อแบรนด์ให้ใหญ่ขึ้น */
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 1;
        }

        /* 2. ปรับขนาดโลโก้ใบเซอร์ให้เห็นชัดพอดี */
        .cert-container { 
            display: flex; 
            gap: 20px; 
            margin-top: 20px; 
        }
        .cert-container img { 
            height: 38px; /* ปรับขนาดโลโก้ให้ชัดเจนขึ้น */
            opacity: 0.9; 
        }

        .main-layout {
            max-width: 1300px;
            margin: 40px auto 100px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            padding: 0 5%;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* ปรับตัวอักษรข้อมูลให้ขนาดเท่ากัน */
        .text-standard {
            font-size: 1.4rem; /* กำหนดขนาดมาตรฐานสำหรับข้อมูลทั้งหมด */
            font-weight: 700;
            color: #444;
        }

        .highlight-red {
            color: #ff4757;
            font-weight: 900;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feature-item::before {
            content: '✓';
            color: #2ed573;
            font-weight: 900;
        }

        .price-section {
            display: flex;
            align-items: baseline;
            gap: 20px;
            margin-top: 10px;
        }

        .price-old { 
        font-size: 1.8rem; 
        color: #b2bec3; 
        text-decoration: 
        line-through; 
        
        }

        .price-new {
         font-size: 4rem; 
         font-weight: 900; 
         color: #2D3436; 

         }


        .btn-shop {
            background: var(--deep-green);
            color: white;
            padding: 22px 60px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.3rem;
            text-align: center;
            width: fit-content;
            text-transform: uppercase;
            box-shadow: 0 15px 30px rgba(43,76,59,0.2);
            transition: 0.3s;
        }

        .btn-shop:hover { transform: translateY(-5px); }

        /* 3. ลดขนาด Coconut Water ลงให้พอดีกับสินค้า */
        .visual-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-title {
            font-size: 4.5rem; /* ลดขนาดลงจากเดิมเพื่อให้ดูสมส่วน */
            font-weight: 900;
            color: var(--sky-blue);
            line-height: 0.9;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .product-img {
            width: 100%;
            max-width: 480px;
            filter: drop-shadow(0 40px 60px rgba(0,0,0,0.1));
        }

        @media (max-width: 1100px) {
            .brand-header { font-size: 2.5rem; }
            .main-layout { grid-template-columns: 1fr; text-align: center; gap: 50px; }
            .info-panel { align-items: center; }
            .price-section { justify-content: center; }
            .product-title { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-header">EVER GOOD PARTNERS</div>
        <div class="cert-container">
            <img src="images/fssc-22000.png" alt="FSSC">
            <img src="images/fssc-22001.png" alt="Halal">
            <img src="images/fssc-22002.png" alt="USDA">
            <img src="images/fssc-22004.png" alt="SGS">
        </div>
    </header>

    <main class="main-layout">
        <div class="info-panel">
            <div class="text-standard">
                18 months <span class="highlight-red">→ ตัวหนา</span><br>
                @ room temp.
            </div>
            
            <div class="feature-list">
                <div class="feature-item text-standard">100% Natural Coconut water</div>
                <div class="feature-item text-standard">No Sugar Added R</div>
                <div class="feature-item text-standard">No Artificial Flavor</div>
                  <div class="feature-item text-standard">No Coloring</div>
                  <div class="feature-item text-standard">No Preservatives</div>
            </div>

            <div class="price-section">
                <span class="price-old">฿5,690</span>
                <span class="price-new">฿3,990</span>
            </div>

            <a href="#" class="btn-shop">Shop Now</a>
        </div>

        <div class="visual-panel">
            <h1 class="product-title">Coconut<br>Water</h1>
            <img src="images/fssc-22005.png" class="product-img" alt="Premium Coconut Water">
        </div>
    </main>

</body>
</html>

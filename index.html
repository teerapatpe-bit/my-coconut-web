<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --bg-light: #F8FAF9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            overflow-x: hidden;
        }

        /* --- Header Section --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 60px; /* ลด Padding บนลงเล็กน้อย */
            background: var(--white);
            position: relative;
            z-index: 100;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand-header {
            color: var(--gold);
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .partners-text {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        /* --- 1. ปรับขนาดโลโก้มาตรฐานให้ใหญ่ขึ้น (ตามรูปที่วงไว้) --- */
        .cert-icons {
            display: flex;
            gap: 18px; /* เพิ่มระยะห่างระหว่างรูปเล็กน้อย */
            align-items: center;
        }

        .cert-icons img {
            height: 55px; /* 👈 ปรับจาก 40px เป็น 55px ให้ดูใหญ่ขึ้น */
            width: auto;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        /* ปรับเฉพาะรางวัลตัวสุดท้ายให้ดูเด่นขึ้น */
        .cert-icons img:last-child {
            height: 65px; 
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-top: 5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* --- Hero Section --- */
        .hero {
            display: flex;
            padding: 20px 60px 100px; /* ลด Padding บนของ Hero ลง */
            position: relative;
            background: radial-gradient(circle at 80% 50%, #e8f5e9 0%, #f8faf9 100%);
        }

        .hero-content {
            flex: 1;
            padding-top: 0px; /* 👈 ลดพื้นที่ด้านบนเพื่อให้เนื้อหาขยับขึ้น */
        }

        /* --- 2. ขยับโลโก้ Eli ขึ้น (ตามลูกศรในรูป) --- */
        .hero-top-icon {
            width: 180px; 
            height: auto;
            mix-blend-mode: multiply;
            margin-top: -35px; /* 👈 เพิ่มค่าติดลบเพื่อให้ขยับขึ้นไปชิดด้านบนมากขึ้น */
            margin-bottom: 10px;
            display: block;
        }

        .hero-content h4 {
            color: var(--accent-green);
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .hero-content h1 {
            color: var(--primary-green);
            font-size: 5.5rem;
            line-height: 1;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* --- ส่วนอื่นๆ คงเดิม --- */
        .btn-more {
            background: var(--accent-green);
            color: white;
            padding: 14px 30px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .product-img {
            max-width: 90%;
            z-index: 2;
        }

        .features-bar {
            background: white;
            margin: -60px 60px 0;
            padding: 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            position: relative;
            z-index: 20;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .f-icon {
            width: 45px;
            height: 45px;
            background: var(--accent-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        @media (max-width: 1024px) {
            .hero { flex-direction: column; text-align: center; }
            .hero-top-icon { margin: -20px auto 15px; }
            .header-container { flex-direction: column; align-items: center; gap: 20px; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22014.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="BRC">
            </div>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="#">OVERVIEW</a></li>
                <li><a href="#">PRODUCTION</a></li>
                <li><a href="#">CERTIFICATION</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
            <button class="search-btn" style="background: var(--accent-green); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center;">
                <i class="fas fa-search"></i>
            </button>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content"> 
            <img src="images/fssc-22015.png" alt="Eli Logo" class="hero-top-icon">
            
            <h4>100% NATURAL</h4>
            <h1>Coconut<br>Water</h1>
            <a href="#" class="btn-more">300ml <i class="fas fa-arrow-right"></i></a>
        </div>
        
        <div class="hero-image">
            <img src="images/fssc-22016.png" alt="Coconut Water" class="product-img">
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-tint-slash"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-vial-slash"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS | Premium Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --deep-green: #2B4C3B; 
            --sky-blue: #4A90E2;
            --light-bg: #F8F9FA;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--light-bg);
            /* ใช้พื้นหลัง fssc-22007.png แบบจางๆ เพื่อความนุ่มนวล */
            background-image: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(230,235,240,0.95) 100%), url('images/fssc-22007.png');
            background-size: cover;
            min-height: 100vh;
        }

        /* ส่วนหัวแบรนด์ */
        header {
            padding: 30px 5%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-section h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--gold);
            font-size: 2.5rem;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
        }

        .cert-icons { display: flex; gap: 10px; margin-top: 10px; }
        .cert-icons img { height: 28px; opacity: 0.8; }

        /* ส่วนแสดงผลหลักสไตล์รูปตัวอย่าง */
        .main-card {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            border-radius: 40px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
        }

        /* ฝั่งซ้าย: ข้อมูลเทคนิค (สไตล์รองเท้าในรูป 2) */
        .info-side {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, #ffffff 0%, #f1f4f8 100%);
        }

        .product-meta {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--sky-blue);
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .product-meta span {
            color: #ff4757; /* เน้นตัวหนาสีแดงตามรูป 2 */
            font-size: 1.8rem;
        }

        .feature-ticks {
            list-style: none;
            margin-bottom: 30px;
        }

        .feature-ticks li {
            font-size: 1.2rem;
            font-weight: 700;
            color: #444;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .feature-ticks li::before {
            content: '✓';
            color: #2ed573;
            font-weight: 900;
        }

        .price-tag {
            font-size: 3rem;
            font-weight: 900;
            color: #2D3436;
            margin-bottom: 30px;
        }

        .price-tag del {
            font-size: 1.5rem;
            color: #b2bec3;
            margin-right: 15px;
        }

        .cta-button {
            background: var(--deep-green);
            color: white;
            padding: 20px 40px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(43,76,59,0.2);
        }

        .cta-button:hover { transform: translateY(-5px); background: #1e362a; }

        /* ฝั่งขวา: แสดงสินค้าและพาดหัว */
        .visual-side {
            padding: 40px;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .product-heading {
            font-size: 5rem;
            font-weight: 900;
            color: var(--sky-blue);
            text-align: center;
            line-height: 0.9;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: -2px;
            z-index: 2;
        }

        .product-image {
            width: 85%;
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.1));
            transition: 0.5s;
            z-index: 1;
        }

        .product-image:hover { transform: scale(1.05) rotate(-2deg); }

        /* รัศมีแสงหลังสินค้า */
        .visual-side::after {
            content: '';
            position: absolute;
            width: 80%; height: 80%;
            background: radial-gradient(circle, rgba(74,144,226,0.05) 0%, transparent 70%);
            border-radius: 50%;
        }

        @media (max-width: 900px) {
            .main-card { grid-template-columns: 1fr; margin: 20px; }
            .info-side { padding: 40px; order: 2; }
            .visual-side { padding: 40px; order: 1; }
            .product-heading { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-section">
            <h1>EVER GOOD PARTNERS</h1>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22004.png" alt="SGS">
            </div>
        </div>
    </header>

    <main class="main-card">
        <div class="info-side">
            <div class="product-meta">
                18 months <span>→ ตัวหนา</span><br>
                @ room temp.
            </div>
            
            <ul class="feature-ticks">
                <li>100% NATURAL & PURE</li>
                <li>ZERO ADDED SUGAR</li>
                <li>NO PRESERVATIVES</li>
            </ul>

            <div class="price-tag">
                <del>฿5,690</del> ฿3,990
            </div>

            <a href="#" class="cta-button">Shop Now</a>
        </div>

        <div class="visual-side">
            <h2 class="product-heading">Coconut<br>Water</h2>
            <img src="images/fssc-22005.png" class="product-image" alt="Eli Coconut Water">
        </div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-green: #2B4C3B;
            --accent-green: #7ED321;
            --info-blue: #4A90E2;
            --bg-color: #F8F7F5;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: #111; overflow-x: hidden; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 60px; }

        /* --- Header Section --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 50px 0; }
        .brand-logo { font-family: 'Montserrat', sans-serif; font-size: 4rem; font-weight: 900; color: var(--brand-green); letter-spacing: -3px; }
        .nav-links { display: flex; gap: 35px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; position: relative; }

        /* --- Main Content Grid --- */
        .main-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 80px; align-items: center; min-height: 70vh; }

        /* ฝั่งซ้าย: Features & Certs */
        .cert-icons { display: flex; gap: 12px; margin-bottom: 40px; }
        .cert-icons img { height: 30px; filter: grayscale(100%); opacity: 0.6; transition: 0.3s; cursor: pointer; }
        .cert-icons img:hover { filter: grayscale(0%); opacity: 1; transform: translateY(-5px); }

        .feature-item { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; font-size: 1.6rem; font-weight: 800; color: #333; }
        .check-icon { width: 32px; height: 32px; color: var(--accent-green); flex-shrink: 0; }

        /* ฝั่งขวา: Interactive Product Area */
        .product-stage { display: flex; flex-direction: column; align-items: center; }
        
        .shelf-life-info { align-self: flex-start; margin-bottom: 20px; padding-left: 20px; }
        .shelf-life-info b { font-size: 2.2rem; color: var(--info-blue); display: block; font-weight: 900; }
        .shelf-life-info span { font-size: 1.4rem; color: var(--info-blue); font-weight: 700; }

        /* Main Floating Image */
        .hero-img-wrap { perspective: 1000px; margin-bottom: 40px; }
        .hero-img { 
            width: 300px; 
            filter: drop-shadow(0 40px 60px rgba(0,0,0,0.15)); 
            animation: floatEffect 4s ease-in-out infinite;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes floatEffect {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        /* กล่องเลือกขนาดเรียงกันด้านนอก */
        .selector-row { display: flex; gap: 25px; width: 100%; max-width: 550px; margin-bottom: 40px; }
        
        .size-box { 
            flex: 1; background: var(--white); border-radius: 35px; padding: 35px 20px; 
            text-align: center; cursor: pointer; border: 3px solid transparent; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.04);
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .size-box img { height: 65px; margin-bottom: 15px; transition: 0.4s; }
        .size-box b { display: block; font-size: 1.3rem; margin-bottom: 5px; color: #111; }
        .size-box small { color: #AAA; text-transform: uppercase; font-weight: 800; font-size: 0.8rem; letter-spacing: 1px; }

        /* ลูกเล่น Hover & Expand */
        .size-box:hover { 
            transform: scale(1.1) translateY(-10px); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            background: var(--white);
        }
        .size-box:hover img { transform: scale(1.2); }
        
        .size-box.active { border-color: var(--brand-green); background: var(--white); }

        /* ปุ่ม Shop Now */
        .cta-button { 
            background: var(--brand-green); color: var(--white); width: 100%; max-width: 550px; 
            padding: 26px; border-radius: 100px; text-decoration: none; font-weight: 900; 
            text-transform: uppercase; text-align: center; letter-spacing: 3px; 
            transition: 0.3s; box-shadow: 0 20px 40px rgba(43, 76, 59, 0.3);
        }
        .cta-button:hover { transform: scale(1.02); box-shadow: 0 25px 50px rgba(43, 76, 59, 0.4); }

        @media (max-width: 1100px) {
            .main-grid { grid-template-columns: 1fr; text-align: center; }
            .feature-item, .cert-icons { justify-content: center; }
            .shelf-life-info { align-self: center; padding-left: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-logo">ELI.</div>
            <nav class="nav-links">
                <a href="#">Overview</a>
                <a href="#">Factory</a>
                <a href="#">Quality</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <main class="main-grid">
            <div class="left-content">
                <div class="cert-icons">
                    <img src="images/fssc.png" alt="FSSC 22000">
                    <img src="images/halal.png" alt="Halal">
                    <img src="images/usda.png" alt="USDA Organic">
                    <img src="images/kosher.png" alt="Kosher">
                    <img src="images/sgs.png" alt="SGS">
                </div>

                <div class="feature-item">
                    <svg class="check-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                    <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                    <span>No Artificial Flavor</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                    <span>No Coloring</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="product-stage">
                <div class="shelf-life-info">
                    <b>18 months</b>
                    <span>@ room temp.</span>
                </div>

                <div class="hero-img-wrap">
                    <img src="images/bottle-330.png" alt="ELI Product" class="hero-img" id="hero-img">
                </div>

                <div class="selector-row">
                    <div class="size-box active" onmouseover="changeView('330ml')" onclick="setActive(this)">
                        <img src="images/bottle-330.png" alt="330ml">
                        <b>330ml</b>
                        <small>Present</small>
                    </div>
                    <div class="size-box" onmouseover="changeView('1000ml')" onclick="setActive(this)">
                        <img src="images/bottle-1000.png" alt="1000ml" style="transform: scale(1.2)">
                        <b>1000ml</b>
                        <small>Future</small>
                    </div>
                </div>

                <a href="#" class="cta-button">Shop Now</a>
            </div>
        </main>
    </div>

    <script>
        function changeView(size) {
            const hero = document.getElementById('hero-img');
            // ตอบสนองเมื่อเอาเมาส์ไปชี้ที่ขนาดต่างๆ
            if(size === '1000ml') {
                hero.style.transform = 'scale(1.15)';
            } else {
                hero.style.transform = 'scale(1)';
            }
        }

        function setActive(el) {
            document.querySelectorAll('.size-box').forEach(box => box.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>

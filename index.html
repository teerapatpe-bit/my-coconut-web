<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            --gold-solid: #C5A059;
            --gold-gradient: linear-gradient(135deg, #C5A059 0%, #F1D592 50%, #B8860B 100%);
            --glass-bg: rgba(255, 255, 255, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.8), rgba(235, 240, 245, 0.7));
            background-size: cover;
            min-height: 100vh;
            color: #2D3436;
            overflow-x: hidden;
        }

        /* --- Header Section --- */
        .header {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 5% 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .partners-text {
            color: #718096;
            font-size: 0.75rem;
            letter-spacing: 3px;
            margin-top: -5px;
            font-weight: 600;
        }

        .cert-row {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .cert-row img { height: 28px; opacity: 0.9; }

        .nav-pill {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 8px 30px;
            display: flex;
            gap: 20px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
        }

        .nav-pill a {
            text-decoration: none;
            color: #000;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* --- Main Content Layout --- */
        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 5% 50px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* --- Eli Info Card (ฝั่งซ้าย) --- */
        .info-side { 
            width: 320px; 
            margin-top: 50px;
        }

        .eli-pill-header {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 10px 25px;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: #000;
            margin-bottom: 12px;
            background: #fff;
        }

        .feature-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 30px 25px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .feature-item {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #2D3436;
            margin-bottom: 15px;
        }

        .feature-item::before {
            content: '✓';
            width: 18px; height: 18px;
            background: #27AE60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }

        /* --- Product Showcase (ฝั่งขวา) --- */
        .product-display {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.5);
            min-height: 550px;
        }

        .search-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            max-width: 450px;
            background: #fff;
            border-radius: 12px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .search-box span { color: #2D3748; font-weight: 700; font-size: 1rem; }
        .search-icon { width: 22px; height: 22px; background: #3182CE; border-radius: 50%; }

        /* พื้นที่วางปุ่ม Present ใหม่ */
        .present-area {
            margin-bottom: 25px;
        }

        .present-pill {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 10px 60px;
            text-decoration: none;
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            display: inline-block;
            transition: 0.3s;
            background: #fff;
        }

        .present-pill:hover { background: #000; color: #fff; }

        .product-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px; /* ลดช่องว่างตามบรีฟ */
        }

        .export-label {
            color: var(--gold-solid);
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .shelf-life {
            font-size: 4.5rem;
            color: var(--brand-blue);
            font-weight: 800;
            line-height: 1;
        }

        .shelf-life span {
            display: block;
            font-size: 2rem;
            color: #718096;
            font-weight: 500;
        }

        .volume {
            font-size: 5.5rem;
            font-weight: 900;
            color: #1a202c;
            margin: -5px 0;
        }

        .stars { color: #F1C40F; font-size: 1.4rem; }

        .bottle-img img {
            max-width: 350px; /* ปรับขนาดรูปให้เด่นขึ้น */
            filter: drop-shadow(15px 20px 35px rgba(0,0,0,0.12));
        }
    </style>
</head>
<body>
<div class="container">
        <div class="brand-section">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="HALAL">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22003.png" alt="K">
                <img src="images/fssc-22004.png" alt="KOSHER">
            </div>
 </div>
        
        <nav class="nav-pill">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-side">
            <div class="eli-pill-header">Eli</div>
            <div class="feature-box">
                <ul>
                    <li class="feature-item">100% Natural Coconut water</li>
                    <li class="feature-item">No Sugar Added</li>
                    <li class="feature-item">No Artificial Flavor</li>
                    <li class="feature-item">No Coloring</li>
                    <li class="feature-item">No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="product-display">
            <div class="search-container">
                <div class="search-box">
                    <span>coconut water</span>
                    <div class="search-icon"></div>
                </div>
            </div>

            <div class="present-area">
                <a href="#" class="present-pill">present</a>
            </div>

            <div class="product-main">
                <div class="product-text">
                    <p class="export-label">PREMIUM EXPORT QUALITY</p>
                    <h2 class="shelf-life">18 months <span>@ room temp.</span></h2>
                    <div class="volume">330ml</div>
                    <div class="stars">★★★★★</div>
                </div>
                <div class="bottle-img">
                    <img src="images/eli-pouch.png" alt="Eli Coconut Pouch">
                </div>
            </div>
        </div>
    </main>

</body>
</html>

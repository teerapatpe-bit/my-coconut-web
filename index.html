<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS | Premium Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --deep-green: #2B4C3B; 
            --sky-blue: #4A90E2;
            --soft-gray: #F8F9FA;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #FFFFFF;
            color: #2D3436;
        }

        /* Header จัดวางให้ลอยตัวและมีระยะห่าง */
        header {
            padding: 50px 8% 20px 8%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .brand-logo {
            font-family: 'Montserrat', sans-serif;
            color: var(--gold);
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .cert-bar { display: flex; gap: 15px; margin-top: 15px; }
        .cert-bar img { height: 30px; opacity: 0.8; }

        /* Main Container: เพิ่มระยะห่างระหว่างฝั่งซ้ายและขวา */
        .premium-container {
            max-width: 1300px;
            margin: 40px auto 100px auto;
            display: grid;
            grid-template-columns: 1fr 1.1fr; /* แบ่งสัดส่วนให้สมดุล */
            gap: 120px; /* เพิ่มระยะห่างเพื่อไม่ให้ดูติดกัน */
            align-items: center;
            padding: 0 5%;
        }

        /* Left Side: Information */
        .info-content {
            display: flex;
            flex-direction: column;
            gap: 35px; /* เพิ่มระยะห่างระหว่างหัวข้อ */
        }

        .product-highlight {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--sky-blue);
            line-height: 1.1;
        }

        .product-highlight span {
            color: #ff4757; /* ตัวหนาสีแดงตามรูปที่ 2 */
            font-size: 2.2rem;
            margin-left: 10px;
        }

        .feature-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .feature-list li {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #444;
        }

        .feature-list li::before {
            content: '✓';
            color: #2ed573;
            font-weight: 900;
        }

        .pricing-box {
            display: flex;
            align-items: baseline;
            gap: 20px;
            margin-top: 10px;
        }

        .old-price { font-size: 1.8rem; color: #b2bec3; text-decoration: line-through; }
        .current-price { font-size: 4rem; font-weight: 900; color: #2D3436; }

        .shop-btn {
            background: var(--deep-green);
            color: white;
            padding: 22px 60px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.3rem;
            text-align: center;
            width: fit-content;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 20px 40px rgba(43,76,59,0.2);
            transition: 0.3s;
        }

        .shop-btn:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(43,76,59,0.3); }

        /* Right Side: Visual Showcase */
        .visual-showcase {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .main-title {
            font-size: 6.5rem;
            font-weight: 900;
            color: var(--sky-blue);
            line-height: 0.85;
            text-align: center;
            margin-bottom: 40px; /* เพิ่มระยะห่างจากขวดน้ำ */
            text-transform: uppercase;
            letter-spacing: -3px;
        }

        .bottle-img {
            width: 100%;
            max-width: 550px;
            filter: drop-shadow(0 40px 60px rgba(0,0,0,0.12));
            z-index: 2;
        }

        /* รัศมีแสงสีฟ้าอ่อนด้านหลังช่วยลดความอึดอัด */
        .visual-showcase::after {
            content: '';
            position: absolute;
            top: 60%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: radial-gradient(circle, rgba(74,144,226,0.08) 0%, transparent 70%);
            z-index: 1;
        }

        @media (max-width: 1100px) {
            .premium-container { grid-template-columns: 1fr; gap: 80px; text-align: center; }
            .info-content { align-items: center; }
            .main-title { font-size: 4.5rem; }
            .pricing-box { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">EVER GOOD PARTNERS</div>
        <div class="cert-bar">
            <img src="images/fssc-22000.png" alt="FSSC">
            <img src="images/fssc-22001.png" alt="Halal">
            <img src="images/fssc-22002.png" alt="USDA">
            <img src="images/fssc-22004.png" alt="SGS">
        </div>
    </header>

    <main class="premium-container">
        <div class="info-content">
            <h2 class="product-highlight">
                18 months <span>→ ตัวหนา</span><br>
                @ room temp.
            </h2>
            
            <ul class="feature-list">
                <li>100% NATURAL & PURE</li>
                <li>ZERO ADDED SUGAR</li>
                <li>NO PRESERVATIVES</li>
            </ul>

            <div class="pricing-box">
                <span class="old-price">฿5,690</span>
                <span class="current-price">฿3,990</span>
            </div>

            <a href="#" class="shop-btn">Shop Now</a>
        </div>

        <div class="visual-showcase">
            <h1 class="main-title">Coconut<br>Water</h1>
            <img src="images/fssc-22005.png" class="bottle-img" alt="Premium Coconut Water">
        </div>
    </main>

</body>
</html>

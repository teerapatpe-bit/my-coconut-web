<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | Interactive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2B4C3B;
            --accent: #7ED321;
            --blue-text: #4A90E2;
            --bg: #F7F5F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); overflow-x: hidden; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 60px; }

        /* --- Animated Header --- */
        header { display: flex; justify-content: space-between; align-items: flex-start; padding: 50px 0; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 4rem; color: var(--primary); letter-spacing: -3px; }
        .cert-icons { display: flex; gap: 12px; margin-top: 10px; }
        .cert-icons img { height: 30px; transition: 0.3s; cursor: pointer; }
        .cert-icons img:hover { transform: translateY(-5px); }

        .nav-links { display: flex; gap: 35px; }
        .nav-link { text-decoration: none; color: #000; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; position: relative; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background: var(--accent); transition: 0.3s; }
        .nav-link:hover::after { width: 100%; }

        /* --- Main Layout --- */
        .hero-grid { display: grid; grid-template-columns: 1fr 1fr; align-items: center; min-height: 70vh; gap: 40px; }

        .features { list-style: none; }
        .feature-item { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; transform: translateX(-20px); opacity: 0; animation: slideIn 0.5s forwards; }
        .feature-item span { font-size: 1.5rem; font-weight: 700; color: #333; }
        
        @keyframes slideIn { to { transform: translateX(0); opacity: 1; } }

        /* --- Interactive Product Card --- */
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 60px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.08);
            position: relative;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .badge-group { text-align: left; margin-bottom: 20px; }
        .badge-main { font-size: 1.8rem; font-weight: 800; color: var(--blue-text); display: block; }
        .badge-sub { font-size: 1.2rem; font-weight: 600; color: var(--blue-text); }

        /* Floating Animation */
        .product-img-wrap { perspective: 1000px; }
        .main-img {
            width: 250px;
            margin: 20px auto 40px;
            display: block;
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.15));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        /* Size Selector Styling */
        .selector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .size-box {
            background: #fdfdfd;
            border: 3px solid #eee;
            border-radius: 25px;
            padding: 20px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .size-box img { width: 45px; margin-bottom: 10px; opacity: 0.6; transition: 0.3s; }
        .size-box b { display: block; font-size: 1.1rem; color: #222; }
        .size-box small { color: #aaa; text-transform: uppercase; font-weight: 700; font-size: 0.7rem; }

        .size-box.active { border-color: var(--primary); transform: scale(1.05); background: white; }
        .size-box.active img { opacity: 1; transform: scale(1.1); }
        .size-box:hover:not(.active) { border-color: #ddd; transform: translateY(-5px); }

        .btn-buy {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 25px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            display: block;
            letter-spacing: 3px;
            transition: 0.4s;
            box-shadow: 0 15px 30px rgba(43,76,59,0.3);
        }

        .btn-buy:hover { background: #1a3025; transform: scale(1.02); box-shadow: 0 20px 40px rgba(43,76,59,0.4); }

        @media (max-width: 1000px) {
            .hero-grid { grid-template-columns: 1fr; text-align: center; }
            .feature-item { justify-content: center; }
            header { flex-direction: column; align-items: center; gap: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-left">
                <div class="logo">ELI.</div>
                <div class="cert-icons">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/fssc-22001.png" alt="Halal">
                    <img src="images/fssc-22002.png" alt="USDA">
                    <img src="images/fssc-22003.png" alt="Kosher">
                    <img src="images/fssc-22004.png" alt="SGS">
                </div>
            </div>
            <nav class="nav-links">
                <a href="#" class="nav-link">Product Overview</a>
                <a href="#" class="nav-link">Factory Excellence</a>
                <a href="#" class="nav-link">Quality</a>
                <a href="#" class="nav-link">Contact</a>
            </nav>
        </header>

        <main class="hero-grid">
            <div class="features">
                <div class="feature-item" style="animation-delay: 0.1s">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item" style="animation-delay: 0.2s">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item" style="animation-delay: 0.3s">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Artificial Flavor</span>
                </div>
                <div class="feature-item" style="animation-delay: 0.4s">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Coloring</span>
                </div>
                <div class="feature-item" style="animation-delay: 0.5s">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="card">
                <div class="badge-group">
                    <span class="badge-main">18 months</span>
                    <span class="badge-sub">@ room temp.</span>
                </div>

                <div class="product-img-wrap">
                    <img src="images/fssc-22005.png" alt="ELI Coconut Water" class="main-img" id="product-display">
                </div>
                
                <div class="selector-grid">
                    <div class="size-box active" onclick="updateUI('330ml', this)">
                        <img src="images/fssc-22005.png" alt="330">
                        <b>330ml</b>
                        <small>Present</small>
                    </div>
                    <div class="size-box" onclick="updateUI('1000ml', this)">
                        <img src="images/fssc-22005.png" alt="1000" style="transform: scale(1.3)">
                        <b>1000ml</b>
                        <small>Future</small>
                    </div>
                </div>

                <a href="#" class="btn-buy">Shop Now</a>
            </div>
        </main>
    </div>

    <script>
        function updateUI(size, element) {
            // สลับสถานะปุ่ม
            document.querySelectorAll('.size-box').forEach(b => b.classList.remove('active'));
            element.classList.add('active');

            // เพิ่มลูกเล่นเขย่าขวดเมื่อเปลี่ยนขนาด
            const img = document.getElementById('product-display');
            img.style.animation = 'none';
            img.offsetHeight; // trigger reflow
            img.style.animation = 'float 4s ease-in-out infinite';
            
            if(size === '1000ml') {
                img.style.transform = 'scale(1.1)';
            } else {
                img.style.transform = 'scale(1)';
            }
        }
    </script>

</body>
</html>

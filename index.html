<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --bg-content: #f4f8f5; /* สีพื้นหลังหลักฝั่งซ้าย */
            --bg-highlight: #ebf2ee; /* สีพื้นหลังซ้อนใต้ข้อความ */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--white); overflow-x: hidden; }

        /* --- Header Section --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--white);
            position: relative;
            z-index: 100;
        }
        .cert-icons { display: flex; gap: 20px; align-items: center; }
        .cert-icons img { height: 60px; mix-blend-mode: multiply; }
        
        .nav-links { display: flex; list-style: none; gap: 25px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: 600; font-size: 0.85rem; }
        .search-btn { background: var(--accent-green); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        /* --- Hero Section 50/50 --- */
        .hero {
            display: flex;
            min-height: 750px;
            width: 100%;
        }

        /* ฝั่งซ้าย: มีพื้นหลังซ้อน */
        .hero-left {
            flex: 1;
            background-color: var(--bg-content);
            position: relative; /* เพื่อให้พื้นหลังไฮไลท์อ้างอิงตำแหน่งได้ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 8%;
            z-index: 1;
            overflow: hidden;
        }

        /* แถบพื้นหลังพิเศษใต้ข้อความ (ทำให้ดูเต็มกล่องตามรูป) */
        .text-bg-layer {
            position: absolute;
            top: 50%;
            left: 0;
            width: 120%; /* ขยายให้กว้างกว่ากล่อง */
            height: 400px;
            background: var(--bg-highlight);
            transform: translateY(-40%) rotate(-2deg); /* เอียงเล็กน้อยให้มีมิติ */
            z-index: -1;
            border-radius: 50px;
        }

        .hero-top-icon {
            width: 200px;
            margin-top: -80px; /* ดันโลโก้ Eli ขึ้น */
            margin-bottom: 20px;
            mix-blend-mode: multiply;
        }

        .hero-left h4 { color: var(--accent-green); font-size: 1.4rem; font-weight: 600; }
        .hero-left h1 { 
            color: var(--primary-green); 
            font-size: 7rem; 
            line-height: 0.9; 
            font-weight: 800; 
            margin: 15px 0 35px;
        }

        .btn-more {
            background: var(--accent-green);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            width: fit-content;
            font-weight: 600;
            box-shadow: 0 8px 15px rgba(89, 128, 60, 0.2);
        }

        /* ฝั่งขวา: รูปภาพสินค้า */
        .hero-right {
            flex: 1;
            background: #fff;
        }
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* --- Features Bar --- */
        .features-bar {
            background: white;
            margin: -40px 5% 40px;
            padding: 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
        }
        .feature-item { display: flex; align-items: center; gap: 12px; }
        .f-icon { width: 45px; height: 45px; background: var(--accent-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; }
        .f-text b { display: block; font-size: 1rem; color: var(--primary-green); }
        .f-text span { font-size: 0.75rem; color: #888; }

        @media (max-width: 1024px) {
            .hero { flex-direction: column; }
            .hero-right { height: 450px; }
            .hero-left h1 { font-size: 4.5rem; }
            .text-bg-layer { width: 100%; transform: none; top: 20%; height: 60%; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 style="color: var(--gold); font-size: 1.2rem; font-weight: 700;">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22014.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="BRC">
            </div>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">OVERVIEW</a></li>
                <li><a href="#">PRODUCTION</a></li>
                <li><a href="#">CERTIFICATION</a></li>
                <li><a href="#">CONTACT</a></li>
                <li><button class="search-btn"><i class="fas fa-search"></i></button></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-left">
            <div class="text-bg-layer"></div> <img src="images/fssc-22015.png" alt="Eli Logo" class="hero-top-icon">
            <h4>100% NATURAL</h4>
            <h1>Coconut<br>Water</h1>
            <a href="#" class="btn-more">300ml &nbsp; <i class="fas fa-arrow-right"></i></a>
        </div>
        
        <div class="hero-right">
            <img src="images/fssc-22016.png" alt="Coconut Water" class="product-img">
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-tint-slash"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-vial-slash"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

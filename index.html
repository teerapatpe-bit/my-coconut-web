<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI. COCONUT WATER | Premium Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B6CB0;
            --text-dark: #2D3436;
            --bg-light: #F0F4F8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 25px 5%;
            gap: 25px;
        }
        nav a { 
            text-decoration: none; 
            color: #555; 
            font-weight: 600;
            font-size: 0.9rem;
        }

        .main-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 5%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            align-items: center;
            gap: 40px;
        }

        /* ฝั่งซ้าย: แบรนด์และกล่องข้อมูล */
        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 0.85;
            color: var(--brand-blue);
        }

        .brand-slogan {
            font-weight: 800;
            color: #95a5a6;
            letter-spacing: 3px;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .info-card h2 { font-size: 2.2rem; font-weight: 900; margin-bottom: 15px; }

        .check-list { list-style: none; margin-bottom: 25px; }
        .check-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }
        .check-list li::before { content: '✓'; color: #2ecc71; font-weight: 900; }

        .btn-status {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 15px;
            background: transparent;
            font-weight: 900;
            font-size: 1.1rem;
            text-align: center;
        }

        /* ฝั่งขวา: การ์ดสินค้ากระจกฝ้า */
        .product-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            border-radius: 50px;
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            position: relative;
        }

        .search-container {
            background: #fff;
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .search-container span { color: var(--brand-blue); font-weight: 900; font-size: 1.5rem; }
        .search-btn { background: var(--brand-blue); color: #fff; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }

        .product-flex { display: flex; gap: 30px; align-items: flex-start; }

        .product-info { flex: 1; }
        .seo-link { color: #7f8c8d; font-weight: 700; margin-bottom: 10px; font-size: 0.9rem; }
        
        .main-headline {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--brand-blue);
            line-height: 1.1;
            margin-bottom: 25px;
        }
        .main-headline b { color: #e74c3c; font-size: 1.1rem; display: block; margin-top: 5px; }

        .price-tag { margin-bottom: 20px; }
        .price-old { text-decoration: line-through; color: #bdc3c7; font-size: 1.8rem; margin-right: 15px; }
        .price-current { font-size: 3rem; font-weight: 900; color: #2d3436; }
        .price-subtext { color: var(--brand-blue); font-weight: 800; font-size: 1.3rem; margin-top: 5px; }

        .stars { color: #f1c40f; font-size: 1.5rem; margin-bottom: 35px; }

        .product-image {
            width: 250px;
            transform: rotate(5deg);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15));
        }

        .cert-row {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .cert-row img { height: 35px; opacity: 0.8; }

        @media (max-width: 1024px) {
            .main-wrapper { grid-template-columns: 1fr; text-align: center; }
            .info-card { margin: 0 auto; }
            .brand-title { font-size: 4rem; }
            .product-flex { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Man</a>
        <a href="#">Woman</a>
        <a href="#">Kids</a>
        <a href="#">Cust.</a>
        <a href="#">Coll.</a>
    </nav>

    <div class="main-wrapper">
        <div class="brand-section">
            <div>
                <h1 class="brand-title">ELI.<br>COCONUT<br>WATER</h1>
                <p class="brand-slogan">SIP. SIP. ELEGANCE.</p>
            </div>

            <div class="info-card">
                <h2>330ml</h2>
                <ul class="check-list">
                    <li>100% NATURAL & PURE</li>
                    <li>ZERO ADDED SUGAR</li>
                    <li>NO PRESERVATIVES</li>
                </ul>
                <div class="btn-status">present</div>
            </div>
        </div>

        <div class="product-card">
            <div class="search-container">
                <span>coconut water</span>
                <div class="search-btn">🔍</div>
            </div>

            <div class="product-flex">
                <div class="product-info">
                    <p class="seo-link">SEO. www.eli.co.th</p>
                    <h2 class="main-headline">
                        18 months <b>ตัวหนา</b>
                        @ room temp.
                    </h2>
                    
                    <div class="price-tag">
                        <span class="price-old">฿5,690</span>
                        <span class="price-current">฿3,990</span>
                        <div class="price-subtext">prices ฿3,990</div>
                    </div>

                    <div class="stars">★★★★★</div>

                    <div class="cert-row">
                        <img src="images/fssc-22000.png" alt="FSSC">
                        <img src="images/fssc-22001.png" alt="HALAL">
                        <img src="images/fssc-22002.png" alt="USDA">
                        <img src="images/fssc-22003.png" alt="KOSHER">
                        <img src="images/fssc-22004.png" alt="AWARD">
                    </div>
                </div>

                <img src="images/fssc-22005.png" class="product-image" alt="Eli Coconut Water">
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --green: #2B4C3B; --blue: #4A90E2; --bg: #F8F7F5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #111; overflow-x: hidden; }
        
        .container { max-width: 1300px; margin: 0 auto; padding: 0 50px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 3.5rem; color: var(--green); letter-spacing: -2px; font-weight: 900; }
        
        .main-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; align-items: center; min-height: 80vh; }
        
        /* ข้อมูลฝั่งซ้าย */
        .cert-row { display: flex; gap: 15px; margin-bottom: 35px; }
        .cert-row img { height: 28px; opacity: 0.7; }
        .feat { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-size: 1.5rem; font-weight: 800; }
        .check { color: #7ED321; font-weight: 900; }

        /* ส่วนแสดงผลขวา (Interactive Area) */
        .product-display { display: flex; flex-direction: column; align-items: center; }
        .shelf-life { align-self: flex-start; margin-bottom: 20px; }
        .shelf-life b { font-size: 2.5rem; color: var(--blue); display: block; font-weight: 900; } /* */
        .shelf-life span { font-size: 1.4rem; color: var(--blue); font-weight: 700; }

        /* เอฟเฟกต์ขวดลอย */
        .bottle-wrap { height: 420px; display: flex; align-items: center; justify-content: center; }
        .bottle-main { width: 300px; filter: drop-shadow(0 30px 50px rgba(0,0,0,0.1)); transition: 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* กล่องขนาดแบบ Hover & Expand */
        .size-selector { display: flex; gap: 20px; width: 100%; max-width: 500px; margin: 30px 0; }
        .size-card { flex: 1; background: white; border-radius: 30px; padding: 30px 20px; text-align: center; cursor: pointer; border: 2px solid transparent; box-shadow: 0 10px 25px rgba(0,0,0,0.04); transition: 0.4s; }
        .size-card:hover { transform: scale(1.1); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .size-card.active { border-color: var(--green); }
        .size-card img { height: 55px; margin-bottom: 10px; }
        .size-card b { display: block; font-size: 1.2rem; font-weight: 900; }
        .size-card p { font-size: 0.7rem; font-weight: 800; color: #999; text-transform: uppercase; }

        .btn-shop { background: var(--green); color: white; width: 100%; max-width: 500px; padding: 24px; border-radius: 100px; text-decoration: none; font-weight: 900; text-align: center; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-shop:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(43,76,59,0.3); }

        @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; text-align: center; } .cert-row, .feat { justify-content: center; } .shelf-life { align-self: center; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ELI.</div>
        </header>
        <main class="main-grid">
            <div class="left">
                <div class="cert-row">
                    <img src="images/fssc.png" alt="FSSC"> <img src="images/halal.png" alt="Halal"> 
                    <img src="images/usda.png" alt="USDA"> <img src="images/kosher.png" alt="Kosher"> 
                    <img src="images/sgs.png" alt="SGS">
                </div>
                <div class="feat"><span class="check">✓</span> 100% Natural Coconut water</div>
                <div class="feat"><span class="check">✓</span> No Sugar Added</div>
                <div class="feat"><span class="check">✓</span> No Preservatives</div>
            </div>
            <div class="product-display">
                <div class="shelf-life"><b>18 months</b><span>@ room temp.</span></div>
                <div class="bottle-wrap">
                    <img src="images/bottle-330.png" id="mainBottle" class="bottle-main">
                </div>
                <div class="size-selector">
                    <div class="size-card active" onmouseover="changeImg('330ml')" onclick="setActive(this)">
                        <img src="images/bottle-330.png"><b>330ml</b><p>Present</p>
                    </div>
                    <div class="size-card" onmouseover="changeImg('1000ml')" onclick="setActive(this)">
                        <img src="images/bottle-1000.png" style="transform: scale(1.2)"><b>1000ml</b><p>Future</p>
                    </div>
                </div>
                <a href="#" class="btn-shop">Shop Now</a>
            </div>
        </main>
    </div>
    <script>
        function changeImg(size) {
            const img = document.getElementById('mainBottle');
            img.style.transform = (size === '1000ml') ? 'scale(1.15)' : 'scale(1)';
        }
        function setActive(el) {
            document.querySelectorAll('.size-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>

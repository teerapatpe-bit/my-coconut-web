<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --text-dark: #333333;
            --bg-light: #f8faf9;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Prompt', sans-serif; 
        }

        body {
            background-color: var(--bg-light);
            overflow-x: hidden;
        }

        /* HEADER & NAVIGATION */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: var(--white);
            position: relative;
            z-index: 100;
        }

        .brand-header { 
            color: var(--gold); 
            font-size: 1.35rem; 
            font-weight: 700; 
            line-height: 1.2;
        }

        .partners-text { 
            color: var(--gold); 
            font-size: 0.75rem; 
            letter-spacing: 3px; 
            margin-bottom: 12px; 
        }

        .cert-icons { 
            display: flex; 
            gap: 10px; 
        }

        .cert-icons img { 
            height: 30px; 
            mix-blend-mode: multiply; 
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 35px;
            margin-left: auto;
            margin-right: 40px;
        }

        .nav-menu li a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 0.3s ease;
            text-transform: uppercase;
        }

        .nav-menu li a:hover {
            color: var(--accent-green);
        }

        /* Search Icon Style */
        .search-btn {
            width: 45px;
            height: 45px;
            background: #f1f3f2;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-green);
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-btn:hover {
            background: var(--accent-green);
            color: var(--white);
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            min-height: 700px;
            width: 100%;
            background-image: url('images/fssc-22018.png'); 
            background-size: cover;
            background-position: center right; 
            display: flex;
            align-items: center;
            padding: 0 8%;
        }

        .hero-top-icon {
            position: absolute;
            top: 40px;
            left: 8%;
            width: 180px; 
            z-index: 15;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 650px;
        }

        .hero-content h4 { 
            color: var(--accent-green); 
            font-size: 1.8rem; 
            font-weight: 700; 
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .hero-content h1 { 
            color: var(--primary-green); 
            font-size: 6rem; 
            line-height: 0.9; 
            font-weight: 800; 
            margin: 0 0 35px; 
            text-transform: uppercase;
        }

        .btn-more {
            background: var(--accent-green);
            color: var(--white);
            padding: 14px 35px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 8px 20px rgba(89, 128, 60, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-more:hover {
            transform: translateY(-3px);
            background: var(--primary-green);
        }

        /* FEATURES BAR */
        .features-bar {
            background: var(--white);
            margin: -60px 60px 40px;
            padding: 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            position: relative;
            z-index: 20;
        }

        .feature-item { 
            display: flex; 
            align-items: center; 
            gap: 15px;
            flex: 1;
            justify-content: center;
        }

        .f-icon { 
            width: 50px; 
            height: 50px; 
            background: var(--accent-green); 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--white); /* ทำให้ไอคอนข้างในเป็นสีขาว */
            flex-shrink: 0;
        }

        .f-text b { 
            display: block; 
            font-size: 1rem; 
            color: var(--text-dark); 
            line-height: 1.2; 
        }

        .f-text span {
            font-size: 0.75rem;
            color: #666;
            display: block;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 1200px) {
            .nav-menu { gap: 20px; }
            .header-container { padding: 20px 30px; }
        }

        @media (max-width: 992px) {
            .hero { background-position: 70%; text-align: left; }
            .hero-content h1 { font-size: 4rem; }
            .nav-menu { display: none; }
            .features-bar { 
                flex-wrap: wrap; 
                margin: 20px; 
                gap: 20px;
            }
            .feature-item { 
                flex: none;
                width: 45%;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC 22000">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA Organic">
                <img src="images/fssc-22014.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="BRC">
            </div>
        </div>

        <ul class="nav-menu">
            <li><a href="#overview">Overview</a></li>
            <li><a href="#production">Production</a></li>
            <li><a href="#certification">Certification</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <div class="search-btn">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <section class="hero">
        <img src="images/fssc-22015.png" alt="Eli Logo" class="hero-top-icon">
        
        <div class="hero-content">
            <h4>100% NATURAL</h4>
            <h1>COCONUT<br>WATER</h1>
            <a href="#discover" class="btn-more">
                300 ml &nbsp; <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-tint-slash"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>

        <div class="feature-item">
            <div class="f-icon">
                <i class="fas fa-xmark" style="font-size: 26px; color: #FFFFFF;"></i>
            </div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>

        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>

        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            /* ตัวอักษรสีทองที่ปรับจูนใหม่ */
            --gold-solid: #C5A059;
            --gold-gradient: linear-gradient(135deg, #C5A059 0%, #F1D592 50%, #B8860B 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.8), rgba(235, 240, 245, 0.7)), 
                        url('images/fssc-22007.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #2D3436;
        }

        /* --- Header Section --- */
        .header {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 5% 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* ชื่อบริษัทสีทอง Gradient */
        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cert-row {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .cert-row img { height: 28px; opacity: 0.9; }

        /* แถบเมนูทรงแคปซูล */
        .nav-pill {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 8px 30px;
            display: flex;
            gap: 20px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
        }

        .nav-pill a {
            text-decoration: none;
            color: #000;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* --- Main Content Layout --- */
        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 5% 50px;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        /* --- Eli Info Card --- */
        .info-side { width: 340px; }

        .eli-badge {
            background: #000;
            color: #fff;
            padding: 10px 25px;
            border-radius: 15px 15px 0 0;
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
        }

        .feature-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 30px 25px;
            border-radius: 0 25px 25px 25px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .feature-item {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .feature-item::before {
            content: '✓';
            width: 18px; height: 18px;
            background: #27AE60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }

        /* ปุ่ม "present" ในกล่อง Eli */
        .present-pill {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            margin-top: 5px;
            transition: 0.3s ease;
        }

        .present-pill:hover {
            background: #000;
            color: #fff;
        }

        /* --- Product Showcase --- */
        .product-display {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 60px;
            display: flex;
            justify-content: center;
            gap: 50px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* ข้อความสีทอง Solid ในรายละเอียด */
        .export-label {
            color: var(--gold-solid);
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .shelf-life {
            font-size: 3.5rem;
            color: var(--brand-blue);
            font-weight: 800;
            line-height: 1.1;
        }

        .shelf-life span {
            display: block;
            font-size: 1.8rem;
            color: #718096;
            font-weight: 400;
        }

        .volume {
            font-size: 4.8rem;
            font-weight: 900;
            color: #1a202c;
            margin: 10px 0;
        }

        .stars { color: #F1C40F; font-size: 1.3rem; }

        .bottle-img img {
            max-width: 420px;
            width: 100%;
            filter: drop-shadow(20px 25px 40px rgba(0,0,0,0.1));
            transform: rotate(2deg);
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="brand-group">
            <h1 class="brand-title">EVER GOOD PARTNERS CO.,LTD.</h1>
           <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-row">
                <img src="images/fssc-22000.png" alt="Cert">
                <img src="images/fssc-22001.png" alt="Cert">
                <img src="images/fssc-22002.png" alt="Cert">
                <img src="images/fssc-22003.png" alt="Cert">
                <img src="images/fssc-22004.png" alt="Cert">
            </div>
        </div>
        
        <nav class="nav-pill">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-side">
            <div class="feature-box">
                 <a href="#" class="present-pill">Eli</a>
                <ul>
                    <li class="feature-item">100% Natural Coconut water</li>
                    <li class="feature-item">No Sugar Added</li>
                    <li class="feature-item">No Artificial Flavor</li>
                    <li class="feature-item">No Coloring</li>
                    <li class="feature-item">No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="product-display">
            <div class="product-text">
                <p class="export-label">PREMIUM EXPORT QUALITY</p>
                <h2 class="shelf-life">18 months <span>Shelf-life at room temp.</span></h2>
                <div class="volume">330ml</div>
                <div class="stars">★★★★★</div>
            </div>
            <div class="bottle-img">
                <img src="images/fssc-22009.png" alt="Eli Coconut Pouch">
            </div>
        </div>
    </main>

</body>
</html>

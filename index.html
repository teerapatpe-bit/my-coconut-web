<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Official Landing Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B6CB0;
            --gold-gradient: linear-gradient(180deg, #D4AF37 0%, #F1D592 50%, #B8860B 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8 url('images/fssc-22007.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ส่วนหัวและเมนู */
        .top-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 5% 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* 1. เลื่อนแบรนด์ขึ้นมาบนสุด */
        .brand-header {
            flex: 1;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 4.2rem;
            line-height: 0.9;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .slogan {
            font-size: 1.1rem;
            font-weight: 800;
            color: #636e72;
            letter-spacing: 5px;
            margin-bottom: 30px;
        }

        nav {
            display: flex;
            gap: 35px;
            padding-top: 15px;
        }

        nav a {
            text-decoration: none;
            color: #111;
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* เลย์เอาต์หลัก */
        .content-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 5% 60px;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 40px;
            align-items: start;
        }

        /* ฝั่งซ้าย: ข้อมูลสินค้า */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* ขยายไอคอน Certification */
        .cert-icons {
            display: flex;
            gap: 15px;
        }

        .cert-icons img {
            height: 45px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .info-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .info-card ul { list-style: none; }
        .info-card li {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .info-card li::before {
            content: '✓';
            color: #2ecc71;
            font-weight: 900;
        }

        /* ฝั่งขวา: กรอบสินค้าพรีเมียม (เลื่อนมาทางขวาชิดตัว T) */
        .product-glass-container {
            display: flex;
            justify-content: flex-end; /* เลื่อนกรอบไปทางขวาสุด */
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            padding: 50px;
            width: 750px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            position: relative;
        }

        .search-bar {
            background: white;
            border-radius: 25px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .search-bar span {
            color: var(--brand-blue);
            font-weight: 900;
            font-size: 1.8rem;
        }

        .product-content {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .product-text { flex: 1; }

        .product-text h2 {
            font-size: 3.2rem;
            color: var(--brand-blue);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
        }

        .product-text h2 span {
            display: block;
            font-size: 2rem;
            color: #555;
            margin-top: 5px;
        }

        .volume { font-size: 4rem; font-weight: 900; color: #111; }
        .rating { color: #f1c40f; font-size: 1.8rem; margin-top: 10px; }

        /* ขยายรูปขวดน้ำและลบพื้นหลังขาว */
        .product-img-wrap {
            flex: 1.2;
            display: flex;
            justify-content: center;
        }

        .bottle-img {
            width: 130%; /* ขยายรูปให้ใหญ่ขึ้น */
            max-width: 450px;
            mix-blend-mode: multiply; /* ลบพื้นหลังสีขาว */
            transform: rotate(6deg);
            filter: drop-shadow(25px 35px 50px rgba(0,0,0,0.2));
        }

        @media (max-width: 1200px) {
            .content-section { grid-template-columns: 1fr; }
            .product-glass-container { justify-content: center; }
            .brand-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="top-container">
        <div class="brand-header">
            <h1 class="brand-title">EVER GOOD<br>PARTNERS CO., LTD.</h1>
            <p class="slogan">PARTNERS IN PURITY.</p>
        </div>
        <nav>
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </div>

    <div class="content-section">
        <div class="left-panel">
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22003.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="Award">
            </div>

            <div class="info-card">
                <ul>
                    <li>100% Natural Coconut water</li>
                    <li>No Sugar Added</li>
                    <li>No Artificial Flavor</li>
                    <li>No Coloring</li>
                    <li>No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="product-glass-container">
            <div class="glass-box">
                <div class="search-bar">
                    <span>coconut water</span>
                    <div style="background: var(--brand-blue); color:white; padding:12px; border-radius:15px;">🔍</div>
                </div>

                <div class="product-content">
                    <div class="product-text">
                        <p style="color:#888; font-weight:700; margin-bottom:10px;">SEO. www.evergood.co.th</p>
                        <h2>18 months<span>@ room temp.</span></h2>
                        <div class="volume">300ml</div>
                        <div class="rating">★★★★★</div>
                    </div>

                    <div class="product-img-wrap">
                        <img src="images/fssc-22008.png" class="bottle-img" alt="Ever Good Coconut Water">
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

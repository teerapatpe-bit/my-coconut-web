<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | Pure Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F7F5F2;
            --brand-green: #2B4C3B;    
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #1C1D1B;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 50px;
        }

        /* --- Header Section --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 40px 0;
        }

        .brand-logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--brand-green);
            line-height: 0.8;
            margin-bottom: 15px;
        }

        .cert-icons { display: flex; gap: 12px; }
        .cert-icons img { height: 26px; }

        .nav-links { display: flex; gap: 30px; padding-top: 10px; }
        .nav-links a {
            text-decoration: none;
            color: #000;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Content Layout --- */
        .content-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 80px;
        }

        /* ส่วนรายการคุณสมบัติที่เพิ่มใหม่ */
        .feature-list {
            flex: 1;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 18px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #4A4A4A;
        }

        .check-icon {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }

        /* --- Product Card Section --- */
        .product-card {
            flex: 1;
            max-width: 480px;
            background: var(--white);
            border-radius: 40px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 45px rgba(0,0,0,0.06);
        }

        .product-image {
            width: 100%;
            max-width: 260px;
            margin-bottom: 35px;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1));
        }

        .size-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .size-btn {
            border: 2px solid #EAEAEA;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
            color: #999;
        }

        .size-btn.active {
            border-color: var(--brand-green);
            color: var(--brand-green);
            background-color: rgba(43, 76, 59, 0.05);
        }

        .shop-now-btn {
            background-color: var(--brand-green);
            color: var(--white);
            padding: 20px 90px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .shop-now-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(43,76,59,0.2); }

        @media (max-width: 1100px) {
            .content-wrap { flex-direction: column; text-align: center; }
            header { flex-direction: column; align-items: center; gap: 30px; }
            .feature-item { justify-content: center; }
            .product-card { margin-top: 50px; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-section">
                <div class="brand-logo">ELI.</div>
                <div class="cert-icons">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/fssc-22001.png" alt="Halal">
                    <img src="images/fssc-22002.png" alt="USDA">
                    <img src="images/fssc-22003.png" alt="Kosher">
                    <img src="images/fssc-22004.png" alt="SGS">
                </div>
            </div>
            <nav class="nav-links">
                <a href="#">Product Overview</a>
                <a href="#">Factory & Production</a>
                <a href="#">Quality & Certs</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <main class="content-wrap">
            <div class="feature-list">
                <div class="feature-item">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Artificial Flavor</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Coloring</span>
                </div>
                <div class="feature-item">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="product-card">
                <img src="images/fssc-22005.png" alt="ELI Product" class="product-image">
                
                <div class="size-selector">
                    <div class="size-btn active" onclick="selectSize(this)">330ml</div>
                    <div class="size-btn" onclick="selectSize(this)">1000ml</div>
                </div>

                <a href="#" class="shop-now-btn">Shop Now</a>
            </div>
        </main>
    </div>

    <script>
        function selectSize(element) {
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELI | Premium Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F2EFE9;
            --text-dark: #1C1D1B;      
            --text-light: #5A5A5A;
            --brand-green: #2B4C3B;    
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header, section, footer {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* --- ปรับโลโก้และใบรับรองให้อยู่คนละบรรทัด (หย่อนลงมา) --- */
        .brand-area {
            display: flex;
            flex-direction: column; /* เรียงเป็นแนวตั้ง */
            align-items: flex-start;
            gap: 20px; /* ระยะห่างระหว่างโลโก้กับแถบใบรับรอง */
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem; /* ปรับให้ใหญ่ขึ้น */
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--brand-green);
            line-height: 1;
        }

        .cert-box {
            display: flex;
            align-items: center;
            gap: 25px; /* ระยะห่างระหว่างไอคอนแต่ละตัว */
        }

        .cert-box img { 
            height: 70px; /* ปรับรูปไอคอนให้ใหญ่ขึ้น */
            width: auto; 
            object-fit: contain;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            margin-left: 2rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .hero { display: flex; min-height: 70vh; align-items: center; padding: 2rem; }
        .hero-content { flex: 1; }
        .hero h1 { font-size: 4rem; line-height: 1.1; margin-bottom: 1.5rem; text-transform: uppercase; }
        .hero-image { flex: 1; display: flex; justify-content: flex-end; }
        .hero-image img { width: 400px; height: 500px; object-fit: cover; border-radius: 16px; }

        footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: var(--text-light); }

        @media (max-width: 991px) {
            header { flex-direction: column; align-items: center; text-align: center; }
            .nav-links { display: none; }
            .hero { flex-direction: column; text-align: center; padding-top: 50px; }
            .cert-box { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-area">
            <div class="logo">ELI.</div>
            <div class="cert-box">
                <img src="images/fssc-22000.png" alt="cert">
                <img src="images/fssc-22001.png" alt="cert">
                <img src="images/fssc-22002.png" alt="cert">
                <img src="images/fssc-22003.png" alt="cert">
                <img src="images/fssc-22004.png" alt="cert">
                
            </div>
        </div>
        
        <nav class="nav-links">
            <a href="#">Our Story</a>
            <a href="#">Products</a>
            <a href="#">Sustainability</a>
            <a href="#">Shop</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Nature's Purest Hydration.</h1>
            <p>100% Coconut Water from Thailand’s finest young coconuts.</p>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1601050690597-df0568f70950?q=80&w=500" alt="Coconut">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 ELI COCONUT WATER.</p>
    </footer>

</body>
</html>

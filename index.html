<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Official Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B6CB0;
            --gold-shine: linear-gradient(to bottom, #D4AF37 0%, #F1D592 50%, #B8860B 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* เมนูด้านบน */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            padding: 30px 8%;
            gap: 30px;
        }
        .top-nav a { text-decoration: none; color: #333; font-weight: 700; font-size: 0.85rem; }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 6% 60px;
            display: grid;
            grid-template-columns: 1fr 1.2fr; /* ปรับสัดส่วนให้กล่องขวามีพื้นที่มากขึ้น */
            align-items: center;
            gap: 50px;
        }

        /* --- ฝั่งซ้าย: แบรนด์และจุดเด่น --- */
        .brand-header {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.8rem;
            line-height: 1;
            background: var(--gold-shine); /* ปรับสีทองตามคอมเม้น */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .partners-purity {
            font-size: 1rem;
            font-weight: 800;
            color: #888;
            letter-spacing: 3px;
            margin-bottom: 25px;
        }

        /* ขยายขนาดไอคอนการรับรองตามคอมเม้น */
        .cert-icons { display: flex; gap: 15px; margin-bottom: 40px; }
        .cert-icons img { height: 35px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1)); }

        .info-card {
            background: white;
            border-radius: 40px;
            padding: 35px;
            max-width: 400px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.05);
        }
        .info-card ul { list-style: none; margin-bottom: 25px; }
        .info-card li { display: flex; align-items: center; gap: 12px; font-weight: 700; margin-bottom: 15px; }
        .info-card li::before { content: '✓'; color: #2ecc71; font-weight: 900; }

        .present-btn {
            width: 100%;
            padding: 15px;
            border: 2px solid #000;
            border-radius: 20px;
            text-align: center;
            font-weight: 900;
            font-size: 1.3rem;
            background: transparent;
        }

        /* --- ฝั่งขวา: กล่องสินค้า Glassmorphism --- */
        .product-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            border-radius: 60px;
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            margin-left: 20px; /* ขยับกรอบไปทางขวาตามสั่ง */
        }

        .search-box {
            background: #fff;
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .search-box span { color: var(--brand-blue); font-weight: 900; font-size: 1.6rem; }

        .display-area { display: flex; align-items: center; gap: 30px; }

        /* ปรับขนาดตัวอักษร 18 months ให้สมส่วน */
        .promo-text { flex: 1; }
        .promo-text h2 { 
            font-size: 2.4rem; /* ปรับขนาดลงตามคอมเม้น */
            color: var(--brand-blue); 
            font-weight: 900; 
            line-height: 1.1;
            margin-bottom: 25px;
        }
        .promo-text .room-temp { font-size: 2.1rem; display: block; }

        .size-badge { font-size: 3.5rem; font-weight: 900; color: #2D3436; }
        .stars { color: #f1c40f; font-size: 1.5rem; margin-top: 10px; }

        /* ส่วนขวดน้ำ: ขยายใหญ่และใส่กรอบตามคอมเม้น */
        .bottle-frame {
            flex: 1.3;
            display: flex;
            justify-content: center;
            position: relative;
        }
        .bottle-img {
            width: 110%; /* ขยายขนาดรูปสินค้า */
            max-width: 360px;
            mix-blend-mode: multiply; /* ลบพื้นหลังสีขาว */
            filter: drop-shadow(20px 30px 50px rgba(0,0,0,0.2));
            transform: rotate(5deg);
        }

    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="#">OVERVIEW</a>
        <a href="#">PRODUCTION</a>
        <a href="#">CERTIFICATION</a>
        <a href="#">CONTACT</a>
    </nav>

    <div class="main-container">
        <div class="left-content">
            <h1 class="brand-header">EVER GOOD<br>PARTNERS CO., LTD.</h1>
            <p class="partners-purity">PARTNERS IN PURITY.</p>
            
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="Certification">
                <img src="images/fssc-22001.png" alt="Certification">
                <img src="images/fssc-22002.png" alt="Certification">
                <img src="images/fssc-22003.png" alt="Certification">
                <img src="images/fssc-22004.png" alt="Certification">
            </div>

            <div class="info-card">
                <ul>
                    <li>100% Natural Coconut water</li>
                    <li>No Sugar Added</li>
                    <li>No Artificial Flavor</li>
                    <li>No Coloring</li>
                    <li>No Preservatives</li>
                </ul>
                <div class="present-btn">present</div>
            </div>
        </div>

        <div class="product-panel">
            <div class="search-box">
                <span>coconut water</span>
                <div style="background: var(--brand-blue); color:white; padding:8px 12px; border-radius:10px;">🔍</div>
            </div>

            <div class="display-area">
                <div class="promo-text">
                    <p style="color:#95a5a6; font-weight:700; margin-bottom:10px;">SEO. www.evergood.co.th</p>
                    <h2>18 months<span class="room-temp">@ room temp.</span></h2>
                    <div class="size-badge">300ml</div>
                    <div class="stars">★★★★★</div>
                </div>

                <div class="bottle-frame">
                    <img src="images/fssc-22008.png" class="bottle-img" alt="Premium Coconut Water">
                </div>
            </div>
        </div>
    </div>

</body>
</html>

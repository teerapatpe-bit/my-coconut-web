<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --brand-gold: #C5A059;
            --brand-blue: #1A4F8B;
            --glass-white: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #ffffff 0%, #f4f7f9 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header: ขนาดกะทัดรัด --- */
        .header {
            width: 90%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 30px 0;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
        }

        .brand-title {
            font-size: 1.4rem; /* ลดขนาดชื่อบริษัท */
            font-weight: 500;
            letter-spacing: 2px;
            color: var(--brand-gold);
            text-transform: uppercase;
            margin: 0;
        }

        .slogan {
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: #8e9aaf;
            margin: 5px 0 15px 0;
        }

        .cert-logos img {
            height: 22px; /* ลดขนาดโลโก้รับรอง */
            margin-right: 10px;
            opacity: 0.8;
        }

        /* --- Main Content: จัดวางแบบโปร่งสบาย --- */
        .container {
            width: 90%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 260px 1fr; /* ลดความกว้างคอลัมน์ซ้าย */
            gap: 40px;
            align-items: center;
            padding-bottom: 50px;
        }

        /* --- Eli Info Card: เล็กและเนียน --- */
        .info-card {
            z-index: 2;
        }

        .eli-tag {
            background: #000;
            color: #fff;
            padding: 5px 18px;
            border-radius: 8px 8px 0 0;
            font-size: 1.1rem;
            font-weight: 900;
            display: inline-block;
        }

        .feature-list {
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 0 15px 15px 15px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            margin: 0;
            list-style: none;
        }

        .feature-list li {
            font-size: 0.75rem; /* ลดขนาดตัวอักษรคุณสมบัติ */
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feature-list li::before {
            content: '✓';
            color: #27ae60;
            font-weight: 900;
        }

        /* --- Product Showcase: สมดุลและนุ่มนวล --- */
        .showcase {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .text-area h2 {
            font-size: 2.2rem; /* ลดขนาดหัวข้อ */
            color: var(--brand-blue);
            line-height: 1.1;
            margin: 0;
        }

        .text-area .vol {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 10px 0;
        }

        .product-img img {
            max-width: 280px; /* ลดขนาดขวดผลิตภัณฑ์ลงให้ดูพอดี */
            height: auto;
            filter: drop-shadow(10px 10px 25px rgba(0,0,0,0.05));
            transform: rotate(2deg);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand-section">
            <h1 class="brand-title">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="slogan">PARTNERS IN PURITY.</p>
            <div class="cert-logos">
                <img src="fssc-22000.png" alt="FSSC">
                <img src="fssc-22001.png" alt="Halal">
                <img src="fssc-22002.png" alt="USDA">
                <img src="fssc-22003.png" alt="Kosher">
                <img src="fssc-22004.png" alt="Kosher">
            </div>
        </div>
        <nav style="font-size: 0.7rem; font-weight: 700; gap: 20px; display: flex;">
            <span>OVERVIEW</span>
            <span>PRODUCTION</span>
            <span>CERTIFICATION</span>
            <span>CONTACT</span>
        </nav>
    </header>

    <main class="container">
        <div class="info-card">
            <div class="eli-tag">Eli</div>
            <ul class="feature-list">
                <li>100% Natural Coconut water</li>
                <li>No Sugar Added</li>
                <li>No Artificial Flavor</li>
                <li>No Coloring</li>
                <li>No Preservatives</li>
            </ul>
        </div>

        <div class="showcase">
            <div class="text-area">
                <p style="font-size: 0.6rem; font-weight: 800; color: #a0aec0; letter-spacing: 1px;">PREMIUM QUALITY</p>
                <h2>18 months <br><span style="font-size: 1.2rem; font-weight: 400; color: #718096;">@ room temp.</span></h2>
                <div class="vol">330ml</div>
                <div style="color: #f6ad55;">★★★★★</div>
            </div>
            <div class="product-img">
                <img src="fssc-22009.pngg" alt="Eli Pouch">
            </div>
        </div>
    </main>

</body>
</html>

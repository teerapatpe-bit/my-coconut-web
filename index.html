<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | Pure Coconut Water Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --green: #2B4C3B; --blue: #4A90E2; --light: #F8F9FA; }
        body { font-family: 'Inter', sans-serif; background: var(--light); margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }

        /* ส่วนข้อมูลซ้าย */
        .logo { font-family: 'Montserrat', sans-serif; font-size: 3.5rem; color: var(--green); margin-bottom: 10px; }
        .certs { display: flex; gap: 10px; margin-bottom: 30px; }
        .certs img { height: 25px; opacity: 0.6; }
        .feature { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-size: 1.3rem; font-weight: 700; }

        /* ส่วนแสดงผลขวา (Interactive Area) */
        .product-area { display: flex; flex-direction: column; align-items: center; }
        .info { align-self: flex-start; color: var(--blue); margin-bottom: 20px; }
        .info b { font-size: 2rem; display: block; }

        .main-bottle { width: 260px; filter: drop-shadow(0 30px 40px rgba(0,0,0,0.1)); transition: 0.4s ease; animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* กล่องเลือกขนาดที่ขยายได้ (Hover & Expand) */
        .size-row { display: flex; gap: 20px; margin: 40px 0; width: 100%; }
        .size-card { 
            flex: 1; background: white; border-radius: 25px; padding: 25px; text-align: center; 
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 2px solid transparent;
        }
        .size-card:hover { transform: scale(1.1); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .size-card.active { border-color: var(--green); }
        .size-card img { height: 50px; margin-bottom: 10px; }

        .btn-shop { 
            background: var(--green); color: white; width: 100%; padding: 22px; 
            border-radius: 50px; text-align: center; text-decoration: none; 
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="logo">ELI.</div>
            <div class="certs">
                <img src="cert1.png" alt="FSSC"> <img src="cert2.png" alt="Halal"> <img src="cert3.png" alt="USDA">
            </div>
            <div class="feature">✅ 100% Natural Coconut water</div>
            <div class="feature">✅ No Sugar Added</div>
            <div class="feature">✅ No Preservatives</div>
        </div>

        <div class="product-area">
            <div class="info"><b>18 months</b> <span>@ room temp.</span></div>
            <img src="bottle.png" id="mainImg" class="main-bottle">
            
            <div class="size-row">
                <div class="size-card active" onmouseover="updateImg('small')" onclick="select(this)">
                    <img src="small.png"><b>330ml</b><p>PRESENT</p>
                </div>
                <div class="size-card" onmouseover="updateImg('large')" onclick="select(this)">
                    <img src="large.png" style="transform:scale(1.2)"><b>1000ml</b><p>FUTURE</p>
                </div>
            </div>
            <a href="#" class="btn-shop">Shop Now</a>
        </div>
    </div>
    <script>
        function updateImg(s) {
            document.getElementById('mainImg').style.transform = (s === 'large') ? 'scale(1.15)' : 'scale(1)';
        }
        function select(e) {
            document.querySelectorAll('.size-card').forEach(c => c.classList.remove('active'));
            e.classList.add('active');
        }
    </script>
</body>
</html>

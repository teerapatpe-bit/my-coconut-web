<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Eli Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-gold: #C3A358;
            --brand-navy: #2b5b84;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('images/fssc-22007.png'); /* พื้นหลังใบไม้ */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- Header --- */
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-header {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 300; 
            color: var(--brand-gold);
            letter-spacing: 2px;
        }

        .partners-text {
            font-size: 12px;
            font-weight: 500;
            color: #888;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .cert-icons img { height: 22px; width: auto; margin: 10px 12px 0 0; }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            border: 1px solid #333;
            padding: 10px 30px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        nav ul li a { text-decoration: none; color: #000; font-weight: 600; font-size: 12px; }

        /* --- Main Layout --- */
        main {
            position: relative;
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-height: 600px;
        }

        /* กล่องหลัก: ปรับ Gradient ให้ไล่ระดับเนียนขึ้น ซ้ายสว่าง ขวาภาพชัด */
        .product-card {
            background-image: 
                linear-gradient(90deg, rgba(255, 255, 255, 0.98) 30%, rgba(255, 255, 255, 0.75) 48%, rgba(255, 255, 255, 0) 65%), 
                url('images/fssc-22010.png');
            background-size: cover; 
            background-repeat: no-repeat;
            background-position: right center; 
            
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            width: 85%;
            min-height: 540px; /* เพิ่มความสูงเล็กน้อยให้ภาพดูสมดุล */
            padding: 60px 60px 60px 180px; 
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12); /* เพิ่มมิติเงาให้ดูเข้มขึ้นเล็กน้อย */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* กล่อง Eli: ปรับให้สมดุลกับพื้นหลังใหม่ */
        .eli-box {
            position: absolute;
            left: 40px; 
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 290px;
            padding: 50px 30px 40px;
            border-radius: 35px;
            z-index: 20;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .eli-tag {
            background: #000;
            color: #fff;
            padding: 5px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 800;
            position: absolute;
            top: -15px;
            left: 30px;
        }

        .feature { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 13px; font-weight: 600; color: #222; }
        .check { width: 20px; height: 20px; background: #27ae60; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        /* --- Text Style --- */
        .search-mini {
            background: #fff;
            width: 350px;
            margin-bottom: 40px;
            padding: 10px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .search-mini input { border: none; outline: none; font-weight: 600; width: 80%; }
        .search-mini button { background: #3b82f6; color: #fff; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; }

        .text-info { position: relative; z-index: 10; }
        .text-info h4 { color: #7da58a; font-size: 13px; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; font-weight: 700; }
        
        .text-info h1 { 
            font-size: 65px; 
            color: var(--brand-navy); 
            line-height: 1.1; 
            white-space: nowrap; 
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .text-info p { font-size: 22px; color: #8896a6; margin-bottom: 25px; font-weight: 500; }
        .text-info h2 { font-size: 80px; color: #1e293b; line-height: 1; margin-bottom: 20px; }
        .stars { color: #fbbf24; display: flex; gap: 5px; font-size: 18px; }

    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/halal.png" alt="Halal">
                <img src="images/usda.png" alt="USDA">
                <img src="images/kosher.png" alt="Kosher">
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="#">OVERVIEW</a></li>
                <li><a href="#">PRODUCTION</a></li>
                <li><a href="#">CERTIFICATION</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="eli-box">
            <div class="eli-tag">Eli</div>
            <div class="feature"><div class="check"><i class="fa-solid fa-check"></i></div> 100% Natural Coconut water</div>
            <div class="feature"><div class="check"><i class="fa-solid fa-check"></i></div> No Sugar Added</div>
            <div class="feature"><div class="check"><i class="fa-solid fa-check"></i></div> No Artificial Flavor</div>
            <div class="feature"><div class="check"><i class="fa-solid fa-check"></i></div> No Coloring</div>
            <div class="feature"><div class="check"><i class="fa-solid fa-check"></i></div> No Preservatives</div>
        </div>

        <div class="product-card">
            <div class="search-mini">
                <input type="text" value="coconut water" readonly>
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="text-info">
                <h4>Premium Export Quality</h4>
                <h1>18 months</h1>
                <p>Shelf-life at room temp</p>
                <h2>330ml</h2>
                <div class="stars">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                </div>
            </div>
        </div>
    </main>

</body>
</html>

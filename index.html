<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS CO., LTD. | Premium Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B6CB0;
            --text-dark: #2D3436;
            --bg-glass: rgba(255, 255, 255, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(240, 244, 248, 0.8), rgba(217, 226, 236, 0.8)), 
                        url('images/fssc-22007.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* ส่วน Navigation: ปรับขนาดและตำแหน่งให้ตรงกรอบด้านขวา */
        .nav-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.2fr; /* ล้อตามสัดส่วน Container */
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 6% 20px;
        }

        nav {
            grid-column: 2; /* บังคับให้เมนูเริ่มที่ตรงกับขอบกล่องด้านขวา */
            display: flex;
            justify-content: space-between; /* กระจายตัวให้เต็มความกว้างกล่อง */
            align-items: center;
        }

        nav a { 
            text-decoration: none; 
            color: #111; 
            font-weight: 800; 
            font-size: 0.9rem; /* เพิ่มขนาดตามสั่ง */
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        nav a:hover { color: var(--brand-blue); transform: translateY(-2px); }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 6% 40px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            align-items: center;
            gap: 40px;
        }

        /* แบรนด์: EVER GOOD PARTNERS CO., LTD. ต่อกัน */
        .brand-header {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem; /* ปรับขนาดให้พอดีกับการเรียงบรรทัดใหม่ */
            font-weight: 900;
            line-height: 1.1;
            color: var(--brand-blue);
            margin-bottom: 10px;
        }

        .partners-text {
            font-size: 1rem;
            font-weight: 800;
            color: #7f8c8d;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        .cert-icons {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .cert-icons img { height: 28px; opacity: 0.9; }

        .feature-card {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 35px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            border: 1px solid white;
        }
        
        .check-list { list-style: none; margin-bottom: 25px; }
        .check-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 15px;
            color: #333;
        }
        .check-list li::before { content: '✓'; color: #2ecc71; font-weight: 900; font-size: 1.2rem; }

        .present-label {
            width: 100%;
            padding: 14px;
            border: 2.5px solid #000;
            border-radius: 20px;
            text-align: center;
            font-weight: 900;
            font-size: 1.4rem;
            background: rgba(255,255,255,0.4);
        }

        /* ฝั่งขวา: กล่องกระจกฝ้า */
        .product-glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            border-radius: 60px;
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .search-area {
            background: #fff;
            border-radius: 22px;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
        }
        .search-area span { color: var(--brand-blue); font-weight: 900; font-size: 1.7rem; }
        .search-btn { background: var(--brand-blue); color: #fff; width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }

        .main-display { display: flex; gap: 30px; align-items: flex-start; }

        .text-content { flex: 1; }
        .seo-link { color: #95a5a6; font-weight: 700; font-size: 1rem; margin-bottom: 15px; }
        
        .promo-heading { font-size: 3.5rem; font-weight: 900; color: var(--brand-blue); line-height: 1.1; margin-bottom: 30px; }
        .promo-heading .temp-sub { font-size: 3.2rem; display: block; margin-top: 10px; }

        .spec-size { font-size: 3.8rem; font-weight: 900; color: #2d3436; margin-bottom: 10px; }
        .rating-stars { color: #f1c40f; font-size: 1.8rem; }

        /* การจัดการขวดน้ำ: ลบพื้นหลังและจัดให้สวย */
        .bottle-wrap {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .bottle-render {
            width: 280px;
            /* เทคนิค multiply ช่วยลบพื้นหลังขาวของภาพ JPG/PNG */
            mix-blend-mode: multiply; 
            filter: contrast(1.1) brightness(1.05) drop-shadow(10px 20px 30px rgba(0,0,0,0.2));
            transform: rotate(5deg);
            transition: 0.5s ease;
        }
        .bottle-render:hover { transform: rotate(0deg) scale(1.05); }

        @media (max-width: 1024px) {
            .nav-wrapper { display: block; text-align: center; }
            nav { justify-content: center; gap: 20px; margin-top: 20px; }
            .container { grid-template-columns: 1fr; text-align: center; }
            .cert-icons { justify-content: center; }
            .feature-card { margin: 0 auto; }
            .main-display { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="nav-wrapper">
        <nav>
            <a href="#">OVERVIEW</a>
            <a href="#">PRODUCTION</a>
            <a href="#">CERTIFICATION</a>
            <a href="#">CONTACT</a>
        </nav>
    </div>

    <div class="container">
        <div class="brand-section">
            <h1 class="brand-header">EVER GOOD<br>PARTNERS<br>CO.LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="HALAL">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22003.png" alt="KOSHER">
                <img src="images/fssc-22004.png" alt="AWARD">
            </div>

            <div class="feature-card">
                <ul class="check-list">
                    <li>100% Natural Coconut water</li>
                    <li>No Sugar Added</li>
                    <li>No Artificial Flavor</li>
                    <li>No Coloring</li>
                    <li>No Preservatives</li>
                </ul>
                <div class="present-label">present</div>
            </div>
        </div>

        <div class="product-glass-panel">
            <div class="search-area">
                <span>coconut water</span>
                <div class="search-btn">🔍</div>
            </div>

            <div class="main-display">
                <div class="text-content">
                    <p class="seo-link">SEO. www.evergood.co.th</p>
                    <h2 class="promo-heading">
                        18 months
                        <span class="temp-sub">@ room temp.</span>
                    </h2>
                    
                    <div class="spec-size">300ml</div>
                    
                    <div class="rating-stars">★★★★★</div>
                </div>

                <div class="bottle-wrap">
                    <img src="images/fssc-22008.png" class="bottle-render" alt="Ever Good Coconut Water">
                </div>
            </div>
        </div>
    </div>

</body>
</html>

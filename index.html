<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           1. ตั้งค่าตัวแปรสีและพื้นฐานของหน้าเว็บ
        ========================================= */
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --bg-light: #F8FAF9;
            --bg-highlight: #e8f2ea; /* เพิ่มสีพื้นหลังสำหรับกล่องใต้ข้อความ */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            overflow-x: hidden;
        }

        /* =========================================
           2. ส่วน Header (โลโก้ และ เมนู)
        ========================================= */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 60px;
            background: var(--white);
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand-header {
            color: var(--gold);
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .partners-text {
            color: var(--gold);
            font-size: 0.75rem;
            letter-spacing: 3px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        /* กลุ่มใบรับรองมาตรฐาน */
        .cert-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .cert-icons img {
            height: 60px;
            width: auto;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        /* ส่วนของเมนูนำทาง (Navigation) */
        nav {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-top: 10px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 600;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-green);
        }

        .search-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(89, 128, 60, 0.3);
            transition: transform 0.3s;
        }

        .search-btn:hover {
            transform: scale(1.1);
        }

        /* =========================================
           3. ส่วน Hero Banner (เนื้อหาหลักและรูปภาพ)
        ========================================= */
        .hero {
            display: flex;
            align-items: center;
            min-height: 700px;
            padding: 0 0 0 60px; 
            position: relative;
            background: radial-gradient(circle at 75% 50%, #e8f5e9 0%, #f8faf9 100%);
            overflow: hidden;
        }

        .hero-content {
            flex: 1;
            z-index: 10;
            padding-bottom: 80px;
            max-width: 45%; 
            position: relative; /* เพิ่ม position เพื่อให้อ้างอิงเลเยอร์พื้นหลังได้ */
        }

        /* -----------------------------------------
           ★ ส่วนที่เพิ่ม: แถบพื้นหลังใต้ข้อความ
        ----------------------------------------- */
        .text-bg-layer {
            position: absolute;
            top: 45%;
            left: -60px; /* ดึงให้ชิดขอบจอฝั่งซ้าย */
            width: 130%; /* ขยายให้กว้างครอบคลุมข้อความ */
            height: 380px;
            background: var(--bg-highlight);
            transform: translateY(-50%) rotate(-2deg); /* เอียงเล็กน้อยให้มีมิติ */
            z-index: -1; /* ให้อยู่หลังข้อความ */
            border-radius: 0 50px 50px 0; /* โค้งเฉพาะฝั่งขวา */
        }

        /* โลโก้ Eli */
        .hero-top-icon {
            width: 180px; 
            height: auto;
            mix-blend-mode: multiply;
            margin-top: -90px;
            margin-bottom: 25px;
            display: block;
        }

        .hero-content h4 {
            color: var(--accent-green);
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .hero-content h1 {
            color: var(--primary-green);
            font-size: 6.5rem;
            line-height: 0.95;
            font-weight: 700;
            margin-bottom: 35px;
        }

        .btn-more {
            background: var(--accent-green);
            color: white;
            padding: 16px 45px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 10px 20px rgba(89, 128, 60, 0.3);
            transition: all 0.3s ease;
        }

        .btn-more:hover {
            background: var(--primary-green);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(31, 63, 35, 0.3);
        }

     .hero-image {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 65%; /* ปรับตัวเลขนี้เพิ่มขึ้น เช่น 60%, 65% หรือ 70% */
            height: 100%;
            z-index: 1;
            display: flex;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            object-position: right center;
        }

        /* =========================================
           4. แถบ Features ด้านล่าง (กล่องสีขาว)
        ========================================= */
        .features-bar {
            background: white;
            margin: -60px 60px 40px;
            padding: 35px;
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 20px 50px rgba(0,0,0,0.06);
            position: relative;
            z-index: 20;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .f-icon {
            width: 55px;
            height: 55px;
            background: var(--accent-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.3rem;
            box-shadow: 0 5px 15px rgba(89, 128, 60, 0.2);
        }

        .f-text b { display: block; font-size: 1.15rem; color: var(--primary-green); line-height: 1.2;}
        .f-text span { font-size: 0.85rem; color: #666; }

        /* =========================================
           5. การแสดงผลบนมือถือและแท็บเล็ต (Responsive)
        ========================================= */
        @media (max-width: 1200px) {
            .hero-content h1 { font-size: 5rem; }
        }

        @media (max-width: 992px) {
            .header-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                padding: 20px;
            }

            .cert-icons {
                justify-content: center;
                flex-wrap: wrap;
            }

            .hero {
                flex-direction: column;
                text-align: center;
                padding: 80px 0 0 0; 
                min-height: auto;
            }

            .hero-content {
                max-width: 100%;
                padding: 0 30px 40px;
            }

            /* ปรับแถบพื้นหลังในมือถือ */
            .text-bg-layer {
                width: 100%;
                left: 0;
                top: 40%;
                height: 250px;
                transform: none;
                border-radius: 20px;
            }

            .hero-top-icon {
                margin: 0 auto 20px;
            }

            .hero-image {
                position: relative;
                width: 100%;
                height: 500px; 
            }

            .features-bar {
                flex-wrap: wrap;
                gap: 30px;
                margin: 20px;
            }

            .feature-item {
                width: 45%;
                justify-content: flex-start;
            }
        }

        @media (max-width: 576px) {
            .hero-content h1 { font-size: 3.5rem; }
            .hero-image { height: 400px; }
            .feature-item { width: 100%; justify-content: flex-start; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22014.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="BRC">
            </div>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="#">OVERVIEW</a></li>
                <li><a href="#">PRODUCTION</a></li>
                <li><a href="#">CERTIFICATION</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
            <button class="search-btn">
                <i class="fas fa-search"></i>
            </button>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content"> 
            <div class="text-bg-layer"></div>

            <img src="images/fssc-22015.png" alt="Eli Logo" class="hero-top-icon">
            
            <h4>100% NATURAL</h4>
            <h1>Coconut<br>Water</h1>
            <a href="#" class="btn-more">300ml <i class="fas fa-arrow-right"></i></a>
        </div>
        
        <div class="hero-image">
            <img src="images/fssc-22016.png" alt="Coconut Water Bottle" class="product-img">
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-tint-slash"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-vial-slash"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS CO., LTD.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B6CB0;
            /* สีทองพรีเมียมแบบไล่เฉด */
            --gold-gradient: linear-gradient(to bottom, #D4AF37 0%, #F1D592 50%, #B8860B 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            /* ส่วนที่ 1: ดึงรูป fssc-22006 มาเป็นพื้นหลังหลัก */
            background: linear-gradient(rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.65)), 
                        url('images/fssc-22007.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #2d3436;
        }

        /* เมนูบาร์ */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 35px 8%;
            gap: 30px;
        }
        header a { 
            text-decoration: none; 
            color: #111; 
            font-weight: 800; 
            font-size: 0.85rem; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 6% 60px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            align-items: center;
            gap: 50px;
            flex: 1;
        }

        /* ส่วนที่ 2: ชื่อแบรนด์สีทองเรียงต่อกัน */
        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            line-height: 1;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .slogan {
            font-size: 1rem;
            font-weight: 800;
            color: #7f8c8d;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        /* ส่วนที่ 3: ขยายไอคอน Certification */
        .cert-group {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        .cert-group img {
            height: 40px; /* ขยายขนาดตามคอมเมนต์ */
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
        }

        .details-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 35px;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid white;
        }
        .details-card ul { list-style: none; margin-bottom: 25px; }
        .details-card li { display: flex; align-items: center; gap: 12px; font-weight: 700; margin-bottom: 15px; }
        .details-card li::before { content: '✓'; color: #2ecc71; font-weight: 900; }

        .present-btn {
            width: 100%;
            padding: 15px;
            border: 2.5px solid #000;
            border-radius: 20px;
            text-align: center;
            font-weight: 900;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        /* ส่วนที่ 4: กล่องสินค้า Glassmorphism ขวามือ */
        .product-glass-box {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            border-radius: 60px;
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
        }

        .search-ui {
            background: #fff;
            border-radius: 22px;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
        }
        .search-ui span { color: var(--brand-blue); font-weight: 900; font-size: 1.7rem; }

        .content-flex { display: flex; align-items: center; gap: 20px; }

        /* ส่วนที่ 5: ปรับขนาดตัวอักษร 18 months ให้สมส่วน */
        .text-info { flex: 1; }
        .text-info h2 { 
            font-size: 2.3rem; 
            color: var(--brand-blue); 
            font-weight: 900; 
            line-height: 1.1;
            margin-bottom: 20px;
        }
        .text-info .room-temp { font-size: 1.9rem; display: block; margin-top: 5px; }

        .size-text { font-size: 3.5rem; font-weight: 900; }
        .rating { color: #f1c40f; font-size: 1.6rem; margin-top: 10px; }

        /* ส่วนที่ 6: ขยายขวดน้ำและลบสีขาวออก */
        .image-container {
            flex: 1.3;
            display: flex;
            justify-content: center;
        }
        .bottle-render {
            width: 120%; /* ขยายขนาดรูปสินค้า */
            max-width: 380px;
            mix-blend-mode: multiply; /* เทคนิคลบพื้นหลังสีขาว */
            filter: drop-shadow(20px 30px 50px rgba(0,0,0,0.15));
            transform: rotate(5deg);
        }

        @media (max-width: 1024px) {
            .main-wrapper { grid-template-columns: 1fr; }
            .brand-title { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#">OVERVIEW</a>
        <a href="#">PRODUCTION</a>
        <a href="#">CERTIFICATION</a>
        <a href="#">CONTACT</a>
    </header>

    <div class="main-wrapper">
        <div class="left-side">
            <h1 class="brand-title">EVER GOOD<br>PARTNERS CO., LTD.</h1>
            <p class="slogan">PARTNERS IN PURITY.</p>
            
            <div class="cert-group">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="HALAL">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22003.png" alt="KOSHER">
                <img src="images/fssc-22004.png" alt="AWARD">
            </div>

            <div class="details-card">
                <ul>
                    <li>100% Natural Coconut water</li>
                    <li>No Sugar Added</li>
                    <li>No Artificial Flavor</li>
                    <li>No Coloring</li>
                    <li>No Preservatives</li>
                </ul>
                <div class="present-btn">present</div>
            </div>
        </div>

        <div class="product-glass-box">
            <div class="search-ui">
                <span>coconut water</span>
                <div style="background: var(--brand-blue); color:white; padding:10px 14px; border-radius:12px;">🔍</div>
            </div>

            <div class="content-flex">
                <div class="text-info">
                    <p style="color:#999; font-weight:700; margin-bottom:10px;">SEO. www.evergood.co.th</p>
                    <h2>18 months<span class="room-temp">@ room temp.</span></h2>
                    <div class="size-text">300ml</div>
                    <div class="rating">★★★★★</div>
                </div>

                <div class="image-container">
                    <img src="images/fssc-22008.png" class="bottle-render" alt="Product Image">
                </div>
            </div>
        </div>
    </div>

</body>
</html>

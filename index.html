<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2B4C3B;
            --accent: #7ED321;
            --blue-text: #4A90E2;
            --bg: #F7F5F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #333; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 60px; }

        /* --- Header --- */
        header { display: flex; justify-content: space-between; align-items: flex-start; padding: 40px 0; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 3.5rem; color: var(--primary); letter-spacing: -2px; }
        .cert-icons { display: flex; gap: 10px; margin-top: 10px; }
        .cert-icons img { height: 26px; }
        .nav-links { display: flex; gap: 30px; padding-top: 10px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* --- Main Content Layout --- */
        .main-wrapper { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: center; padding: 40px 0; }

        /* ฝั่งซ้าย: Features */
        .feature-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-size: 1.4rem; font-weight: 700; }

        /* ฝั่งขวา: Product Presentation */
        .presentation-area { display: flex; flex-direction: column; align-items: center; }

        .info-header { align-self: flex-start; margin-bottom: 20px; }
        .info-header b { font-size: 1.8rem; color: var(--blue-text); display: block; }
        .info-header span { font-size: 1.2rem; color: var(--blue-text); font-weight: 600; }

        /* รูปภาพหลักวางด้านนอกการ์ด */
        .product-main-view {
            width: 100%;
            max-width: 320px;
            margin-bottom: 40px;
            filter: drop-shadow(0 25px 35px rgba(0,0,0,0.12));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* กล่องเลือกขนาดวางด้านนอก */
        .size-row { display: flex; gap: 20px; width: 100%; max-width: 500px; margin-bottom: 35px; }

        .size-card {
            flex: 1;
            background: #FFFFFF;
            border: 2px solid transparent;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .size-card img { height: 50px; margin-bottom: 12px; }
        .size-card b { display: block; font-size: 1.1rem; margin-bottom: 4px; }
        .size-card small { color: #999; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

        /* สไตล์เมื่อเลือก (Active) */
        .size-card.active { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 15px 35px rgba(43, 76, 59, 0.1); }

        .btn-shop {
            background: var(--primary);
            color: white;
            width: 100%;
            max-width: 500px;
            padding: 22px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-shop:hover { background: #1a3025; transform: scale(1.02); }

        @media (max-width: 1100px) {
            .main-wrapper { grid-template-columns: 1fr; text-align: center; }
            .feature-item { justify-content: center; }
            .info-header { align-self: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand">
                <div class="logo">ELI.</div>
                <div class="cert-icons">
                    <img src="images/fssc.png" alt="FSSC">
                    <img src="images/halal.png" alt="Halal">
                    <img src="images/usda.png" alt="USDA">
                    <img src="images/kosher.png" alt="Kosher">
                    <img src="images/sgs.png" alt="SGS">
                </div>
            </div>
            <nav class="nav-links">
                <a href="#">Product Overview</a>
                <a href="#">Factory & Excellence</a>
                <a href="#">Quality & Certs</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <main class="main-wrapper">
            <div class="feature-list">
                <div class="feature-item">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="presentation-area">
                <div class="info-header">
                    <b>18 months</b>
                    <span>@ room temp.</span>
                </div>

                <img src="images/bottle-main.png" alt="ELI Main" class="product-main-view" id="main-display">

                <div class="size-row">
                    <div class="size-card active" onclick="selectSize('330ml', this)">
                        <img src="images/bottle-small.png" alt="330ml">
                        <b>330ml</b>
                        <small>Present</small>
                    </div>
                    <div class="size-card" onclick="selectSize('1000ml', this)">
                        <img src="images/bottle-large.png" alt="1000ml" style="transform: scale(1.15)">
                        <b>1000ml</b>
                        <small>Future</small>
                    </div>
                </div>

                <a href="#" class="btn-shop">Shop Now</a>
            </div>
        </main>
    </div>

    <script>
        function selectSize(size, el) {
            document.querySelectorAll('.size-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            
            // เอฟเฟกต์ตอบสนองเมื่อเปลี่ยนขนาด
            const mainImg = document.getElementById('main-display');
            if(size === '1000ml') {
                mainImg.style.transform = 'scale(1.1)';
            } else {
                mainImg.style.transform = 'scale(1)';
            }
        }
    </script>

</body>
</html>

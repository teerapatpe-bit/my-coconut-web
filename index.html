<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI. COCONUT WATER | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B6CB0;
            --text-dark: #2D3436;
            --bg-glass: rgba(255, 255, 255, 0.75);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            /* ตั้งค่าพื้นหลังเป็น fssc-22007.png */
            background: linear-gradient(rgba(240, 244, 248, 0.7), rgba(217, 226, 236, 0.7)), 
                        url('images/fssc-22007.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        nav {
            display: flex;
            justify-content: flex-end;
            padding: 30px 8%;
            gap: 30px;
        }
        nav a { text-decoration: none; color: #444; font-weight: 600; font-size: 0.9rem; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 8%;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            align-items: center;
            min-height: 80vh;
            gap: 50px;
        }

        /* ส่วนซ้าย: แบรนด์และใบเซอร์ */
        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .brand-logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 0.85;
            color: var(--brand-blue);
        }

        .slogan {
            font-size: 1.2rem;
            font-weight: 800;
            color: #7f8c8d;
            letter-spacing: 2.5px;
            margin-bottom: 5px;
        }

        .cert-logos-left {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .cert-logos-left img { height: 28px; opacity: 0.9; }

        .info-card {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 35px;
            width: fit-content;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid white;
        }

        .info-card .size-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 15px; }

        .check-list { list-style: none; margin-bottom: 20px; }
        .check-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .check-list li::before { content: '✓'; color: #2ecc71; font-weight: 900; }

        .btn-present {
            width: 100%;
            padding: 10px;
            border: 2.5px solid #000;
            border-radius: 15px;
            text-align: center;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: lowercase;
        }

        /* ส่วนขวา: การ์ดกระจกฝ้าแสดงสินค้า */
        .product-glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(25px);
            border-radius: 50px;
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }

        .search-strip {
            background: #fff;
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .search-strip span { color: var(--brand-blue); font-weight: 900; font-size: 1.5rem; }
        .search-icon { background: var(--brand-blue); color: white; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }

        .product-content { display: flex; gap: 30px; align-items: flex-start; }

        .meta-text { flex: 1; }
        .seo-url { color: #7f8c8d; font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; }
        
        .main-promo {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--brand-blue);
            line-height: 1.1;
            margin-bottom: 20px;
        }
        .main-promo b { color: #e74c3c; font-size: 1.2rem; display: block; }

        .price-area { margin-bottom: 20px; }
        .p-old { text-decoration: line-through; color: #bdc3c7; font-size: 1.8rem; margin-right: 15px; }
        .p-new { font-size: 3.2rem; font-weight: 900; }
        .p-label { color: var(--brand-blue); font-weight: 900; font-size: 1.4rem; }

        .rating-stars { color: #f1c40f; font-size: 1.6rem; margin-top: 15px; }

        .bottle-display {
            width: 240px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
            transform: rotate(5deg);
        }

        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; text-align: center; }
            .cert-logos-left { justify-content: center; }
            .info-card { margin: 0 auto; }
            .product-content { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Man</a>
        <a href="#">Woman</a>
        <a href="#">Kids</a>
        <a href="#">Cust.</a>
        <a href="#">Coll.</a>
    </nav>

    <div class="container">
        <div class="brand-section">
            <div>
                <h1 class="brand-logo">ELI.<br>COCONUT<br>WATER</h1>
                <p class="slogan">SIP. SIP. ELEGANCE.</p>
                <div class="cert-logos-left">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/fssc-22001.png" alt="HALAL">
                    <img src="images/fssc-22002.png" alt="USDA">
                    <img src="images/fssc-22003.pngg" alt="KOSHER">
                    <img src="images/fssc-22004.png" alt="AWARD">
                </div>
            </div>

            <div class="info-card">
                <div class="size-title">330ml</div>
                <ul class="check-list">
                    <li>100% NATURAL & PURE</li>
                    <li>ZERO ADDED SUGAR</li>
                    <li>NO PRESERVATIVES</li>
                </ul>
                <div class="btn-present">present</div>
            </div>
        </div>

        <div class="product-glass-card">
            <div class="search-strip">
                <span>coconut water</span>
                <div class="search-icon">🔍</div>
            </div>

            <div class="product-content">
                <div class="meta-text">
                    <p class="seo-url">SEO. www.eli.co.th</p>
                    <h2 class="main-promo">
                        18 months <b>ตัวหนา</b>
                        @ room temp.
                    </h2>
                    
                    <div class="price-area">
                        <span class="p-old">฿5,690</span>
                        <span class="p-new">฿3,990</span>
                        <div class="p-label">prices ฿3,990</div>
                    </div>
                    
                    <div class="rating-stars">★★★★★</div>
                </div>

                <img src="images/fssc-22005.png" class="bottle-display" alt="Eli Coconut Water">
            </div>
        </div>
    </div>

</body>
</html>

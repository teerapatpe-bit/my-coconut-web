<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        /* --- Header --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 60px;
            background: var(--white);
            z-index: 100;
            position: relative;
        }
        .brand-header { color: var(--gold); font-size: 1.35rem; font-weight: 700; }
        .partners-text { color: var(--gold); font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 12px; }
        .cert-icons { display: flex; gap: 15px; }
        .cert-icons img { height: 50px; mix-blend-mode: multiply; }

        /* --- Hero Section (ปรับปรุงลบพื้นหลังฝั่งซ้ายออก) --- */
        .hero {
            position: relative;
            min-height: 800px;
            width: 100%;
            /* เปลี่ยนไปใช้รูปพื้นหลังหลักที่ไม่มีแถบสีขาว/เขียวทับ */
            background-image: url('images/fssc-22016.png'); 
            background-size: cover;
            background-position: center right; 
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            padding: 0 8%;
            /* เพิ่มสีพื้นหลังสำรองเพื่อให้ดูสะอาด */
            background-color: #f8faf9; 
        }

        /* --- ลบส่วน .hero::before เดิมออกเพื่อให้ไม่มีแถบสีบัง --- */

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 650px;
        }

        /* โลโก้ Eli ขนาดใหญ่และลบพื้นหลังขาวในตัวรูป */
        .hero-top-icon {
            width: 220px; 
            margin-bottom: 25px;
            mix-blend-mode: multiply; /* ทำให้พื้นหลังสีขาวของรูปโลโก้โปร่งใส */
            display: block;
        }

        .hero-content h4 { 
            color: var(--accent-green); 
            font-size: 1.4rem; 
            font-weight: 600; 
            letter-spacing: 1px;
        }
        
        .hero-content h1 { 
            color: var(--primary-green); 
            font-size: 6.5rem; 
            line-height: 0.9; 
            font-weight: 800; 
            margin: 15px 0 35px;
        }

        .btn-more {
            background: var(--accent-green);
            color: white;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(89, 128, 60, 0.3);
            transition: 0.3s;
        }
        
        .btn-more:hover {
            transform: translateY(-3px);
            background: var(--primary-green);
        }

        /* --- Features Bar --- */
        .features-bar {
            background: white;
            margin: -60px 60px 40px;
            padding: 35px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            position: relative;
            z-index: 20;
        }
        .feature-item { display: flex; align-items: center; gap: 12px; }
        .f-icon { width: 50px; height: 50px; background: var(--accent-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; }
        .f-text b { display: block; font-size: 1.1rem; color: var(--primary-green); line-height: 1.2; }
        .f-text span { font-size: 0.8rem; color: #777; }

        @media (max-width: 992px) {
            .hero { background-position: center; padding: 80px 20px; text-align: center; }
            .hero-content { margin: 0 auto; }
            .hero-top-icon { margin: 0 auto 20px; width: 180px; }
            .hero-content h1 { font-size: 4.5rem; }
            .features-bar { flex-wrap: wrap; gap: 20px; margin: 20px; padding: 20px; }
            .feature-item { width: 45%; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22014.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="BRC">
            </div>
        </div>
        <nav style="display: flex; align-items: center; gap: 20px;">
            <button style="background:none; border:none; font-size:1.2rem; cursor:pointer;"><i class="fas fa-search"></i></button>
            <i class="fas fa-bars" style="font-size: 1.5rem; cursor:pointer;"></i>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <img src="images/fssc-22015.png" alt="Eli Logo" class="hero-top-icon">
            
            <h4>100% NATURAL</h4>
            <h1>Coconut<br>Water</h1>
            <a href="#" class="btn-more">300 ml &nbsp; <i class="fas fa-arrow-right"></i></a>
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-tint-slash"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-vial-slash"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

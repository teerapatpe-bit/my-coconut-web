<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F2EFE9;
            --brand-green: #2B4C3B;    
            --text-brown: #5D5443;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #1C1D1B;
            line-height: 1.2;
        }

        .container {
            max-width: 1400px; /* ขยายกว้างขึ้นเพื่อให้เมนูมีพื้นที่หายใจ */
            margin: 0 auto;
            padding: 0 50px;
        }

        /* --- Header: Logo, Certs & Navigation --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 30px 0 0 0;
        }

        /* ฝั่งซ้าย: โลโก้และใบรับรอง */
        .brand-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--brand-green);
            line-height: 1;
        }

        .cert-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .cert-row img {
            height: 30px;
            width: auto;
        }

        /* ฝั่งขวา: เมนูนำทาง (เพิ่มใหม่) */
        .nav-menu {
            display: flex;
            gap: 30px;
            padding-top: 15px;
        }

        .nav-link {
            text-decoration: none;
            color: #000;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            transition: color 0.3s;
            text-align: center;
            max-width: 180px; /* ควบคุมการตัดคำให้เหมือนดีไซน์ */
        }

        .nav-link:hover {
            color: var(--brand-green);
        }

        /* --- Content Layout --- */
        .content-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: -5px; /* ดึงเนื้อหาขึ้นชิดบนตามที่คุณต้องการ */
            padding-bottom: 50px;
        }

        /* รายการจุดเด่น (Features) */
        .features {
            flex: 1;
            padding-top: 20px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-brown);
            margin-bottom: 14px;
        }

        .icon-check {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* การ์ดสินค้าพรีเมียม */
        .product-card {
            flex: 1;
            background: var(--white);
            border-radius: 25px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            max-width: 440px;
            margin-top: 15px;
        }

        .product-card img {
            width: 100%;
            max-width: 270px;
            margin-bottom: 30px;
        }

        .price {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--brand-green);
            margin-bottom: 25px;
            display: block;
        }

        .btn-shop {
            background-color: var(--brand-green);
            color: white;
            padding: 15px 60px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-shop:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* สำหรับมือถือ */
        @media (max-width: 1100px) {
            header { flex-direction: column; align-items: center; text-align: center; }
            .nav-menu { margin-top: 25px; gap: 15px; justify-content: center; }
            .content-section { flex-direction: column; align-items: center; text-align: center; margin-top: 30px; }
            .feature-item { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-info">
                <div class="logo">ELI.</div>
                <div class="cert-row">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/fssc-22001.png" alt="Halal">
                    <img src="images/fssc-22002.png" alt="USDA">
                    <img src="images/fssc-22003.png" alt="Kosher">
                    <img src="images/fssc-22004.png" alt="SGS">
                </div>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-link">Product Overview</a>
                <a href="#" class="nav-link">Factory & Production Excellence</a>
                <a href="#" class="nav-link">Quality & Certification</a>
                <a href="#" class="nav-link">Contact</a>
            </nav>
        </header>

        <section class="content-section">
            <div class="features">
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Artificial Flavor</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Coloring</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="product-card">
                <img src="images/fssc-22005.png" alt="ELI Coconut Water">
                <span class="price">฿45.00</span>
                <a href="#" class="btn-shop">Shop Now</a>
            </div>
        </section>
    </div>

</body>
</html>

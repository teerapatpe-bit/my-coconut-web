<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELI | Premium Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F2EFE9;
            --text-dark: #1C1D1B;      
            --text-light: #5A5A5A;
            --brand-green: #2B4C3B;    
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            max-width: 1400px; /* ขยายให้เหมาะกับจอ PC Wide */
            margin: 0 auto;
            padding: 0 40px;
        }

        /* --- Header Section --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 40px 0;
            flex-wrap: wrap; /* รองรับ iPad เวลาเมนูยาว */
            gap: 20px;
        }

        .brand-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--brand-green);
            line-height: 1;
            letter-spacing: -1px;
        }

        .cert-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cert-box img { 
            height: 45px; 
            width: auto; 
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            padding-top: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            white-space: nowrap; /* ป้องกันเมนูแตกบรรทัด */
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--brand-green); }

        /* --- Hero Section --- */
        .hero { 
            display: flex; 
            min-height: 70vh; 
            align-items: center; 
            justify-content: space-between;
            padding-bottom: 60px;
            gap: 40px;
        }

        .hero-content { 
            flex: 1; 
            max-width: 600px;
        }

        .hero h1 { 
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem); /* ปรับขนาดตามหน้าจออัตโนมัติ */
            line-height: 1.05; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            font-weight: 800;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 400px;
        }

        .hero-image { 
            flex: 1; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center;
        }

        .hero-image img { 
            width: 100%;
            max-width: 480px; /* ขนาดที่สวยพอดีบนจอ PC */
            height: auto; 
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.05));
        }

        footer { 
            text-align: center; 
            padding: 40px; 
            font-size: 0.75rem; 
            color: var(--text-light); 
            letter-spacing: 1px;
        }

        /* --- Tablet / iPad Optimization --- */
        @media (max-width: 1024px) {
            .wrapper { padding: 0 30px; }
            header { flex-direction: column; align-items: flex-start; }
            .nav-links { 
                width: 100%; 
                overflow-x: auto; /* ถ้าเมนูยาวไปใน iPad จะเลื่อนซ้ายขวาได้ */
                padding-bottom: 10px;
            }
            .hero { gap: 20px; }
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; padding-top: 20px; }
            .hero-image { justify-content: center; width: 100%; }
            .hero-image img { max-width: 300px; }
            .hero p { margin: 0 auto; }
            .cert-box { flex-wrap: wrap; justify-content: center; }
            header { align-items: center; text-align: center; }
            .nav-links { justify-content: center; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="brand-area">
                <div class="logo">ELI.</div>
                  <div class="cert-box">
                <img src="images/fssc-22000.png" alt="cert">
                <img src="images/fssc-22001.png" alt="cert">
                <img src="images/fssc-22002.png" alt="cert">
                <img src="images/fssc-22003.png" alt="cert">
                <img src="images/fssc-22004.png" alt="cert">
             </div>
            </div>
            
            <nav class="nav-links">
                <a href="#">Product Overview</a>
                <a href="#">Factory & Production Excellence</a>
                <a href="#">Quality & Certification</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <section class="hero">
            <div class="hero-content">
                <h1>NATURE'S<br>PUREST<br>HYDRATION.</h1>
                <p>100% Coconut Water from Thailand’s finest young coconuts. Sip Eli, Sip Elegance.</p>
            </div>
            <div class="hero-image">
                <img src="images/fssc-22005.png" alt="ELI Coconut Water Premium">
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 ELI COCONUT WATER. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>

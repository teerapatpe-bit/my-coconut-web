<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        /* --- Header --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 60px;
            background: var(--white);
            z-index: 100;
            position: relative;
        }
        .brand-header { color: var(--gold); font-size: 1.35rem; font-weight: 700; }
        .partners-text { color: var(--gold); font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 12px; }
        .cert-icons { display: flex; gap: 15px; }
        .cert-icons img { height: 50px; mix-blend-mode: multiply; }

        /* --- Hero Section (จุดที่ปรับปรุง) --- */
        .hero {
            position: relative;
            min-height: 800px;
            width: 100%;
            /* ใส่รูปภาพเป็นพื้นหลังที่นี่ */
            background-image: url('images/fssc-22016.png'); 
            background-size: cover;
            background-position: center right; /* ให้รูปสินค้าอยู่ฝั่งขวา */
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            padding: 0 8%;
        }

        /* เพิ่ม Overlay ฝั่งซ้ายเพื่อให้ข้อความอ่านง่าย (ถ้าพื้นหลังสว่างเกินไป) */
        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(248, 250, 249, 0.9) 0%, rgba(248, 250, 249, 0) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 10; /* ให้อยู่เหนือ Overlay */
            max-width: 600px;
        }

        .hero-top-icon {
            width: 150px;
            margin-bottom: 20px;
            mix-blend-mode: multiply;
        }

        .hero-content h4 { color: var(--accent-green); font-size: 1.4rem; font-weight: 600; }
        .hero-content h1 { 
            color: var(--primary-green); 
            font-size: 7rem; 
            line-height: 0.9; 
            font-weight: 800; 
            margin: 10px 0 30px;
        }

        .btn-more {
            background: var(--accent-green);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            box-shadow: 0 8px 15px rgba(89, 128, 60, 0.2);
        }

        /* --- Features Bar --- */
        .features-bar {
            background: white;
            margin: -50px 60px 40px;
            padding: 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            position: relative;
            z-index: 20;
        }
        .feature-item { display: flex; align-items: center; gap: 12px; }
        .f-icon { width: 50px; height: 50px; background: var(--accent-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; }
        .f-text b { display: block; font-size: 1.1rem; color: var(--primary-green); }
        .f-text span { font-size: 0.8rem; color: #777; }

        @media (max-width: 992px) {
            .hero { background-position: center; padding: 60px 20px; text-align: center; }
            .hero::before { width: 100%; background: rgba(248, 250, 249, 0.7); }
            .hero-content { margin: 0 auto; }
            .hero-content h1 { font-size: 4.5rem; }
            .features-bar { flex-wrap: wrap; gap: 20px; margin: 20px; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22014.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="BRC">
            </div>
        </div>
        <nav style="display: flex; align-items: center; gap: 20px;">
            <button style="background:none; border:none; font-size:1.2rem; cursor:pointer;"><i class="fas fa-search"></i></button>
            <i class="fas fa-bars" style="font-size: 1.5rem; cursor:pointer;"></i>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <img src="images/fssc-22015.png" alt="Eli Logo" class="hero-top-icon">
            <h4>100% NATURAL</h4>
            <h1>Coconut<br>Water</h1>
            <a href="#" class="btn-more">300ml &nbsp; <i class="fas fa-arrow-right"></i></a>
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-tint-slash"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-vial-slash"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

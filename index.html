<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-green: #2B4C3B;
            --info-blue: #4A90E2;
            --bg-color: #F8F7F5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: #111; overflow-x: hidden; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 50px; }

        /* --- Header --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 3.5rem; color: var(--brand-green); letter-spacing: -2px; }
        .nav a { text-decoration: none; color: #000; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-left: 30px; letter-spacing: 1px; }

        /* --- Main Content --- */
        .hero { display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; align-items: center; min-height: 80vh; }

        /* Left side: Features & Certs */
        .cert-icons { display: flex; gap: 15px; margin-bottom: 35px; }
        .cert-icons img { height: 28px; opacity: 0.7; }

        .feature-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-size: 1.5rem; font-weight: 800; }
        .check-mark { color: #7ED321; font-weight: 900; }

        /* Right side: Interactive Display */
        .display-area { display: flex; flex-direction: column; align-items: center; }

        .shelf-life { align-self: flex-start; margin-bottom: 20px; }
        .shelf-life b { font-size: 2.5rem; color: var(--info-blue); display: block; font-weight: 900; } /* */
        .shelf-life span { font-size: 1.4rem; color: var(--info-blue); font-weight: 700; }

        /* Product Image Outside */
        .main-bottle-wrap { height: 420px; display: flex; align-items: center; justify-content: center; }
        .main-bottle { 
            width: 300px; 
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.12)); 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floating 4s infinite ease-in-out;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Size Selection Outside */
        .size-selection { display: flex; gap: 20px; width: 100%; max-width: 500px; margin-top: 30px; margin-bottom: 40px; }
        
        .size-card { 
            flex: 1; background: white; border-radius: 30px; padding: 30px 20px; 
            text-align: center; cursor: pointer; border: 2px solid transparent; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .size-card:hover { 
            transform: scale(1.1); /* ขยายเมื่อเอาเมาส์จ่อ */
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .size-card.active { border-color: var(--brand-green); }
        .size-card img { height: 55px; margin-bottom: 10px; }
        .size-card b { display: block; font-size: 1.2rem; font-weight: 900; } /* */
        .size-card p { font-size: 0.7rem; font-weight: 800; color: #999; text-transform: uppercase; }

        .btn-shop { 
            background: var(--brand-green); color: white; width: 100%; max-width: 500px; 
            padding: 24px; border-radius: 100px; text-decoration: none; 
            font-weight: 900; text-transform: uppercase; text-align: center; 
            letter-spacing: 2px; transition: 0.3s;
        }

        .btn-shop:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(43,76,59,0.3); }

        @media (max-width: 1000px) {
            .hero { grid-template-columns: 1fr; text-align: center; }
            .cert-icons, .feature-item { justify-content: center; }
            .shelf-life { align-self: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">ELI.</div>
            <nav class="nav">
                <a href="#">Product</a> <a href="#">Factory</a> <a href="#">Contact</a>
            </nav>
        </header>

        <main class="hero">
            <div class="left">
                <div class="cert-icons">
                    <img src="images/fssc.png" alt="FSSC">
                    <img src="images/halal.png" alt="Halal">
                    <img src="images/usda.png" alt="USDA">
                    <img src="images/kosher.png" alt="Kosher">
                    <img src="images/sgs.png" alt="SGS">
                </div>

                <div class="feature-item"><span class="check-mark">✓</span> 100% Natural Coconut water</div>
                <div class="feature-item"><span class="check-mark">✓</span> No Sugar Added</div>
                <div class="feature-item"><span class="check-mark">✓</span> No Artificial Flavor</div>
                <div class="feature-item"><span class="check-mark">✓</span> No Coloring</div>
                <div class="feature-item"><span class="check-mark">✓</span> No Preservatives</div>
            </div>

            <div class="display-area">
                <div class="shelf-life">
                    <b>18 months</b>
                    <span>@ room temp.</span>
                </div>

                <div class="main-bottle-wrap">
                    <img src="images/bottle-330.png" id="heroImg" class="main-bottle">
                </div>

                <div class="size-selection">
                    <div class="size-card active" onmouseover="previewSize('330ml')" onclick="selectSize(this)">
                        <img src="images/bottle-330.png">
                        <b>330ml</b>
                        <p>Present</p>
                    </div>
                    <div class="size-card" onmouseover="previewSize('1000ml')" onclick="selectSize(this)">
                        <img src="images/bottle-1000.png" style="transform: scale(1.2)">
                        <b>1000ml</b>
                        <p>Future</p>
                    </div>
                </div>

                <a href="#" class="btn-shop">Shop Now</a>
            </div>
        </main>
    </div>

    <script>
        function previewSize(size) {
            const img = document.getElementById('heroImg');
            // ขยายรูปหลักตามการเลือก
            img.style.transform = (size === '1000ml') ? 'scale(1.15)' : 'scale(1)';
        }

        function selectSize(el) {
            document.querySelectorAll('.size-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>

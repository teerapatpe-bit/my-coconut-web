<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --bg-light: #f3f7f4; /* สีพื้นหลังฝั่งซ้าย */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--white); overflow-x: hidden; }

        /* --- Header --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--white);
            z-index: 100;
        }

        .brand-header { color: var(--gold); font-size: 1.4rem; font-weight: 700; }
        .partners-text { color: var(--gold); font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px; }

        /* ปรับขนาดไอคอนมาตรฐานให้ใหญ่ขึ้น (ตามรูป image_243883.png) */
        .cert-icons { display: flex; gap: 25px; align-items: center; }
        .cert-icons img { height: 70px; width: auto; mix-blend-mode: multiply; }

        nav { display: flex; align-items: center; gap: 30px; }
        .nav-links { display: flex; list-style: none; gap: 25px; }
        .nav-links a { text-decoration: none; color: #333; font-weight: 600; font-size: 0.9rem; }
        .search-btn { background: var(--accent-green); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        /* --- Hero Section แบบเต็มกล่อง 50/50 --- */
        .hero {
            display: flex;
            min-height: 800px;
            width: 100%;
            align-items: stretch; /* ให้ทั้งสองฝั่งสูงเท่ากัน */
        }

        /* ฝั่งซ้าย: เนื้อหา */
        .hero-content {
            flex: 1; /* กินพื้นที่ 50% */
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 8%; /* ให้เนื้อหาเยื้องซ้ายแต่มีพื้นที่หายใจ */
            padding-right: 5%;
            z-index: 2;
        }

        /* โลโก้ Eli (ขยับขึ้นตามรูป image_24346d.png) */
        .hero-top-icon {
            width: 220px;
            margin-top: -100px; /* ดันขึ้นด้านบน */
            margin-bottom: 30px;
            mix-blend-mode: multiply;
        }

        .hero-content h4 { color: var(--accent-green); font-size: 1.6rem; margin-bottom: 10px; }
        .hero-content h1 { 
            color: var(--primary-green); 
            font-size: 7.5rem; /* ตัวใหญ่เต็มกล่อง */
            line-height: 0.85; 
            font-weight: 800; 
            margin-bottom: 40px;
        }

        .btn-more {
            background: var(--accent-green);
            color: white;
            padding: 18px 50px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            width: fit-content;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(89, 128, 60, 0.2);
        }

        /* ฝั่งขวา: รูปภาพเต็มพื้นที่ */
        .hero-image-box {
            flex: 1; /* กินพื้นที่อีก 50% */
            position: relative;
            background: #fdfdfd;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* รูปจะขยายเต็มบล็อกฝั่งขวาพอดี */
            object-position: center;
        }

        /* --- Features Bar --- */
        .features-bar {
            background: white;
            margin: -50px 5% 50px;
            padding: 40px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
        }

        .feature-item { display: flex; align-items: center; gap: 15px; }
        .f-icon { width: 50px; height: 50px; background: var(--accent-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; }
        .f-text b { display: block; font-size: 1.1rem; color: var(--primary-green); }
        .f-text span { font-size: 0.8rem; color: #777; }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero { flex-direction: column; }
            .hero-content { padding: 80px 5%; text-align: center; align-items: center; }
            .hero-content h1 { font-size: 5rem; }
            .hero-top-icon { margin-top: 0; }
            .hero-image-box { height: 500px; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22014.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="BRC">
            </div>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">OVERVIEW</a></li>
                <li><a href="#">PRODUCTION</a></li>
                <li><a href="#">CERTIFICATION</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
            <button class="search-btn"><i class="fas fa-search"></i></button>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <img src="images/fssc-22015.png" alt="Eli Logo" class="hero-top-icon">
            <h4>100% NATURAL</h4>
            <h1>Coconut<br>Water</h1>
            <a href="#" class="btn-more">300ml &nbsp; <i class="fas fa-arrow-right"></i></a>
        </div>
        
        <div class="hero-image-box">
            <img src="images/fssc-22016.png" alt="Coconut Water" class="product-img">
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-tint-slash"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-vial-slash"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

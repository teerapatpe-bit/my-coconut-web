<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS | Premium Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand-gold: #D4AF37; 
            --brand-green: #2B4C3B; 
            --accent-blue: #4A90E2;
            --soft-white: #F9F9F9;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--soft-white);
            overflow-x: hidden;
            /* พื้นหลัง fssc-22007.png แบบจางพิเศษเพื่อส่งเสริมตัวสินค้า */
            background-image: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(240,240,240,0.9) 100%), url('images/fssc-22007.png');
            background-size: cover;
            background-attachment: fixed;
        }

        header {
            padding: 50px 80px 0 80px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .brand { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 3.5rem; 
            color: var(--brand-gold); 
            font-weight: 800; 
            letter-spacing: -1px; 
            text-transform: uppercase;
            text-shadow: 0 10px 20px rgba(212, 175, 55, 0.1); /* เพิ่มเงาจางๆ ให้ดูแพง */
        }

        /* ส่วนแสดงสินค้าที่ดูสง่า (Showcase Section) */
        .showcase {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 80px;
            align-items: center;
            min-height: 80vh;
        }

        /* การตกแต่งขวดน้ำให้ดูเด่นทันที */
        .product-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* รัศมีแสงด้านหลังขวดช่วยให้สินค้าดูสง่า */
        .product-visual::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.15) 0%, transparent 70%);
            z-index: 1;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        .main-bottle {
            width: 480px; /* ขนาดใหญ่ขึ้นเพื่อความเด่น */
            z-index: 5;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.15));
            transition: 0.5s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-bottle:hover {
            transform: translateY(-20px) scale(1.05);
        }

        /* รายละเอียดเนื้อหา */
        .content-box { z-index: 10; }

        .tagline {
            font-size: 1.2rem;
            color: var(--brand-green);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            display: block;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .info-card h2 {
            font-size: 4.5rem;
            color: var(--accent-blue);
            line-height: 1;
            margin-bottom: 10px;
            font-weight: 900;
        }

        .info-card p {
            font-size: 1.8rem;
            color: var(--brand-green);
            font-weight: 700;
            margin-bottom: 30px;
        }

        .cert-row {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .cert-row img { height: 35px; }

        .action-area {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .btn-premium {
            background: var(--brand-green);
            color: white;
            padding: 25px 60px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 15px 35px rgba(43,76,59,0.3);
            transition: 0.3s;
        }

        .btn-premium:hover {
            transform: translateY(-5px);
            background: #1e362a;
            box-shadow: 0 20px 45px rgba(43,76,59,0.4);
        }

        @media (max-width: 1100px) {
            .showcase { grid-template-columns: 1fr; text-align: center; }
            .main-bottle { width: 320px; }
            .info-card h2 { font-size: 3rem; }
            .cert-row { justify-content: center; }
            .action-area { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">EVER GOOD PARTNERS</div>
    </header>

    <section class="showcase">
        <div class="product-visual">
            <img src="images/fssc-22005.png" class="main-bottle" alt="Premium Coconut Water">
        </div>

        <div class="content-box">
            <span class="tagline">The True Taste of Nature</span>
            <div class="info-card">
                <h2>Coconut Water</h2>
                
                <div class="feat-list">
                    <div style="font-size: 1.2rem; font-weight: 800; color: #555; margin-bottom: 10px;">
                        ✓ 100% NATURAL & PURE
                    </div>
                    <div style="font-size: 1.2rem; font-weight: 800; color: #555;">
                        ✓ ZERO ADDED SUGAR
                    </div>
                    <div style="font-size: 1.2rem; font-weight: 800; color: #555; margin-bottom: 10px;">
                        ✓ No Artificial Flavor
                    </div>
                           <div style="font-size: 1.2rem; font-weight: 800; color: #555; margin-bottom: 10px;">
                        ✓ No Coloring
                    </div>
                    <div style="font-size: 1.2rem; font-weight: 800; color: #555; margin-bottom: 10px;">
                        ✓ No Preservatives
                    </div>
                </div>

                <div class="cert-row">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/fssc-22001.png" alt="Halal">
                    <img src="images/fssc-22002.png" alt="USDA">
                    <img src="images/fssc-22004.png" alt="SGS">
                </div>
            </div>

            <div class="action-area">
                <a href="#" class="btn-premium">Order Now</a>
            </div>
        </div>
    </section>

</body>
</html>

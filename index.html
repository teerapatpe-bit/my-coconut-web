<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Montserrat:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            --gold-gradient: linear-gradient(135deg, #C5A059 0%, #F1D592 50%, #B8860B 100%);
            --glass-panel: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.8), rgba(235, 240, 245, 0.7)), 
                        url('images/fssc-22007.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        /* --- Header Section --- */
        .header {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 5% 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 3px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .slogan {
            font-size: 0.65rem;
            font-weight: 700;
            color: #8E9AAF;
            letter-spacing: 4px;
            margin: 5px 0 15px;
        }

        .cert-logos {
            display: flex;
            gap: 15px;
        }

        .cert-logos img {
            height: 28px;
            opacity: 0.85;
        }

        .nav-links a {
            text-decoration: none;
            color: #2D3436;
            font-weight: 700;
            font-size: 0.75rem;
            margin-left: 25px;
            text-transform: uppercase;
        }

        /* --- Content Layout --- */
        .main-content {
            max-width: 1100px; /* ลดความกว้างรวมลงเพื่อให้ทุกอย่างชิดกันมากขึ้น */
            margin: 0 auto;
            padding: 0 5% 50px;
            display: flex;
            gap: 30px; /* ลดระยะห่างระหว่างกล่อง Eli และกล่องขวด */
            align-items: center;
        }

        /* --- Eli Info Card --- */
        .info-side {
            width: 280px; /* ลดขนาดความกว้างลงเล็กน้อย */
        }

        .eli-badge {
            background: #000;
            color: #fff;
            padding: 6px 20px;
            border-radius: 12px 12px 0 0;
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
        }

        .feature-box {
            background: var(--glass-panel);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 0 20px 20px 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .feature-item {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #4A5568;
        }

        .feature-item::before {
            content: '✓';
            width: 16px;
            height: 16px;
            background: #27AE60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
        }

        /* --- Product Showcase (ปรับลดพื้นที่ว่างตรงกลาง) --- */
        .product-display {
            flex: 1;
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 40px 50px; /* เพิ่ม Padding ซ้ายขวาเพื่อบีบเนื้อหาเข้าหากัน */
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 45px rgba(0,0,0,0.03);
            display: flex;
            justify-content: center; /* เปลี่ยนเป็น Center เพื่อให้เนื้อหาอยู่ใกล้กันมากขึ้น */
            gap: 40px; /* กำหนดระยะห่างคงที่ระหว่างตัวหนังสือและรูปภาพ */
            align-items: center;
        }

        .product-text h2 {
            font-size: 2.8rem;
            color: var(--brand-blue);
            font-weight: 800;
            line-height: 1;
        }

        .product-text .vol {
            font-size: 3.2rem;
            font-weight: 800;
            margin: 10px 0 5px;
        }

        .bottle-img img {
            max-width: 360px; /* ลดขนาดรูปขวดลงเล็กน้อยเพื่อให้ดูสมส่วนกับพื้นที่ที่ลดลง */
            width: 100%;
            filter: drop-shadow(10px 15px 30px rgba(0,0,0,0.08));
            transform: rotate(2deg);
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="brand-group">
            <h1 class="brand-title">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="slogan">PARTNERS IN PURITY.</p>
            <div class="cert-logos">
                <img src="images/fssc-22000.png" alt="Cert">
                <img src="images/fssc-22001.png" alt="Cert">
                <img src="images/fssc-22002.png" alt="Cert">
                <img src="images/fssc-22003.png" alt="Cert">
                <img src="images/fssc-22004.png" alt="Cert">
            </div>
        </div>
        <nav class="nav-links">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-side">
            <div class="eli-badge">Eli</div>
            <div class="feature-box">
                <ul>
                    <li class="feature-item">100% Natural Coconut water</li>
                    <li class="feature-item">No Sugar Added</li>
                    <li class="feature-item">No Artificial Flavor</li>
                    <li class="feature-item">No Coloring</li>
                    <li class="feature-item">No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="product-display">
            <div class="product-text">
                <p style="color:#A0AEC0; font-weight:700; font-size:0.7rem; letter-spacing:2px; margin-bottom:10px;">PREMIUM EXPORT QUALITY</p>
                <h2>18 months <span style="display:block; font-size:1.3rem; color:#718096; font-weight:400;">@ room temp.</span></h2>
                <div class="vol">330ml</div>
                <div style="color: #F1C40F; font-size: 1.1rem;">★★★★★</div>
            </div>
            <div class="bottle-img">
                <img src="images/fssc-22009.png" alt="Product Image">
            </div>
        </div>
    </main>

</body>
</html>

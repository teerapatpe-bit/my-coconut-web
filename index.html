<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | Interactive Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2B4C3B;
            --accent: #7ED321;
            --blue: #4A90E2;
            --bg: #F7F5F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #333; overflow-x: hidden; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 60px; }

        /* --- Header --- */
        header { display: flex; justify-content: space-between; align-items: flex-start; padding: 40px 0; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 3.5rem; color: var(--primary); letter-spacing: -2px; }
        .cert-icons { display: flex; gap: 10px; margin-top: 10px; }
        .cert-icons img { height: 26px; }

        /* --- Main Layout --- */
        .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; padding: 60px 0; }

        /* Features List */
        .feature-item { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; font-size: 1.4rem; font-weight: 700; color: #444; }

        /* Product Presentation Area */
        .presentation { display: flex; flex-direction: column; align-items: center; }

        .shelf-life-info { align-self: flex-start; margin-bottom: 30px; line-height: 1.2; }
        .shelf-life-info b { font-size: 2rem; color: var(--blue); display: block; }
        .shelf-life-info span { font-size: 1.3rem; color: var(--blue); font-weight: 600; }

        /* รูปขวดหลักพร้อม Animation ลอยตัว */
        .main-bottle-wrap { margin-bottom: 50px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .main-bottle {
            width: 280px;
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.12));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- กล่องเลือกขนาดแบบเรียงกันและขยายเมื่อ Hover --- */
        .size-container {
            display: flex;
            gap: 25px;
            width: 100%;
            max-width: 550px;
            margin-bottom: 40px;
        }

        .size-box {
            flex: 1;
            background: #FFFFFF;
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); /* เอฟเฟกต์การขยายที่นุ่มนวล */
            position: relative;
        }

        .size-box img { height: 60px; margin-bottom: 15px; transition: 0.4s; }
        .size-box b { display: block; font-size: 1.2rem; color: #222; }
        .size-box small { color: #999; text-transform: uppercase; font-weight: 800; font-size: 0.75rem; letter-spacing: 1px; }

        /* ลูกเล่นเมื่อเอาเมาส์ไปจ่อ (Hover & Expand) */
        .size-box:hover {
            transform: scale(1.1); /* ขยายขนาดกล่อง */
            box-shadow: 0 20px 45px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .size-box:hover img {
            transform: scale(1.2) translateY(-5px); /* ขยายรูปขวดจิ๋ว */
        }

        /* สไตล์เมื่อถูกเลือก (Active) */
        .size-box.active {
            border-color: var(--primary);
            background: #fff;
        }

        .btn-shop {
            background: var(--primary);
            color: white;
            width: 100%;
            max-width: 550px;
            padding: 25px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 3px;
            transition: 0.3s;
            box-shadow: 0 15px 30px rgba(43, 76, 59, 0.2);
        }

        .btn-shop:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(43, 76, 59, 0.3); }

        @media (max-width: 1100px) {
            .layout { grid-template-columns: 1fr; }
            .feature-item { justify-content: center; }
            .shelf-life-info { align-self: center; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand">
                <div class="logo">ELI.</div>
                <div class="cert-icons">
                    <img src="images/fssc.png" alt="FSSC">
                    <img src="images/halal.png" alt="Halal">
                    <img src="images/usda.png" alt="USDA">
                    <img src="images/kosher.png" alt="Kosher">
                    <img src="images/taste.png" alt="Taste Award">
                </div>
            </div>
        </header>

        <main class="layout">
            <div class="features">
                <div class="feature-item">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Artificial Flavor</span>
                </div>
                <div class="feature-item">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Coloring</span>
                </div>
                <div class="feature-item">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="presentation">
                <div class="shelf-life-info">
                    <b>18 months</b>
                    <span>@ room temp.</span>
                </div>

                <div class="main-bottle-wrap" id="bottle-container">
                    <img src="images/bottle-330.png" alt="ELI Product" class="main-bottle" id="main-product-img">
                </div>

                <div class="size-container">
                    <div class="size-box active" onmouseover="expandProduct('330ml')" onclick="setActive(this)">
                        <img src="images/bottle-330.png" alt="330">
                        <b>330ml</b>
                        <small>Present</small>
                    </div>
                    <div class="size-box" onmouseover="expandProduct('1000ml')" onclick="setActive(this)">
                        <img src="images/bottle-1000.png" alt="1000" style="transform: scale(1.2)">
                        <b>1000ml</b>
                        <small>Future</small>
                    </div>
                </div>

                <a href="#" class="btn-shop">Shop Now</a>
            </div>
        </main>
    </div>

    <script>
        function expandProduct(size) {
            const img = document.getElementById('main-product-img');
            const wrap = document.getElementById('bottle-container');
            
            if(size === '1000ml') {
                img.style.transform = 'scale(1.15)'; // ขยายขวดหลักเมื่อชี้ที่ 1000ml
                wrap.style.transform = 'translateY(-10px)';
            } else {
                img.style.transform = 'scale(1)';
                wrap.style.transform = 'translateY(0)';
            }
        }

        function setActive(el) {
            document.querySelectorAll('.size-box').forEach(box => box.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>

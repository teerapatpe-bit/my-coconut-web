<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --bg-light: #F8FAF9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            overflow-x: hidden;
        }

        /* --- Header Section --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 25px 60px;
            background: var(--white);
            position: relative;
            z-index: 100;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand-header {
            color: var(--gold);
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .partners-text {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        .cert-icons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .cert-icons img {
            height: 45px; /* ขนาดโลโก้ */
            width: auto;
            object-fit: contain;
            mix-blend-mode: multiply; /* ลบพื้นหลังขาว */
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-top: 5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 600;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-green);
        }

        .search-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(89, 128, 60, 0.3);
        }

        /* --- Hero Section --- */
        .hero {
            display: flex;
            padding: 40px 60px 100px;
            position: relative;
            background: radial-gradient(circle at 80% 50%, #e8f5e9 0%, #f8faf9 100%);
        }

        .hero-content {
            flex: 1;
            padding-top: 40px; /* ปรับลดพื้นที่ด้านบนนิดหน่อยเพื่อให้รูปโลโก้พอดี */
        }

        .hero-top-icon {
    width: 180px; /* 👈 แก้ตัวเลขตรงนี้ให้มากขึ้น (ลองปรับเป็น 150px, 180px, หรือ 200px) */
    height: auto; /* ความสูงจะปรับตามอัตโนมัติ ทำให้รูปไม่เบี้ยว */
    mix-blend-mode: multiply;
    margin-bottom: 15px;
    display: block;
}

        .hero-content h4 {
            color: var(--accent-green);
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .hero-content h1 {
            color: var(--primary-green);
            font-size: 5.5rem;
            line-height: 1;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .btn-more {
            background: var(--accent-green);
            color: white;
            padding: 14px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-more:hover {
            background: var(--primary-green);
            transform: translateY(-2px);
        }

        /* --- Product Image Placeholder --- */
        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .product-img {
            max-width: 90%;
            z-index: 2;
        }

        /* --- Floating Features (กล่องขาวด้านล่าง) --- */
        .features-bar {
            background: white;
            margin: -60px 60px 0;
            padding: 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            position: relative;
            z-index: 20;
        }

        .feature-item {
            text-align: center;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .f-icon {
            width: 45px;
            height: 45px;
            background: var(--accent-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .f-text b { font-size: 1.1rem; display: block; color: #333; line-height: 1; }
        .f-text span { font-size: 0.75rem; color: #888; }

        @media (max-width: 1024px) {
            .hero { flex-direction: column; text-align: center; }
            .hero-top-icon { margin: 0 auto 15px; } /* จัดโลโก้ให้อยู่กึ่งกลางในหน้าจอมือถือ */
            .header-container { flex-direction: column; align-items: center; gap: 20px; }
            .features-bar { flex-wrap: wrap; gap: 20px; margin: 20px; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22014.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="BRC">
            </div>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="#">OVERVIEW</a></li>
                <li><a href="#">PRODUCTION</a></li>
                <li><a href="#">CERTIFICATION</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
            <button class="search-btn">
                <i class="fas fa-search"></i>
            </button>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content"> 
            <img src="images/fssc-22015.png" alt="Eli Logo" class="hero-top-icon">
            
            <h4>100% NATURAL</h4>
            <h1>Coconut<br>Water</h1>
            <a href="#" class="btn-more">300ml <i class="fas fa-arrow-right"></i></a>
        </div>
        
        <div class="hero-image">
            <img src="images/product-bottle.png" alt="Coconut Water" class="product-img">
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-tint-slash"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-vial-slash"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

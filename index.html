<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Montserrat:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            --gold-text: #C5A059;
            --glass-white: rgba(255, 255, 255, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.8), rgba(235, 240, 245, 0.7)), 
                        url('images/fssc-22007.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        /* --- Header Section --- */
        .header {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 5% 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 500;
            color: var(--gold-text);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cert-row-original {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .cert-row-original img {
            height: 28px;
            opacity: 0.9;
        }

        /* --- Pill Navigation Style --- */
        .nav-container {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 8px 30px;
            display: flex;
            gap: 20px;
            background: white; /* ใส่พื้นหลังขาวให้อ่านง่ายขึ้น */
        }

        .nav-container a {
            text-decoration: none;
            color: #000;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* --- Layout --- */
        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 5% 50px;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        /* --- Eli Info Card --- */
        .info-side {
            width: 340px;
        }

        .eli-badge {
            background: #000;
            color: #fff;
            padding: 10px 25px;
            border-radius: 15px 15px 0 0;
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
        }

        .feature-box {
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            padding: 30px 25px;
            border-radius: 0 25px 25px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .feature-item {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #2D3436;
        }

        .feature-item::before {
            content: '✓';
            width: 18px; height: 18px;
            background: #27AE60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }

        /* ปุ่ม present ภายในกล่อง Eli */
        .present-btn {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: #000;
            font-weight: 800;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .present-btn:hover {
            background: #000;
            color: #fff;
        }

        /* --- Product Showcase --- */
        .product-display {
            flex: 1;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 60px;
            display: flex;
            justify-content: center;
            gap: 50px;
            align-items: center;
        }

        .shelf-life {
            font-size: 3.5rem;
            color: var(--brand-blue);
            font-weight: 800;
            line-height: 1.1;
        }

        .shelf-life span {
            display: block;
            font-size: 1.8rem;
            color: #718096;
            font-weight: 400;
        }

        .volume {
            font-size: 4.5rem;
            font-weight: 800;
            color: #1a202c;
            margin: 10px 0;
        }

        .stars { color: #F1C40F; font-size: 1.3rem; }

        .bottle-img img {
            max-width: 420px;
            width: 100%;
            filter: drop-shadow(20px 25px 40px rgba(0,0,0,0.1));
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="brand-group">
            <h1 class="brand-title">EVER GOOD PARTNERS</h1>
            <div class="cert-row-original">
                <img src="images/fssc-22000.png" alt="FSSC 22000">
                <img src="images/halal.png" alt="Halal">
                <img src="images/usda.png" alt="USDA Organic">
                <img src="images/kosher.png" alt="Kosher">
            </div>
        </div>
        
        <nav class="nav-container">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-side">
            <div class="eli-badge">Eli</div>
            <div class="feature-box">
                <ul>
                    <li class="feature-item">100% Natural Coconut water</li>
                    <li class="feature-item">No Sugar Added</li>
                    <li class="feature-item">No Artificial Flavor</li>
                    <li class="feature-item">No Coloring</li>
                    <li class="feature-item">No Preservatives</li>
                </ul>
                
                <a href="#" class="present-btn">present</a>
            </div>
        </div>

        <div class="product-display">
            <div class="product-text">
                <p style="color:#A0AEC0; font-weight:700; font-size:0.75rem; letter-spacing:2px;">PREMIUM EXPORT QUALITY</p>
                <h2 class="shelf-life">18 months <span>Shelf-life at room temp.</span></h2>
                <div class="volume">330ml</div>
                <div class="stars">★★★★★</div>
            </div>
            <div class="bottle-img">
                <img src="images/fssc-22009.png" alt="Eli Coconut Water">
            </div>
        </div>
    </main>

</body>
</html>

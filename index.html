<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --text-dark: #333333;
            --bg-light: #f8faf9;
            --divider-color: #eeeeee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--bg-light); }

        /* --- HEADER & BRANDING --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px; /* เพิ่มพื้นที่ให้โลโก้ดูโปร่งขึ้น */
            background: var(--white);
            position: relative;
            z-index: 100;
        }

        /* ปรับขนาดชื่อบริษัทให้ใหญ่และหนาขึ้น */
        .brand-header { 
            color: var(--gold); 
            font-size: 1.8rem; 
            font-weight: 700; 
            line-height: 1.1;
        }

        .partners-text { 
            color: var(--gold); 
            font-size: 0.85rem; 
            letter-spacing: 4px; 
            margin-bottom: 15px; 
        }

        /* ปรับไอคอนการรับรองให้ใหญ่ขึ้น */
        .cert-icons { 
            display: flex; 
            gap: 15px; 
            align-items: center;
        }

        .cert-icons img { 
            height: 40px; 
            mix-blend-mode: multiply; 
        }

        /* --- NAVIGATION & SEARCH --- */
        .nav-section {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        /* การจัดวางเมนูแบบเรียงในบรรทัดเดียว */
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 45px;
        }

        .nav-menu li a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-menu li a:hover { color: var(--accent-green); }

        /* ปุ่มค้นหาวงกลมสีเทาอ่อน */
        .search-circle {
            width: 55px;
            height: 55px;
            background: #f1f1f1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-green);
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }

        .search-circle:hover { transform: scale(1.05); }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 800px;
            width: 100%;
            background-image: url('images/fssc-22018.png'); 
            background-size: cover;
            background-position: center right; 
            display: flex;
            align-items: center;
            padding: 0 8%;
        }

        .hero-top-icon {
            position: absolute;
            top: 40px;
            left: 8%;
            width: 240px; /* ขยายขนาดโลโก้ Eli */
            z-index: 15;
        }

        .hero-content h1 { 
            color: var(--primary-green); 
            font-size: 6.5rem; 
            line-height: 0.9; 
            font-weight: 800; 
            margin: 0 0 35px; 
            text-transform: uppercase;
        }

        .btn-more {
            background: var(--accent-green);
            color: var(--white);
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            box-shadow: 0 8px 25px rgba(89, 128, 60, 0.3);
        }

        /* --- FEATURES BAR --- */
        .features-bar {
            background: var(--white);
            margin: -60px 80px 40px;
            padding: 30px;
            border-radius: 50px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 15px 45px rgba(0,0,0,0.08);
            position: relative;
            z-index: 20;
        }

        .feature-item { 
            flex: 1;
            display: flex; 
            align-items: center; 
            gap: 15px; 
            justify-content: center;
            position: relative;
        }

        /* เส้นคั่นระหว่างหัวข้อ */
        .feature-item:not(:last-child)::after {
            content: "";
            position: absolute;
            right: 0;
            height: 40px;
            width: 1px;
            background-color: var(--divider-color);
        }

        .f-icon { 
            width: 60px; height: 60px; 
            background: var(--accent-green); 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            color: var(--white); font-size: 1.4rem;
        }

        .f-text b { display: block; font-size: 1.25rem; color: var(--primary-green); line-height: 1.1; }
        .f-text span { font-size: 0.8rem; color: #666; display: block; }

        @media (max-width: 1200px) {
            .nav-menu { display: none; }
            .header-container { padding: 20px 30px; }
            .features-bar { margin: 20px; border-radius: 20px; flex-wrap: wrap; }
            .feature-item { width: 50%; flex: none; margin: 15px 0; }
            .feature-item:not(:last-child)::after { display: none; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC 22000">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA Organic">
                <img src="images/fssc-22003.png" alt="Kosher">
                <img src="images/fssc-22004.png" alt="BRC Quality">
            </div>
        </div>

        <div class="nav-section">
            <nav>
                <ul class="nav-menu">
                    <li><a href="#overview">Overview</a></li>
                    <li><a href="#production">Production</a></li>
                    <li><a href="#certification">Certification</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
            <div class="search-circle">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </header>

    <section class="hero">
        <img src="images/fssc-22007" alt="Eli Logo" class="hero-top-icon">
        <div class="hero-content">
            <h4>100% NATURAL</h4>
            <h1>COCONUT<br>WATER</h1>
            <a href="#discover" class="btn-more">
                DISCOVER MORE <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-cubes-stacked"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-vial"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon"><i class="fas fa-shield-halved"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

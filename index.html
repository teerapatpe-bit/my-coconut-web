<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F2EFE9;
            --brand-green: #2B4C3B;    
            --text-brown: #5D5443;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #1C1D1B;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* --- Header: โลโก้ และ ใบรับรองคุณภาพ --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 50px 0;
        }

        .brand-block {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--brand-green);
            line-height: 1;
            letter-spacing: -1px;
        }

        /* แถบใบรับรองใต้โลโก้ ELI */
        .cert-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .cert-row img {
            height: 38px; /* ขนาดที่ดูเหมาะสมและเรียบร้อย */
            width: auto;
            object-fit: contain;
        }

        /* --- ส่วนเนื้อหาหลัก --- */
        .main-showcase {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 55vh;
            gap: 40px;
            padding-bottom: 60px;
        }

        /* รายการจุดเด่นสินค้า */
        .feature-list {
            flex: 1;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-brown);
            margin-bottom: 20px;
        }

        /* เครื่องหมายถูกสีเขียวแบบ SVG (แสดงผลแน่นอนไม่ต้องใช้ไฟล์ภาพ) */
        .icon-check {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        /* การ์ดโชว์สินค้าพรีเมียม */
        .product-card {
            flex: 1;
            background: var(--white);
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            max-width: 450px;
        }

        .product-card img {
            width: 100%;
            max-width: 320px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.06));
        }

        .price-text {
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--brand-green);
            display: block;
            margin-bottom: 25px;
        }

        .btn-shop {
            background-color: var(--brand-green);
            color: white;
            padding: 18px 60px;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-shop:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(43, 76, 59, 0.2);
        }

        /* รางวัลด้านล่างสุด */
        .award-section {
            padding-bottom: 50px;
        }

        .award-img {
            height: 65px;
            width: auto;
        }

        /* สำหรับหน้าจอ iPad และ มือถือ */
        @media (max-width: 1024px) {
            header { flex-direction: column; align-items: center; text-align: center; }
            .cert-row { justify-content: center; flex-wrap: wrap; }
            .main-showcase { flex-direction: column; text-align: center; }
            .feature-item { justify-content: center; }
            .product-card { margin: 0 auto; width: 100%; }
            .award-section { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-block">
                <div class="logo">ELI.</div>
                <div class="cert-row">
                    <img src="images/fssc-22000.png" alt="FSSC 22000">
                    <img src="images/fssc-22001.png" alt="Halal">
                    <img src="images/fssc-22002.png" alt="USDA Organic">
                    <img src="images/fssc-22003.png" alt="Kosher">
                    <img src="images/fssc-22004.png" alt="SGS/Standard">
                </div>
            </div>
        </header>

        <section class="main-showcase">
            <div class="feature-list">
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Artificial Flavor</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Coloring</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="product-card">
                <img src="images/fssc-22005.png" alt="ELI Coconut Water Product">
                <span class="price-text">฿45.00</span>
                <a href="#" class="btn-shop">Shop Now</a>
            </div>
        </section>

        <footer class="award-section">
           
        </footer>
    </div>

</body>
</html>

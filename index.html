<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Montserrat:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C5A059;
            --blue: #1A4F8B;
            /* พื้นหลังสีขาวนวลแบบโปร่งแสงเพื่อให้ดูละมุนและกลมกลืน */
            --glass: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px; /* ลดความกว้างหน้าเว็บลงเพื่อให้ดู Compact */
            padding: 40px 20px;
        }

        /* --- Header: สะอาดตาและประหยัดพื้นที่ --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 45px;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem; /* ลดขนาดชื่อบริษัทลง */
            font-weight: 500;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
            margin: 0;
        }

        .slogan {
            font-size: 0.5rem;
            letter-spacing: 3px;
            color: #94A3B8;
            margin-top: 3px;
        }

        .cert-logos {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .cert-logos img {
            height: 18px; /* ปรับขนาดโลโก้ FSSC และอื่นๆ ให้กะทัดรัด */
            opacity: 0.8;
        }

        .nav {
            display: flex;
            gap: 20px;
            font-size: 0.65rem;
            font-weight: 800;
            color: #1e293b;
        }

        /* --- Main Content Section --- */
        .main-grid {
            display: grid;
            grid-template-columns: 220px 1fr; /* ย่อขนาดความกว้างกล่อง Eli */
            gap: 30px;
            align-items: center;
        }

        /* --- Eli Compact Box --- */
        .eli-card {
            z-index: 5;
        }

        .eli-tab {
            background: #000;
            color: #fff;
            padding: 4px 15px;
            border-radius: 8px 8px 0 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 900;
            display: inline-block;
        }

        .feature-box {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px; /* ลดพื้นที่ว่างภายในกล่องลง */
            border-radius: 0 14px 14px 14px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 8px 25px rgba(0,0,0,0.02);
        }

        .item {
            font-size: 0.68rem; /* ลดขนาดฟอนต์ให้ดูพอดีกับกล่องเล็ก */
            font-weight: 700;
            color: #475569;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
        }

        .item::before {
            content: '✓';
            color: #22c55e;
            font-weight: 900;
        }

        /* --- Product Showcase Area --- */
        .showcase {
            background: rgba(248, 250, 252, 0.4);
            border-radius: 35px;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 350px;
        }

        .product-text h2 {
            font-size: 1.8rem; /* ย่อขนาดข้อความ 18 months */
            color: var(--blue);
            margin: 0;
        }

        .product-text .vol {
            font-size: 2.5rem; /* ย่อขนาด 330ml */
            font-weight: 800;
            margin: 8px 0;
            color: #0f172a;
        }

        .product-image img {
            max-width: 240px; /* ลดขนาดขวด Eli ลงเพื่อให้สมดุลกับกล่องที่เล็กลง */
            filter: drop-shadow(10px 15px 25px rgba(0,0,0,0.05));
            transform: rotate(2deg);
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="brand-group">
                <h1 class="brand-title">EVER GOOD PARTNERS CO.,LTD.</h1>
                <p class="slogan">PARTNERS IN PURITY.</p>
                <div class="cert-logos">
                    <img src="fssc-22000.png" alt="FSSC 22000">
                    <img src="fssc-22001.png" alt="Halal">
                    <img src="fssc-22002.png" alt="USDA">
                    <img src="fssc-22003.png" alt="Kosher">
                    <img src="fssc-22004.png" alt="Superior Taste">
                </div>
            </div>
            <nav class="nav">
                <span>OVERVIEW</span>
                <span>PRODUCTION</span>
                <span>CERTIFICATION</span>
                <span>CONTACT</span>
            </nav>
        </header>

        <main class="main-grid">
            <div class="eli-card">
                <div class="eli-tab">Eli</div>
                <div class="feature-box">
                    <li class="item">100% Natural Coconut water</li>
                    <li class="item">No Sugar Added</li>
                    <li class="item">No Artificial Flavor</li>
                    <li class="item">No Coloring</li>
                    <li class="item">No Preservatives</li>
                </div>
            </div>

            <div class="showcase">
                <div class="product-text">
                    <p style="font-size: 0.55rem; font-weight: 800; color: #94A3B8; letter-spacing: 1.2px; margin-bottom: 5px;">PREMIUM EXPORT QUALITY</p>
                    <h2>18 months <br><span style="font-size: 0.9rem; font-weight: 400; color: #64748B;">@ room temp.</span></h2>
                    <div class="vol">330ml</div>
                    <div style="color: #fbbf24; font-size: 0.8rem;">★★★★★</div>
                </div>
                <div class="product-image">
                    <img src="fssc-22009.png" alt="Eli Coconut Water">
                </div>
            </div>
        </main>
    </div>
</body>
</html>

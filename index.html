<!DOCTYPE html>
<html lang="th"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --text-dark: #222222;
            --bg-light: #f8faf9;
            --divider-color: #eeeeee;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--bg-light); overflow-x: hidden; }

        /* =========================================
           1. DESKTOP (PC / Laptop)
        ========================================= */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            background: var(--white);
            position: relative;
            z-index: 100;
        }

        .brand-header { color: var(--gold); font-size: 1.8rem; font-weight: 700; line-height: 1.1; }
        .partners-text { color: var(--gold); font-size: 0.85rem; letter-spacing: 4px; margin-bottom: 15px; }

        .nav-menu { display: flex; list-style: none; gap: 50px; }
        .nav-menu li a {
            text-decoration: none; color: var(--text-dark); font-size: 0.85rem;
            font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s;
        }
        .nav-menu li a:hover { color: var(--accent-green); }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 800px;
            width: 100%;
            background-image: url('images/fssc-22013.png'); 
            background-size: cover;
            background-position: center right; 
            display: flex;
            align-items: center;
            padding: 0 8%;
        }

        .hero-top-icon {
            position: absolute;
            top: -15px;
            left: 8%;
            width: 240px;
            z-index: 15;
            mix-blend-mode: multiply; 
        }

        .hero-content h4 {
            color: var(--accent-green); font-size: 2.5rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            margin-top: 100px; margin-bottom: 5px;
        }

        .hero-content h1 { 
            color: var(--primary-green); font-size: 7rem; line-height: 0.8;
            font-weight: 900; letter-spacing: -2px; margin: 0; text-transform: uppercase;
        }

        .product-origin {
            color: var(--primary-green); font-size: 1.2rem; font-weight: 500;
            margin-top: 10px; margin-bottom: 45px; letter-spacing: 5px; 
            text-transform: uppercase; opacity: 0.8;
        }

        .btn-more {
            background: var(--accent-green); color: var(--white);
            font-size: 1.4rem; padding: 18px 55px; border-radius: 50px;
            text-decoration: none; display: inline-flex; align-items: center;
            gap: 12px; font-weight: 700; box-shadow: 0 8px 25px rgba(89, 128, 60, 0.3);
            transition: 0.3s;
        }
        .btn-more:hover { transform: scale(1.05); background: var(--primary-green); }

        /* --- FEATURES BAR --- */
        .features-bar {
            background: var(--white); margin: -60px 80px 40px; padding: 25px 40px;
            border-radius: 60px; display: flex; justify-content: space-between;
            box-shadow: 0 15px 45px rgba(0,0,0,0.08); position: relative; z-index: 20;
        }
        .feature-item { flex: 1; display: flex; align-items: center; gap: 12px; justify-content: center; position: relative; }
        .feature-item:not(:last-child)::after { content: ""; position: absolute; right: 0; height: 40px; width: 1px; background-color: var(--divider-color); }
        .f-icon-circle { width: 50px; height: 50px; background: #5a7e3d; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; flex-shrink: 0; }
        .f-text b { display: block; font-size: 1.1rem; color: var(--primary-green); font-weight: 700; line-height: 1.2;}
        .f-text span { font-size: 0.75rem; color: #666; }

        /* =========================================
           2. TABLET (iPad)
        ========================================= */
        @media (max-width: 1024px) {
            .header-container { padding: 20px 40px; flex-direction: column; text-align: center; gap: 20px; }
            .nav-menu { gap: 30px; flex-wrap: wrap; justify-content: center; }
            
            .hero { min-height: 600px; justify-content: center; text-align: center; padding: 0 5%; background-position: center; }
            .hero-top-icon { position: relative; top: 0; left: 0; width: 180px; margin: 0 auto 20px; display: block; }
            .hero-content { display: flex; flex-direction: column; align-items: center; margin-top: 0; }
            .hero-content h4 { margin-top: 0; font-size: 2rem; }
            .hero-content h1 { font-size: 5rem; }
            
            .features-bar { 
                flex-wrap: wrap; gap: 20px; margin: -40px 40px 40px; 
                padding: 30px; border-radius: 30px; justify-content: center;
            }
            .feature-item { flex: 1 1 30%; min-width: 220px; justify-content: flex-start; padding: 10px; }
            .feature-item:not(:last-child)::after { display: none; }
        }

        /* =========================================
           3. MOBILE (มือถือทั่วไป)
        ========================================= */
        @media (max-width: 768px) {
            .header-container { padding: 25px 20px 15px; }
            .brand-header { font-size: 1.4rem; }
            .partners-text { font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 5px; }
            
            .nav-menu { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .nav-menu li a { font-size: 0.75rem; background: var(--bg-light); padding: 5px 12px; border-radius: 20px; }

            .hero { min-height: 85vh; padding: 40px 5% 80px; }
            .hero-top-icon { width: 120px; margin-bottom: 20px; }
            .hero-content h4 { font-size: 1.3rem; letter-spacing: 2px; }
            .hero-content h1 { font-size: 3.2rem; letter-spacing: -1px; }
            .product-origin { font-size: 0.75rem !important; margin-bottom: 30px; letter-spacing: 3px; }
            .btn-more { font-size: 1.1rem; padding: 12px 35px; }

            /* จัด Features ให้อยู่ในรูปแบบ Grid สวยๆ */
            .features-bar {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin: -50px 15px 30px; 
                padding: 30px 20px; 
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            }
            .feature-item { min-width: unset; padding: 0; justify-content: flex-start; }
            .feature-item:last-child { grid-column: span 2; justify-content: center; } /* รายการที่ 5 จัดกึ่งกลาง */
            .f-icon-circle { width: 40px; height: 40px; font-size: 0.9rem; }
            .f-text b { font-size: 0.95rem; }
            .f-text span { font-size: 0.7rem; }
        }

        /* =========================================
           4. SMALL MOBILE (มือถือจอเล็ก)
        ========================================= */
        @media (max-width: 480px) {
            .hero-content h1 { font-size: 2.6rem; }
            
            /* เปลี่ยนเป็นเรียง 1 แถวแนวตั้ง เพื่อให้อ่านง่ายที่สุดในจอเล็กมาก */
            .features-bar { 
                grid-template-columns: 1fr; 
                padding: 25px; 
                gap: 15px; 
            }
            .feature-item { justify-content: flex-start; padding-left: 10%; } /* จัดซ้ายให้ตรงกัน */
            .feature-item:last-child { grid-column: span 1; justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="brand">
            <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="partners-text">PARTNERS IN PURITY.</p>
        </div>

        <nav class="nav-section">
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="overview.html">OVERVIEW</a></li>
                <li><a href="production.html">PRODUCTION</a></li>
                <li><a href="certification.html">CERTIFICATION</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <img src="images/fssc-22007.png" alt="Eli Logo" class="hero-top-icon">
            
            <h4>100% NATURAL</h4>
            <h1>COCONUT<br>WATER </h1>
            <h3 class="product-origin">PRODUCT OF THAILAND</h3>
            <a href="overview.html" class="btn-more">
                330 ml <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item">
            <div class="f-icon-circle"><i class="fas fa-leaf"></i></div>
            <div class="f-text"><b>100%</b><span>Natural Coconut Water</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon-circle"><i class="fas fa-cubes"></i></div>
            <div class="f-text"><b>No</b><span>Sugar Added</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon-circle"><i class="fas fa-flask"></i></div>
            <div class="f-text"><b>No</b><span>Artificial Flavor</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon-circle"><i class="fas fa-eye-dropper"></i></div>
            <div class="f-text"><b>No</b><span>Coloring</span></div>
        </div>
        <div class="feature-item">
            <div class="f-icon-circle"><i class="fas fa-shield"></i></div>
            <div class="f-text"><b>No</b><span>Preservatives</span></div>
        </div>
    </div>

</body>
</html>

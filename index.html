<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B6CB0;
            --gold-gradient: linear-gradient(180deg, #D4AF37 0%, #F1D592 50%, #B8860B 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            /* ปรับพื้นหลังให้จางลง (0.85) เพื่อให้เนื้อหาชัดเจน */
            background: linear-gradient(rgba(240, 244, 248, 0.85), rgba(240, 244, 248, 0.85)), 
                        url('images/fssc-22007.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        .top-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 35px 5% 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ส่วนชื่อแบรนด์สีทอง */
        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.8rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            font-weight: 900;
        }

        nav a {
            text-decoration: none;
            color: #111;
            font-weight: 900;
            font-size: 0.85rem;
            margin-left: 30px;
            text-transform: uppercase;
        }

        .content-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 5%;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 50px;
        }

        /* --- กล่องข้อความ Eli ตัวหนา --- */
        .eli-box {
            background: #fff;
            padding: 10px 25px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .eli-text {
            font-size: 2.5rem;
            font-weight: 900; /* ตัวหนาตามบรีฟ */
            color: #111;
            font-family: 'Montserrat', sans-serif;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .info-card li {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #2d3436;
        }

        /* ไอคอนเครื่องหมายถูกสีเขียว */
        .info-card li::before {
            content: '✓';
            color: #2ecc71;
            font-weight: 900;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            border-radius: 50px;
            padding: 50px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.6);
        }

        .product-text h2 {
            font-size: 3rem;
            color: var(--brand-blue);
            font-weight: 900;
            line-height: 1;
        }

        .product-text .desc {
            font-size: 1.8rem;
            color: #4a5568;
            margin-bottom: 15px;
            display: block;
        }

        .volume { font-size: 3.8rem; font-weight: 900; }

        .bottle-img {
            width: 130%;
            max-width: 450px;
            transform: rotate(5deg);
            filter: drop-shadow(20px 30px 50px rgba(0,0,0,0.12));
        }

        .cert-icons img {
            height: 35px;
            margin-right: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="top-container">
        <h1 class="brand-title">EVER GOOD PARTNERS CO., LTD.</h1>
        <nav>
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </div>

    <div class="content-section">
        <div class="left-panel">
            <div class="cert-icons">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22003.png" alt="Kosher">
            </div>

            <div class="eli-box">
                <span class="eli-text">Eli</span>
            </div>

            <div class="info-card">
                <ul>
                    <li>100% Natural Coconut water</li>
                    <li>No Sugar Added</li>
                    <li>No Artificial Flavor</li>
                    <li>No Coloring</li>
                    <li>No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="glass-box">
            <div class="product-text">
                <p style="color:#718096; font-weight:700; margin-bottom:8px;">SEO. www.evergood.co.th</p>
                <h2>18 months <span class="desc">@ room temp.</span></h2>
                <div class="volume">300ml</div>
                <div style="color: #f1c40f; font-size: 1.5rem; margin-top: 10px;">★★★★★</div>
            </div>
            <div class="product-img">
                <img src="images/fssc-22008.png" class="bottle-img" alt="Eli Coconut Water">
            </div>
        </div>
    </div>

</body>
</html>

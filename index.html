<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI | 100% Pure Thai Coconut Water</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F2EFE9;
            --brand-green: #2B4C3B;    
            --text-brown: #5D5443;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #1C1D1B;
            line-height: 1.2;
        }

        .container {
            max-width: 1300px; /* ขยายกว้างขึ้นเพื่อให้เมนูมีพื้นที่ */
            margin: 0 auto;
            padding: 0 40px;
        }

        /* --- Header: Brand & Navigation --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 25px 0 0 0;
        }

        /* ฝั่งซ้าย: Logo & Certs */
        .brand-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--brand-green);
            line-height: 1;
        }

        .cert-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .cert-row img {
            height: 28px;
            width: auto;
        }

        /* ฝั่งขวา: เมนูตามรูป 8f3129 */
        nav {
            display: flex;
            gap: 25px;
            padding-top: 10px;
        }

        .nav-item {
            text-decoration: none;
            color: #000;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            max-width: 200px;
            text-align: center;
            transition: color 0.3s;
        }

        .nav-item:hover {
            color: var(--brand-green);
        }

        /* --- Main Layout --- */
        .main-content {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-top: -10px; /* ดึงเนื้อหาขึ้นชิดบนตามรูป 99c3f4 */
            gap: 50px;
            padding-bottom: 40px;
        }

        /* รายการเครื่องหมายถูก */
        .feature-list {
            flex: 1;
            padding-top: 15px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-brown);
            margin-bottom: 12px;
        }

        .icon-check {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* การ์ดสินค้าพรีเมียมตามรูป 9a19ee */
        .product-display {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            max-width: 420px;
            margin-top: 10px;
        }

        .product-display img {
            width: 100%;
            max-width: 260px;
            margin-bottom: 25px;
        }

        .price-tag {
            font-size: 3rem;
            font-weight: 800;
            color: var(--brand-green);
            display: block;
        }

        /* รางวัลด้านล่างสุด */
        .footer-award {
            padding: 20px 0;
        }

        .footer-award img {
            height: 50px;
        }

        /* สำหรับ Mobile/Tablet */
        @media (max-width: 1100px) {
            header { flex-direction: column; align-items: center; text-align: center; }
            nav { flex-wrap: wrap; justify-content: center; margin-top: 20px; }
            .main-content { flex-direction: column; align-items: center; text-align: center; margin-top: 30px; }
            .feature-item { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-block">
                <div class="logo">ELI.</div>
                <div class="cert-row">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/fssc-22001.png" alt="Halal">
                    <img src="images/fssc-22002.png" alt="USDA">
                    <img src="images/fssc-22003.png" alt="Kosher">
                    <img src="images/fssc-22004.png" alt="SGS">
                </div>
            </div>

            <nav>
                <a href="#" class="nav-item">Product Overview</a>
                <a href="#" class="nav-item">Factory & Production Excellence</a>
                <a href="#" class="nav-item">Quality & Certification</a>
                <a href="#" class="nav-item">Contact</a>
            </nav>
        </header>

        <section class="main-content">
            <div class="feature-list">
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>100% Natural Coconut water</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Sugar Added</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Artificial Flavor</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Coloring</span>
                </div>
                <div class="feature-item">
                    <svg class="icon-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#7ED321" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>No Preservatives</span>
                </div>
            </div>

            <div class="product-display">
                <img src="images/fssc-22005.png" alt="ELI Product">
                <span class="price-tag">฿45.00</span>
            </div>
        </section>

        <footer class="footer-award">
            <img src="images/fssc-22006.png" alt="Taste Award">
        </footer>
    </div>

</body>
</html>

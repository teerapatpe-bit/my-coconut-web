<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Montserrat:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            --gold-gradient: linear-gradient(135deg, #C5A059 0%, #F1D592 50%, #B8860B 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(245, 247, 250, 0.94), rgba(245, 247, 250, 0.94)), 
                        url('images/fssc-22007.png') no-repeat center center fixed;
            background-size: cover;
            color: #333;
            min-height: 100vh;
        }

        /* --- Header Section --- */
        .header {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 5% 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start; /* ปรับให้ชิดบนเพื่อรองรับสโลแกน */
        }

        .brand-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* ปรับขนาดชื่อบริษัทให้เล็กลงแต่ดูพรีเมียม */
        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem; /* ลดขนาดลงจากเดิม */
            font-weight: 500;   /* ความหนาระดับกลาง ดูสะอาดตา */
            letter-spacing: 3px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            line-height: 1.2;
        }

        /* สโลแกนใตชื่อบริษัท */
        .slogan {
            font-size: 0.75rem;
            font-weight: 700;
            color: #7F8C8D;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        /* จัดวางกลุ่มโลโก้ใต้สโลแกน */
        .cert-logos-top {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .cert-logos-top img {
            height: 24px; /* ขนาดกะทัดรัด */
            filter: grayscale(20%) contrast(1.1);
            opacity: 0.9;
        }

        .nav-links {
            padding-top: 10px;
        }

        .nav-links a {
            text-decoration: none;
            color: #2D3436;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-left: 30px;
            text-transform: uppercase;
        }

        /* --- Content Layout --- */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 5% 80px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 50px;
            align-items: center;
        }

        .info-card-group {
            display: flex;
            flex-direction: column;
        }

        .eli-label {
            background: #000;
            color: #fff;
            padding: 10px 30px;
            border-radius: 15px 15px 0 0;
            display: inline-block;
            width: fit-content;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
        }

        .info-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 0 25px 25px 25px;
            border: 1px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #444;
            list-style: none;
        }

        .feature-item::before {
            content: '✓';
            width: 20px;
            height: 20px;
            background: #27AE60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 900;
        }

        /* --- Product Display --- */
        .glass-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            border-radius: 50px;
            padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.05);
        }

        .text-side h2 {
            font-size: 3.5rem;
            color: var(--brand-blue);
            font-weight: 800;
            line-height: 1;
        }

        .text-side .subtitle {
            font-size: 1.4rem;
            color: #7F8C8D;
            margin-top: 5px;
            display: block;
        }

        .text-side .size {
            font-size: 4rem;
            font-weight: 800;
            margin: 20px 0 10px;
        }

        .image-side img {
            width: 110%;
            max-width: 450px;
            filter: drop-shadow(20px 30px 50px rgba(0,0,0,0.12));
            transform: rotate(3deg);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand-group">
            <h1 class="brand-title">EVER GOOD PARTNERS CO.,LTD.</h1>
            <p class="slogan">PARTNERS IN PURITY.</p>
            <div class="cert-logos-top">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/halal.png" alt="Halal">
                <img src="images/usda.png" alt="USDA">
                <img src="images/kosher.png" alt="Kosher">
                <img src="images/taste.png" alt="Superior Taste">
            </div>
        </div>
        <nav class="nav-links">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-card-group">
            <div class="eli-label">Eli</div>
            <div class="info-box">
                <ul>
                    <li class="feature-item">100% Natural Coconut water</li>
                    <li class="feature-item">No Sugar Added</li>
                    <li class="feature-item">No Artificial Flavor</li>
                    <li class="feature-item">No Coloring</li>
                    <li class="feature-item">No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="glass-container">
            <div class="text-side">
                <p style="text-transform: uppercase; letter-spacing: 2px; font-weight: 700; color: #BDC3C7; margin-bottom: 10px; font-size: 0.75rem;">Premium Export Quality</p>
                <h2>18 months <span class="subtitle">Shelf-life at room temp.</span></h2>
                <div class="size">330ml</div>
                <div style="color: #F1C40F; font-size: 1.3rem;">★★★★★</div>
            </div>
            <div class="image-side">
                <img src="images/eli-pouch.png" alt="Eli Coconut Water">
            </div>
        </div>
    </main>

</body>
</html>

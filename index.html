<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS - Eli Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1A4F8B;
            --gold-gradient: linear-gradient(135deg, #C5A059 0%, #F1D592 50%, #B8860B 100%);
            --glass-bg: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            /* พื้นหลังจางลงเพื่อความโปร */
            background: linear-gradient(rgba(245, 247, 250, 0.92), rgba(245, 247, 250, 0.92)), 
                        url('images/fssc-22007.png') no-repeat center center fixed;
            background-size: cover;
            color: #333;
            min-height: 100vh;
        }

        /* --- Header Section --- */
        .header {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 45px 5% 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ปรับความหนาเพิ่มขึ้น (400) ตามคำขอ */
        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.4rem;
            font-weight: 400; /* เพิ่มความหนาจาก 200 เป็น 400 */
            letter-spacing: 4px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .nav-links a {
            text-decoration: none;
            color: #2D3436;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-left: 35px;
            text-transform: uppercase;
        }

        /* --- Content Layout --- */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 5% 80px;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 60px;
            align-items: center;
        }

        /* --- Eli & Features (Professional Grouping) --- */
        .brand-info-group {
            display: flex;
            flex-direction: column;
        }

        .eli-tag {
            background: #000;
            color: #fff;
            padding: 12px 35px;
            border-radius: 18px 18px 0 0;
            display: inline-block;
            width: fit-content;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
        }

        .info-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 0 25px 25px 25px;
            border: 1px solid rgba(255,255,255,1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
        }

        .cert-row {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .cert-row img {
            height: 28px;
            filter: contrast(1.1);
        }

        .feature-list {
            list-style: none;
        }

        .feature-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #444;
        }

        .feature-list li::before {
            content: '✓';
            width: 22px;
            height: 22px;
            background: #27AE60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 900;
        }

        /* --- Product Showcase --- */
        .glass-showcase {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(30px);
            border-radius: 50px;
            padding: 60px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 30px 70px rgba(0,0,0,0.06);
        }

        .product-detail h2 {
            font-size: 3.8rem;
            color: var(--brand-blue);
            font-weight: 800;
            line-height: 1;
        }

        .product-detail .sub {
            display: block;
            font-size: 1.6rem;
            color: #636E72;
            font-weight: 400;
            margin-top: 5px;
        }

        .product-detail .vol {
            font-size: 4.5rem;
            font-weight: 800;
            margin: 25px 0 10px;
            color: #222;
        }

        .bottle-wrap {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .bottle-wrap img {
            width: 120%;
            max-width: 480px;
            filter: drop-shadow(25px 35px 50px rgba(0,0,0,0.15));
            transform: rotate(4deg);
        }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="brand-title">EVER GOOD PARTNERS CO.,LTD. </h1>
        <nav class="nav-links">
            <a href="#">Overview</a>
            <a href="#">Production</a>
            <a href="#">Certification</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="brand-info-group">
            <div class="eli-tag">Eli</div>
            <div class="info-card">
                <div class="cert-row">
                    <img src="images/fssc-22000.png" alt="FSSC">
                    <img src="images/fssc-22001.png" alt="Halal">
                    <img src="images/fssc-22002.png" alt="USDA">
                    <img src="images/fssc-22003.png" alt="Kosher">
                    <img src="images/fssc-22004.png" alt="K">
                </div>
                <ul class="feature-list">
                    <li>100% Natural Coconut water</li>
                    <li>No Sugar Added</li>
                    <li>No Artificial Flavor</li>
                    <li>No Coloring</li>
                    <li>No Preservatives</li>
                </ul>
            </div>
        </div>

        <div class="glass-showcase">
            <div class="product-detail">
                <p style="text-transform: uppercase; letter-spacing: 2px; font-weight: 700; color: #A0AEC0; margin-bottom: 10px; font-size: 0.8rem;">Premium Quality</p>
                <h2>18 months <span class="sub">Shelf-life at room temp.</span></h2>
                <div class="vol">330ml</div>
                <div style="color: #F1C40F; font-size: 1.4rem;">★★★★★</div>
            </div>
            <div class="bottle-wrap">
                <img src="images/fssc-22008.png" alt="Eli Coconut Water">
            </div>
        </div>
    </main>

</body>
</html>

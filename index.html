<!DOCTYPE html>
<html lang="th"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Good Partners - Coconut Water</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1F3F23;
            --accent-green: #59803C;
            --gold: #A88F61;
            --white: #FFFFFF;
            --text-dark: #222222;
            --bg-light: #f8faf9;
            --divider-color: #eeeeee;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--bg-light); overflow-x: hidden; }

        /* =========================================
           1. DESKTOP (PC / Laptop)
        ========================================= */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            background: var(--white);
            position: relative;
            z-index: 100;
        }

        .brand-header { color: var(--gold); font-size: 1.8rem; font-weight: 700; line-height: 1.1; }
        .partners-text { color: var(--gold); font-size: 0.85rem; letter-spacing: 4px; margin-bottom: 15px; }
        
        .cert-icons { display: flex; gap: 15px; align-items: center; }
        .cert-icons img { height: 40px; mix-blend-mode: multiply; }

        .nav-menu { display: flex; list-style: none; gap: 40px; }
        .nav-menu li a {
            text-decoration: none; color: var(--text-dark); font-size: 0.85rem;
            font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s;
        }
        .nav-menu li a:hover { color: var(--accent-green); }

        .hero {
            position: relative;
            min-height: 800px; /* ความสูงในคอมพิวเตอร์ */
            width: 100%;
            background-image: url('images/fssc-22013.png'); 
            background-size: cover;
            background-position: center right; 
            display: flex;
            align-items: center;
            padding: 0 8%;
        }

        .hero-top-icon {
            position: absolute;
            top: -15px;
            left: 8%;
            width: 240px;
            z-index: 15;
            mix-blend-mode: multiply; 
        }

        .hero-content h4 {
            color: var(--accent-green); font-size: 2.5rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            margin-top: 100px; margin-bottom: 5px;
        }

        .hero-content h1 { 
            color: var(--primary-green); font-size: 7rem; line-height: 0.8;
            font-weight: 900; letter-spacing: -2px; margin: 0; text-transform: uppercase;
        }

        .product-origin {
            color: var(--primary-green); font-size: 1.2rem; font-weight: 500;
            margin-top: 10px; margin-bottom: 45px; letter-spacing: 5px; 
            text-transform: uppercase; opacity: 0.8;
        }

        .btn-more {
            background: var(--accent-green); color: var(--white);
            font-size: 1.4rem; padding: 18px 55px; border-radius: 50px;
            text-decoration: none; display: inline-flex; align-items: center;
            gap: 12px; font-weight: 700; box-shadow: 0 8px 25px rgba(89, 128, 60, 0.3);
            transition: 0.3s;
        }
        .btn-more:hover { transform: scale(1.05); background: var(--primary-green); }

        .features-bar {
            background: var(--white); margin: -60px 80px 40px; padding: 25px 40px;
            border-radius: 60px; display: flex; justify-content: space-between;
            box-shadow: 0 15px 45px rgba(0,0,0,0.08); position: relative; z-index: 20;
        }
        .feature-item { flex: 1; display: flex; align-items: center; gap: 12px; justify-content: center; position: relative; }
        .feature-item:not(:last-child)::after { content: ""; position: absolute; right: 0; height: 40px; width: 1px; background-color: var(--divider-color); }
        .f-icon-circle { width: 50px; height: 50px; background: #5a7e3d; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; flex-shrink: 0; }
        .f-text b { display: block; font-size: 1.1rem; color: var(--primary-green); font-weight: 700; line-height: 1.2; }
        .f-text span { font-size: 0.75rem; color: #666; }

        /* =========================================
           2. TABLET (iPad)
        ========================================= */
        @media (max-width: 1024px) {
            .header-container { padding: 20px 40px; flex-direction: column; text-align: center; gap: 20px; }
            .nav-menu { gap: 25px; flex-wrap: wrap; justify-content: center; }
            
            .hero { min-height: 60vh; justify-content: center; text-align: center; padding: 0 5%; background-position: center; }
            .hero-top-icon { position: relative; top: 0; left: 0; width: 180px; margin: 0 auto 20px; display: block; }
            .hero-content { display: flex; flex-direction: column; align-items: center; }
            .hero-content h4 { margin-top: 0; font-size: 2rem; }
            .hero-content h1 { font-size: 5rem; }
            .product-origin { font-size: 1rem; }

            .features-bar { 
                flex-wrap: wrap; gap: 20px; margin: -40px 40px 40px; 
                padding: 30px; border-radius: 30px; justify-content: center;
            }
            .feature-item { flex: 1 1 30%; min-width: 220px; justify-content: flex-start; padding: 10px; }
            .feature-item:not(:last-child)::after { display: none; }
        }

        /* =========================================
           3. MOBILE (โทรศัพท์มือถือ)
        ========================================= */

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GOOD PARTNERS | The Ultimate Refreshment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --deep-green: #2B4C3B; 
            --sky-blue: #4A90E2;
            --glass: rgba(255, 255, 255, 0.85);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #F4F7F6;
            /* พื้นหลัง fssc-22007.png แบบจางพิเศษเพื่อความหรูหรา */
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.9) 0%, rgba(240,245,240,0.9) 100%), url('images/fssc-22007.png');
            background-size: cover;
            background-attachment: fixed;
            color: #2D3436;
            line-height: 1.6;
        }

        /* Header ดีไซน์สะอาดตา */
        header {
            padding: 40px 5% 0 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .brand-block { border-left: 5px solid var(--gold); padding-left: 25px; }
        .brand { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 2.8rem; 
            color: var(--gold); 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        .certs { display: flex; gap: 15px; margin-top: 15px; }
        .certs img { height: 30px; filter: grayscale(20%); transition: 0.3s; }
        .certs img:hover { filter: grayscale(0%); transform: translateY(-3px); }

        /* ส่วนแสดงผลระดับเทพ (God-Tier Showcase) */
        .hero-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 5% 100px 5%;
            align-items: center;
        }

        /* ฝั่งซ้าย: กล่องคุณสมบัติแบบ Glassmorphism */
        .feature-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 22px;
            color: #34495E;
        }
        .feature-item span { 
            color: #7ED321; 
            font-size: 2rem; 
            background: rgba(126, 211, 33, 0.1);
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
        }

        .btn-order {
            display: inline-block;
            margin-top: 20px;
            background: var(--deep-green);
            color: white;
            padding: 22px 60px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 20px 40px rgba(43,76,59,0.25);
            transition: 0.4s;
        }
        .btn-order:hover { transform: translateY(-7px); box-shadow: 0 25px 50px rgba(43,76,59,0.35); }

        /* ฝั่งขวา: สินค้าพร้อมพาดหัวลอยเด่น */
        .product-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .hero-title {
            font-size: 6rem;
            color: var(--sky-blue);
            font-weight: 900;
            line-height: 0.9;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: -3px;
            text-shadow: 0 20px 40px rgba(74, 144, 226, 0.15);
        }

        .main-product {
            width: 500px; /* ขนาดใหญ่พิเศษเพื่อความเด่น */
            filter: drop-shadow(0 50px 80px rgba(0,0,0,0.15));
            animation: godFloat 6s infinite ease-in-out;
            z-index: 2;
        }

        @keyframes godFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-35px) rotate(2deg); }
        }

        /* รัศมีแสงสีขาวด้านหลังสินค้าเพื่อความสง่า */
        .product-box::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            z-index: 1;
        }

        @media (max-width: 1200px) {
            .hero-section { grid-template-columns: 1fr; text-align: center; gap: 50px; }
            .hero-title { font-size: 4rem; }
            .main-product { width: 320px; }
            .feature-item { justify-content: center; }
            .brand { font-size: 2rem; }
            .certs { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-block">
            <div class="brand">EVER GOOD PARTNERS</div>
            <div class="certs">
                <img src="images/fssc-22000.png" alt="FSSC">
                <img src="images/fssc-22001.png" alt="Halal">
                <img src="images/fssc-22002.png" alt="USDA">
                <img src="images/fssc-22004.png" alt="SGS">
            </div>
        </div>
    </header>

    <main class="hero-section">
        <div class="feature-card">
            <div class="feature-item"><span>✓</span> 100% NATURAL & PURE</div>
            <div class="feature-item"><span>✓</span> ZERO ADDED SUGAR</div>
            <div class="feature-item"><span>✓</span> NO ARTIFICIAL FLAVOR</div>
            <div class="feature-item"><span>✓</span> NO COLORING</div>
            <div class="feature-item"><span>✓</span> NO PRESERVATIVES</div>
            <a href="#" class="btn-order">Order Now</a>
        </div>

        <div class="product-box">
            <h1 class="hero-title">Coconut<br>Water</h1>
            <img src="images/fssc-22005.png" class="main-product" alt="Eli Coconut Water">
        </div>
    </main>

</body>
</html>

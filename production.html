<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production - Ever Good Partners</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #2B4E2B;
            --accent-green: #59803C;
            --gold: #A88F61;
            --box-green: #A3CBB1; 
            --text-dark: #222222;
            --text-gray: #555555;
            --gold-title: #4A4A4A; 
            --bg-light: #fcfdfc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        
        body { 
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: url('images/fssc-22022.png'); 
            background-size: cover; 
            background-attachment: fixed;
            background-position: center;
        }

        /* --- HEADER (ยังคงเก็บ CSS ไว้เพื่อให้แสดงผลได้ถูกต้องเมื่อดึง header.html มา) --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            background: #FFFFFF;
            position: relative;
            z-index: 100;
            border-bottom: 1px solid #eeeeee;
        }

        .brand-header { color: var(--gold); font-size: 1.8rem; font-weight: 700; line-height: 1.1; }
        .partners-text { color: var(--gold); font-size: 0.85rem; letter-spacing: 4px; margin-bottom: 15px; font-weight: 600; }
        .cert-icons { display: flex; gap: 15px; align-items: center; }
        .cert-icons img { height: 40px; mix-blend-mode: multiply; }
        
        .nav-menu { display: flex; list-style: none; gap: 50px; }
        .nav-menu li a {
            text-decoration: none; color: var(--text-dark); font-size: 0.85rem;
            font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s;
        }
        .nav-menu li a:hover, 
        .nav-menu li a.nav-active { color: var(--accent-green); }

        /* --- Main Container --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px 100px;
        }

        /* --- Production Excellence Section --- */
        .excellence-section {
            padding-top: 20px;
        }

        .excellence-title {
            text-align: center;
            font-size: 3.8rem;
            color: #1F3F23;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 60px;
            line-height: 1.1;
        }

        .excellence-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .ex-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.07);
            display: flex;
            flex-direction: column;
            border: 1px solid #EBEBEB;
            transition: transform 0.3s ease;
        }

        .ex-card:hover {
            transform: translateY(-5px);
        }

        .card-body { 
            padding: 45px 30px; 
            display: flex; 
            gap: 25px; 
            align-items: center; 
            flex-grow: 1; 
        }

        .card-text { flex: 1; }
        .card-text h3 {
            font-size: 1.1rem; 
            font-weight: 800; 
            color: var(--primary-green);
            margin-bottom: 20px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-text ul li {
            font-size: 0.9rem; 
            color: #333; 
            margin-bottom: 15px;
            display: flex; 
            align-items: flex-start; 
            gap: 12px; 
            font-weight: 500;
            line-height: 1.4;
        }

        .card-text li i { color: var(--accent-green); margin-top: 4px; }
        
        .card-img {
            width: 140px; 
            height: 140px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .excellence-grid { grid-template-columns: 1fr; }
            .excellence-title { font-size: 2.8rem; margin-bottom: 40px; }
            .card-body { flex-direction: column; text-align: center; }
            .card-text ul li { justify-content: center; }
            .card-img { width: 100%; height: 200px; }
        }
        
        /* Mobile Header Responsive */
        @media (max-width: 768px) {
            .header-container { padding: 25px 20px 15px; flex-direction: column; text-align: center; gap: 15px;}
            .brand-header { font-size: 1.4rem; }
            .partners-text { font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 5px; }
            .nav-menu { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .nav-menu li a { font-size: 0.75rem; background: var(--white); padding: 5px 12px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        }
    </style>
</head>
<body>

    <header id="header-placeholder" class="header-container"></header>

    <div class="container">
        
        <div class="excellence-section">
            <h2 class="excellence-title">PRODUCTION EXCELLENCE</h2>
            
            <div class="excellence-grid">
                
                <div class="ex-card">
                    <div class="card-body">
                        <div class="card-text">
                            <h3>100% TRACEABLE SUPPLY CHAIN</h3>
                            <ul style="list-style: none;">
                                <li><i class="fa-solid fa-link"></i> Direct sourcing policy guarantees Full Traceability.</li>
                                <li><i class="fa-regular fa-circle-check"></i> Highest quality & supply chain reliability.</li>
                            </ul>
                        </div>
                        <img src="images/fssc-22020.png" alt="Raw Material" class="card-img">
                    </div>
                </div>

                <div class="ex-card">
                    <div class="card-body">
                        <div class="card-text">
                            <h3>SAFE & PURE PROCESS</h3>
                            <ul style="list-style: none;">
                                <li><i class="fa-solid fa-award"></i> Guaranteed highest food safety.</li>
                                <li><i class="fa-solid fa-microchip"></i> Advanced processing technology.</li>
                                <li><i class="fa-solid fa-leaf"></i> 100% natural, no additives.</li>
                            </ul>
                        </div>
                        <img src="images/fssc-22021.png" alt="Bottling Process" class="card-img">
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                
                // รันสคริปต์ที่ติดมากับ header.html อีกครั้งเพื่อให้เมนูเปลี่ยนสี
                const script = document.createElement('script');
                script.innerHTML = document.querySelector('#header-placeholder script').innerHTML;
                document.body.appendChild(script);
            });
    </script>
</body>
</html>

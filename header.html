<style>
    /* --- Header Container: ล็อคความสูงและดีไซน์ --- */
    #header-container-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 30px 60px;
        background: #FFFFFF;
        border-bottom: 1px solid #eeeeee;
        width: 100%;
        box-sizing: border-box;
    }

    /* --- ฝั่งซ้าย: Brand & Certs --- */
    .brand-section {
        display: flex;
        flex-direction: column;
    }

    .brand-header { 
        color: #A88F61; 
        font-size: 1.8rem; 
        font-weight: 700; 
        line-height: 1.1; 
        margin: 0;
        white-space: nowrap;
    }

    .partners-text { 
        color: #A88F61; 
        font-size: 0.85rem; 
        letter-spacing: 4px; 
        margin-bottom: 15px; 
        font-weight: 600; 
    }
    
    .cert-icons { 
        display: flex; 
        gap: 15px; 
        align-items: center; 
    }

    .cert-icons img { 
        height: 40px; 
        mix-blend-mode: multiply; 
    }

    /* --- ฝั่งขวา: Navigation --- */
    .nav-menu { 
        display: flex; 
        list-style: none; 
        gap: 50px; 
        margin: 0; 
        padding: 0;
    }

    .nav-menu li a {
        text-decoration: none; 
        color: #2C332A; 
        font-size: 0.85rem; 
        font-weight: 600; 
        letter-spacing: 1px; 
        text-transform: uppercase; 
        transition: color 0.3s;
        white-space: nowrap;
    }

    .nav-menu li a:hover, 
    .nav-menu li a.nav-active { 
        color: #478A3E; 
    }

    /* ขีดเส้นใต้เมนูหน้าที่เปิดอยู่ */
    .nav-menu li a.nav-active {
        border-bottom: 2px solid #478A3E;
        padding-bottom: 5px;
    }

    /* ปรับแต่งสำหรับจอ iPad/Tablet ให้ยังดูดี */
    @media (max-width: 1200px) {
        #header-container-inner { padding: 20px 30px; }
        .nav-menu { gap: 20px; }
        .brand-header { font-size: 1.4rem; }
    }
</style>

<div id="header-container-inner">
    <div class="brand-section">
        <h1 class="brand-header">EVER GOOD PARTNERS CO.,LTD.</h1>
        <p class="partners-text">PARTNERS IN PURITY.</p>
        <div class="cert-icons">
            <img src="images/fssc-22000.png" alt="FSSC 22000">
            <img src="images/fssc-22027.png" alt="USDA Organic">
            <img src="images/fssc-22026.png" alt="Kosher">
            <img src="images/fssc-22028.png" alt="Superior Taste Award">
        </div>
    </div>

    <nav>
        <ul class="nav-menu">
            <li><a href="index.html">HOME</a></li>
            <li><a href="overview.html">OVERVIEW</a></li>
            <li><a href="production.html">PRODUCTION</a></li>
            <li><a href="certification.html">CERTIFICATION</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </nav>
</div>

<script>
    // สคริปต์ทำให้เมนูสว่างตามหน้าจริง
    (function() {
        let path = window.location.pathname.split("/").pop();
        if (path === "") path = "index.html";
        
        document.querySelectorAll('.nav-menu a').forEach(link => {
            if (link.getAttribute('href') === path) {
                link.classList.add('nav-active');
            }
        });
    })();
</script>
